  // 纯文本简谱(便于复制到别处):高音区加 ˙上标近似用 ^,低音区 _,附点 .,延音 -,小节 |
  function jpPlainNote(n){
    if(n.tie)return '-';
    if(n.rest)return '0';
    const raw=n.label||'';
    const oct=raw.indexOf(JP_HI)>=0?1:(raw.indexOf(JP_LO)>=0?-1:0);
    let t=raw.replace(/[̲̄]/g,'');
    const beats=4/n.durMul;
    if(near(beats,0.75)||near(beats,1.5))t+='.';
    if(oct>0)t="'"+t; else if(oct<0)t=t+',';
    return t;
  }
  function jpPlain(list){
    return list.map(ph=>{
      const mel=ph.melody||[];if(!mel.length)return '';
      const mL=measureLen();let cum=0,curM=0,parts=[];
      mel.forEach((n,i)=>{const m=Math.floor(cum/mL+1e-6);if(i>0&&m!==curM){parts.push('|');curM=m;}parts.push(jpPlainNote(n));cum+=4/n.durMul;});
      parts.push('‖');
      const head=(scoreScope==='song')?((SECTIONS[ph.section]||'乐句')+': '):'';
      return head+parts.join(' ');
    }).filter(Boolean).join('\n');
  }

  // ═══ 导出简谱为 PNG:纯 Canvas 2D 手绘(自包含,无外部库/网络,无跨域污染) ═══
  //  说明:foreignObject→canvas 在部分浏览器会污染画布无法导出,故改为直接手绘。
  // 解析一个音符 → 绘制所需属性
  function jpParse(n){
    if(n.tie)return {kind:'tie'};
    if(n.rest)return {kind:'rest'};
    const raw=n.label||'';
    const oct=raw.indexOf(JP_HI)>=0?1:(raw.indexOf(JP_LO)>=0?-1:0);
    const body=raw.replace(/[̲̄]/g,'');
    const am=body.match(/^([#b♯♭]+)/);const acc=am?am[1]:'';
    const digit=body.slice(acc.length);
    const beats=4/n.durMul;
    let under=0,dot=false;
    if(near(beats,0.25))under=2;else if(near(beats,0.5))under=1;
    else if(near(beats,0.75)){under=1;dot=true;}else if(near(beats,1.5))dot=true;
    return {kind:'note',digit,acc,oct,under,dot,inKey:!!n.inKey};
  }
  function exportScoreImage(btn){

      const INK='#2A2A2A',OUT='#B5852E',GREY='#8895A2',SUB='#666';
      const PAD=28, MAXW=680;          // 画布内边距 / 折行宽度上限
      const NUMF=30, LINEH=64;         // 数字字号 / 行高

      cx.font=numF(true);
      const cellPad=10, minCell=24, barW=18, secGap=10;
      // 构造 token 流(含段名/换行标记)
      const tokens=[];
      const mL=measureLen();
      list.forEach((ph,pi)=>{
        const mel=ph.melody||[];if(!mel.length&&scoreScope!=='song')return;
        if(scoreScope==='song'){
          let nm=(SECTIONS[ph.section]||'乐句');
          const cs=(ph.chords||[]).slice().sort((a,b)=>a.at-b.at);
          if(cs.length)nm+=' · '+cs.map(x=>chordName(x)).join(' - ');
          tokens.push({t:'sec',text:nm});
        }
        let cum=0,curM=0;
        mel.forEach((n,i)=>{
          const m=Math.floor(cum/mL+1e-6);
          if(i>0&&m!==curM){tokens.push({t:'bar'});curM=m;}
          // bi=拍序号(整拍取整),用于连梁按拍分组
          tokens.push(Object.assign({t:'n',bi:Math.floor(cum+1e-6)},jpParse(n)));
          cum+=4/n.durMul;
        });
        tokens.push({t:'end'});
      });
      // 计算每个 token 宽度
      tokens.forEach(tk=>{
        if(tk.t==='n'){
          if(tk.kind==='tie'){tk.w=Math.max(minCell,26);tk.txt='-';tk.col=SUB;}
          else if(tk.kind==='rest'){cx.font=numF(true);tk.w=Math.max(minCell,cx.measureText('0').width+cellPad);tk.txt='0';tk.col=GREY;}
          else{cx.font=numF(true);const dw=cx.measureText(tk.digit).width;
            const aw=tk.acc?(NUMF*0.55):0; tk.w=Math.max(minCell,dw+aw+cellPad);tk.txt=tk.digit;tk.col=tk.inKey?INK:OUT;tk.dw=dw;tk.aw=aw;}
        }else if(tk.t==='bar'){tk.w=barW;}
        else if(tk.t==='end'){tk.w=barW+4;}
        else if(tk.t==='sec'){tk.w=MAXW;} // 段名独占一行
      });
      // 折行:得到每个 token 的 (x,row)
      let row=0,x=0,maxLineW=0;
      tokens.forEach(tk=>{
        if(tk.t==='sec'){ if(x>0){row++;} tk.row=row; tk.x=0; row++; x=0; return; }
        if(x>0 && x+tk.w>MAXW && tk.t!=='bar'){ row++; x=0; }
        tk.x=x; tk.row=row; x+=tk.w; if(x>maxLineW)maxLineW=x;
      });
      const rows=row+1;
      // ── 头部尺寸 ──
      const bpm=parseInt(speedSlider&&speedSlider.value)||120;
      const capoTip=capo>0?(' (升'+capo+'半音)'):capo<0?(' (降'+(-capo)+'半音)'):'';
      const headH=104;
      const contentW=Math.max(maxLineW, 360);
      const W=Math.ceil(contentW)+PAD*2;
      const H=headH+rows*LINEH+PAD;
      c.width=W*S;c.height=H*S;cx.scale(S,S);
      // 背景
      cx.fillStyle='#FFFFFF';cx.fillRect(0,0,W,H);
      cx.textBaseline='alphabetic';
      // 标题
      cx.fillStyle='#222';cx.font='bold 24px '+F;cx.textAlign='center';
      cx.fillText(songName||'我的旋律',W/2,42);
      // 速度标记 ♩=bpm(左)
      cx.textAlign='left';cx.fillStyle='#333';cx.font='bold 16px '+F;
      cx.fillText('♩ = '+bpm,PAD,70);
      // 调号(左)+ 拍号(右)
      cx.font='bold 14px '+F;cx.fillStyle='#444';
      cx.fillText('1='+tonicName()+' '+keyDisplay()+capoTip,PAD,92);
      cx.textAlign='right';cx.fillText(timeSig,W-PAD,92);
      cx.textAlign='left';
      // ── 逐 token 绘制音符行 ──
      tokens.forEach(tk=>{
        const rowTop=headH+tk.row*LINEH;
        const baseline=rowTop+34;      // 数字基线
        const x0=PAD+tk.x;
        if(tk.t==='sec'){
          cx.fillStyle='#3E7A9C';cx.font='bold 13px '+F;
          cx.fillText(tk.text,x0,baseline-6);
          return;
        }
        if(tk.t==='bar'){
          cx.strokeStyle=GREY;cx.lineWidth=1.4;
          cx.beginPath();cx.moveTo(x0+tk.w/2,baseline-24);cx.lineTo(x0+tk.w/2,baseline+4);cx.stroke();
          return;
        }
        if(tk.t==='end'){
          cx.strokeStyle='#5A6672';cx.lineWidth=1.4;
          const mx=x0+tk.w/2;
          cx.beginPath();cx.moveTo(mx-3,baseline-24);cx.lineTo(mx-3,baseline+4);cx.stroke();
          cx.lineWidth=2.6;cx.beginPath();cx.moveTo(mx+2,baseline-24);cx.lineTo(mx+2,baseline+4);cx.stroke();
          return;
        }
        // 音符 / 休止 / 延音
        const cxCenter=x0+tk.w/2;
        cx.fillStyle=tk.col;cx.font=numF(true);cx.textAlign='center';
        cx.fillText(tk.txt,cxCenter,baseline);
        cx.textAlign='left';
        if(tk.kind==='note'){
          const dw=tk.dw||cx.measureText(tk.txt).width;
          const digitLeft=cxCenter-dw/2, digitRight=cxCenter+dw/2;
          // 升降号(左上小号)
          if(tk.acc){cx.fillStyle=tk.col;cx.font='bold '+Math.round(NUMF*0.56)+'px '+F;cx.textAlign='right';
            cx.fillText(tk.acc,digitLeft+2,baseline-NUMF*0.52);cx.textAlign='left';}
          // 高八度点(数字上方,按行固定高度)
          if(tk.oct>0){for(let k=0;k<tk.oct;k++){cx.beginPath();cx.arc(cxCenter,rowTop+6+k*5,1.7,0,7);cx.fillStyle=tk.col;cx.fill();}}
          // 低八度点:固定在同一水平线(低于下划线),不随时值上下浮动
          if(tk.oct<0){const ny=baseline+16;for(let k=0;k<-tk.oct;k++){cx.beginPath();cx.arc(cxCenter,ny+k*5,1.7,0,7);cx.fillStyle=tk.col;cx.fill();}}
          // 附点
          if(tk.dot){cx.beginPath();cx.arc(digitRight+5,baseline-6,1.9,0,7);cx.fillStyle=tk.col;cx.fill();}
        }
      });
      // ── 连梁:同一拍内连续的有下划线音符共用一条通线(跨拍/过小节/遇非下划线音则断开)──
      function drawBeams(level){
        cx.lineWidth=1.7;
        let run=null;
        const flush=()=>{ if(run){const rowTop=headH+run.row*LINEH,baseline=rowTop+34;
          const uy=(level===1)?baseline+7:baseline+11;
          cx.strokeStyle=run.col;cx.beginPath();cx.moveTo(run.x0,uy);cx.lineTo(run.x1,uy);cx.stroke();}
          run=null; };
        tokens.forEach(tk=>{
          if(tk.t==='n'&&tk.kind==='note'&&tk.under>=level){
            const x0=PAD+tk.x,x1=x0+tk.w;
            if(run&&run.row===tk.row&&run.bi===tk.bi)run.x1=x1;   // 同拍同行 → 延长通线
            else{flush();run={row:tk.row,x0:x0,x1:x1,col:tk.col,bi:tk.bi};}
          }else flush();  // 小节线/延音/休止/非下划线音 → 断梁
        });
        flush();
      }
      drawBeams(1);drawBeams(2);
      // ── 导出 ──
      const done=(blobUrl,revoke)=>{
        const a=document.createElement('a');a.href=blobUrl;a.download=safeFileName(songName)+'_简谱.png';
        document.body.appendChild(a);a.click();a.remove();
        if(revoke)setTimeout(()=>URL.revokeObjectURL(blobUrl),4000);
        flash('简谱图片已导出');
      };
      if(c.toBlob){c.toBlob(b=>{if(!b){done(c.toDataURL('image/png'));return;}done(URL.createObjectURL(b),true);},'image/png');}
      else done(c.toDataURL('image/png'));
    }catch(e){
      flash('导出失败:'+(e&&e.message||e));
    }finally{
      if(btn){btn.textContent=old;btn.disabled=false;}
    }
  }
  // ═══ 通用下载 ═══
  function dlBlob(blob,fname){
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
  }

  // ═══ 导出 MIDI(Type-0 标准 MIDI 文件,纯前端字节生成,编曲软件通用) ═══
  function noteToMidi(name){const m=name&&name.match(/^([A-G][#b]?)(\d)$/);return m?(parseInt(m[2])+1)*12+NS[m[1]]:null;} // C4=60
  function clampMidi(p){return Math.max(0,Math.min(127,p|0));}
  function vlq(n){n=n>>>0;let b=[n&0x7f];n=Math.floor(n/128);while(n>0){b.unshift((n&0x7f)|0x80);n=Math.floor(n/128);}return b;} // 可变长度量
  function utf8Bytes(s){return Array.from(new TextEncoder().encode(s));}
  function exportMIDI(btn){
    const list=(scoreScope==='song')?song:[song[curPhrase]];
    if(!list.some(p=>p&&((p.melody&&p.melody.length)||(p.chords&&p.chords.length)))){flash('还没有内容,无法导出');return;}
    const old=btn?btn.textContent:'';if(btn){btn.textContent='…';btn.disabled=true;}
    try{
      const TPQ=480;                       // 每四分音符 tick 数
      const bpm=parseInt(speedSlider&&speedSlider.value)||120;
      const evs=[];let base=0;
      list.forEach(ph=>{
        const mel=ph.melody||[];
        // 旋律(通道0):吸收延音合并为长音
        let t=0,i=0;
        while(i<mel.length){
          const n=mel[i],dur=Math.round((4/n.durMul)*TPQ);
          if(n.rest||n.tie){t+=dur;i++;continue;}
          let total=dur,j=i+1;
          while(j<mel.length&&mel[j].tie){total+=Math.round((4/mel[j].durMul)*TPQ);j++;}
          const midi=noteToMidi(n.note);
          if(midi!=null){const p=clampMidi(midi+capo);
            evs.push({tick:base+t,ord:1,bytes:[0x90,p,82]});
            evs.push({tick:base+t+total,ord:0,bytes:[0x80,p,64]});}
          t+=total;i=j;
        }
        const melEnd=t;
        // 和弦(通道1):由 chordFreqs 反推 MIDI(含变调夹/转位)
        let chEnd=0;const chs=(ph.chords||[]).slice().sort((a,b)=>a.at-b.at);
        chs.forEach((c,ci)=>{
          const st=base+Math.round(c.at*TPQ);
          const eb=(ci+1<chs.length)?chs[ci+1].at:(c.at+measureLen());
          const et=base+Math.round(eb*TPQ);
          chordFreqs(c).forEach(f=>{const p=clampMidi(Math.round(69+12*Math.log2(f/440)));
            evs.push({tick:st,ord:1,bytes:[0x91,p,55]});evs.push({tick:et,ord:0,bytes:[0x81,p,64]});});
          chEnd=Math.max(chEnd,et-base);
        });
        base+=Math.max(melEnd,chEnd)||(measureLen()*TPQ);
      });
      // 头部 meta:速度 / 拍号 / 曲名
      const mpqn=Math.round(60000000/bpm);
      const tsp=timeSig.split('/'),num=parseInt(tsp[0])||4,den=parseInt(tsp[1])||4,dd=Math.round(Math.log2(den));
      const nm=utf8Bytes(songName||'我的旋律');
      const metas=[
        {tick:0,ord:-2,bytes:[0xFF,0x51,0x03,(mpqn>>16)&255,(mpqn>>8)&255,mpqn&255]},
        {tick:0,ord:-2,bytes:[0xFF,0x58,0x04,num,dd,24,8]},
        {tick:0,ord:-2,bytes:[0xFF,0x03].concat(vlq(nm.length),nm)}
      ];
      const all=metas.concat(evs).sort((a,b)=>a.tick-b.tick||a.ord-b.ord);
      let last=0;const track=[];
      all.forEach(e=>{track.push.apply(track,vlq(e.tick-last).concat(e.bytes));last=e.tick;});
      track.push(0x00,0xFF,0x2F,0x00);      // end of track
      const u32=n=>[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255];
      const head=[0x4D,0x54,0x68,0x64,0,0,0,6,0,0,0,1,(TPQ>>8)&255,TPQ&255]; // MThd,格式0,1轨
      const trk=[0x4D,0x54,0x72,0x6B].concat(u32(track.length),track);
      dlBlob(new Blob([new Uint8Array(head.concat(trk))],{type:'audio/midi'}),safeFileName(songName)+'.mid');
      flash('MIDI 已导出');
    }catch(e){flash('MIDI 导出失败:'+(e&&e.message||e));}
    finally{if(btn){btn.textContent=old;btn.disabled=false;}}
  }

  // ═══ 导出 MusicXML(3.1 partwise,打谱软件如 MuseScore 可载入) ═══
  function noteParts(name){const m=name&&name.match(/^([A-G])([#b]?)(\d)$/);return m?{step:m[1],alter:m[2]==='#'?1:m[2]==='b'?-1:0,octave:parseInt(m[3])}:null;}
  function exportMusicXML(btn){
    const list=(scoreScope==='song')?song:[song[curPhrase]];
    if(!list.some(p=>p&&p.melody&&p.melody.length)){flash('还没有旋律,无法导出');return;}
    const old=btn?btn.textContent:'';if(btn){btn.textContent='…';btn.disabled=true;}
    try{
      const DIV=4,mL=measureLen();
      const tsp=timeSig.split('/'),num=parseInt(tsp[0])||4,den=parseInt(tsp[1])||4;
      const TYPES=[[4,'whole',0],[3,'half',1],[2,'half',0],[1.5,'quarter',1],[1,'quarter',0],[0.75,'eighth',1],[0.5,'eighth',0],[0.375,'16th',1],[0.25,'16th',0]];
      const PIECES=[4,3,2,1.5,1,0.75,0.5,0.375,0.25];
      const typeOf=b=>{for(const t of TYPES)if(near(b,t[0]))return[t[1],t[2]];return['quarter',0];};
      const esc2=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
      // 预处理:吸收延音 → 发声段 [{rest|note,beats}]
      const segsOf=mel=>{const segs=[];mel.forEach(n=>{const b=4/n.durMul;
        if(n.tie){if(segs.length&&!segs[segs.length-1].rest){segs[segs.length-1].beats+=b;}else segs.push({rest:true,beats:b});return;}
        if(n.rest){segs.push({rest:true,beats:b});return;}
        segs.push({rest:false,note:n.note,beats:b});});return segs;};
      const ATTR='<attributes><divisions>'+DIV+'</divisions><key><fifths>0</fifths></key>'
        +'<time><beats>'+num+'</beats><beat-type>'+den+'</beat-type></time>'
        +'<clef><sign>G</sign><line>2</line></clef></attributes>';
      let mxml='',measureNo=0,measureOpen=false,pos=0,firstMeasure=true;
      const ensureMeasure=()=>{if(!measureOpen){measureNo++;mxml+='<measure number="'+measureNo+'">';if(firstMeasure){mxml+=ATTR;firstMeasure=false;}measureOpen=true;}};
      const closeMeasure=()=>{if(measureOpen){mxml+='</measure>';measureOpen=false;pos=0;}};
      const emitPiece=(seg,beats,tieStart,tieStop)=>{
        const td=typeOf(beats),durDiv=Math.max(1,Math.round(beats*DIV));
        mxml+='<note>';
        if(seg.rest)mxml+='<rest/>';
        else{const np=noteParts(seg.note)||{step:'C',alter:0,octave:4};
          mxml+='<pitch><step>'+np.step+'</step>'+(np.alter?'<alter>'+np.alter+'</alter>':'')+'<octave>'+np.octave+'</octave></pitch>';
          if(tieStart)mxml+='<tie type="start"/>';if(tieStop)mxml+='<tie type="stop"/>';}
        mxml+='<duration>'+durDiv+'</duration><voice>1</voice><type>'+td[0]+'</type>';
        for(let k=0;k<td[1];k++)mxml+='<dot/>';
        if(!seg.rest&&(tieStart||tieStop)){mxml+='<notations>';if(tieStart)mxml+='<tied type="start"/>';if(tieStop)mxml+='<tied type="stop"/>';mxml+='</notations>';}
        mxml+='</note>';
      };
      const placeSeg=seg=>{let remain=seg.beats,first=true;
        while(remain>1e-6){ensureMeasure();
          const room=mL-pos;let take=Math.min(remain,room);
          let piece=PIECES.find(v=>v<=take+1e-6);if(piece==null)piece=take;piece=Math.min(piece,take);
          const willContinue=(remain-piece)>1e-6;
          emitPiece(seg,piece,!seg.rest&&willContinue,!seg.rest&&!first);
          pos+=piece;remain-=piece;first=false;
          if(pos>=mL-1e-6)closeMeasure();}
      };
      list.forEach(ph=>segsOf(ph.melody||[]).forEach(placeSeg));
      closeMeasure();
      const xml='<?xml version="1.0" encoding="UTF-8"?>\n'
        +'<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 3.1 Partwise//EN" "http://www.musicxml.org/dtds/partwise.dtd">\n'
        +'<score-partwise version="3.1">'
        +'<work><work-title>'+esc2(songName||'我的旋律')+'</work-title></work>'
        +'<identification><encoding><software>写歌灵感</software></encoding></identification>'
        +'<part-list><score-part id="P1"><part-name>'+esc2(songName||'旋律')+'</part-name></score-part></part-list>'
        +'<part id="P1">'+mxml+'</part></score-partwise>';
      dlBlob(new Blob([xml],{type:'application/vnd.recordare.musicxml+xml'}),safeFileName(songName)+'.musicxml');
      flash('MusicXML 已导出');
    }catch(e){flash('MusicXML 导出失败:'+(e&&e.message||e));}
    finally{if(btn){btn.textContent=old;btn.disabled=false;}}
  }

  function openScore(){commitPhrase();scoreScope='phrase';renderScore();scoreOverlay.classList.add('show');}
  if(btnScore)btnScore.addEventListener('click',openScore);
  scoreOverlay.addEventListener('click',e=>{if(e.target===scoreOverlay)scoreOverlay.classList.remove('show');});

})();
</script>
