  // ═══ 弹奏区泡泡:点键盘/和弦冒出泡泡,点泡泡=把灵感"捡"进对应轨道 ═══
  // 冒一个独立漂浮泡泡(增量,不重建其余):各自随机起点+随机游走轨迹,点击只影响自己
  const BUB_MAX=6;
  // 采集所有可点按钮的"中心一小块"作避让核心(相对 playBubbles 坐标),泡泡起点避开这些点
  function bubbleAvoidCores(pb){
    const box=pb.getBoundingClientRect(),cores=[];
    pb.parentNode.querySelectorAll('.n-btn,.chord-btn,.oct-card.live .n-btn').forEach(el=>{
      const r=el.getBoundingClientRect();if(!r.width)return;
      cores.push({x:r.left+r.width/2-box.left,y:r.top+r.height/2-box.top,rad:Math.min(r.width,r.height)*0.34}); // 只护中心~1/3
    });
    return cores;
  }
  function spawnBubble(it){
    const pb=$('playBubbles');if(!pb||!(isMobileMode&&tryMode))return;
    const bw=it.kind==='chord'?52:40,bh=40;
    const W=pb.clientWidth||melodyBox.clientWidth||320,H=pb.clientHeight||200;
    const b=document.createElement('button');
    if(it.kind==='note'){b.className='float-bub'+(it.inKey?'':' out');b.textContent=it.label;b.title='捡进旋律:'+it.note;}
    else{const c=it.chord;b.className='float-bub chord-bub func-'+c.func;b.textContent=chordName(c);b.title='捡进和弦轨:'+chordName(c);}
    // 起点:避开各按钮中心一小块(泡泡中心不落在任何核心圈内),最多试 12 次
    const cores=bubbleAvoidCores(pb);
    let x=0,y=0;
    for(let tryi=0;tryi<12;tryi++){
      x=Math.max(4,Math.min(W-bw-4, 6+Math.random()*Math.max(6,W-bw-12)));
      y=Math.max(4,Math.min(H-bh-4, 6+Math.random()*Math.max(6,H-bh-12)));
      const cx=x+bw/2,cy=y+bh/2;
      if(!cores.some(c=>Math.hypot(cx-c.x,cy-c.y)<c.rad+14))break;
    }
    b.style.left=x+'px';b.style.top=y+'px';
    const ang=Math.random()*Math.PI*2,rad=10+Math.random()*14; // 漂浮幅度要小:起点已避开按钮中心,幅度大反而会飘回中心挡字
    b.style.setProperty('--dx',(Math.cos(ang)*rad).toFixed(1)+'px');
    b.style.setProperty('--dy',(Math.sin(ang)*rad).toFixed(1)+'px');
    b.style.animationDelay=(-Math.random()*8).toFixed(2)+'s';
    b.style.animationDuration=(6.5+Math.random()*3.5).toFixed(1)+'s';
    b.addEventListener('click',ev=>{ev.stopPropagation();pickBubble(it,b);});
    pb.appendChild(b);
    while(pb.children.length>BUB_MAX)pb.removeChild(pb.firstChild); // 超上限移除最老,不动其余
  }
  function clearBubbles(){const pb=$('playBubbles');if(pb)pb.innerHTML='';}
  // 点泡泡=采用它(记入对应轨),只把这一个飞走删除,其余泡泡的漂浮不受影响
  function pickBubble(it,el){
    if(el){el.style.pointerEvents='none';el.classList.add('fly');setTimeout(()=>el.remove(),300);}
    if(it.kind==='note'){
      insertItem({note:it.note,label:it.label,freq:it.freq,inKey:it.inKey,durMul:getDurMul()});
      playGuitar(it.freq,280);renderMelody();scrollToCaret();
      flash('✓ 音已记入旋律轨');
    }else{
      fillChord(it.chord);
      flash('✓ 和弦已记入和弦轨');
    }
  }

  // 播放跟随:仅当音符接近视野边缘时轻推滚动(不逐音强制居中,避免卡顿)
  function highlightActive(i){
    const chips=melodyBox.querySelectorAll('.note-chip');
    chips.forEach((c,idx)=>c.classList.toggle('active',idx===i));
    const chip=chips[i];if(!chip)return;
    const left=chip.offsetLeft,right=left+chip.offsetWidth;
    const vl=melodyBox.scrollLeft,vr=vl+melodyBox.clientWidth;
    if(right>vr-50)melodyBox.scrollLeft=right-melodyBox.clientWidth+70;
    else if(left<vl+50)melodyBox.scrollLeft=Math.max(0,left-70);
  }

  // ═══ 背景旋律线 · 根据音高画出波动轮廓 ═══
  const SVGNS='http://www.w3.org/2000/svg';
  function drawMelodyLine(){
    const chips=[...melodyBox.querySelectorAll('.note-chip')];
    const pts=[];
    melody.forEach((n,i)=>{if(n&&!n.rest&&!n.tie&&n.freq>0&&chips[i]){pts.push({x:chips[i].offsetLeft+chips[i].offsetWidth/2,f:Math.log2(n.freq)});}});
    if(pts.length<2)return; // 少于2个音不画线
    const w=melodyBox.scrollWidth,h=melodyBox.clientHeight,padY=18;
    let mn=Math.min(...pts.map(p=>p.f)),mx=Math.max(...pts.map(p=>p.f));
    if(mx-mn<0.02){mn-=0.5;mx+=0.5;}
    const xy=pts.map(p=>[p.x,padY+(1-(p.f-mn)/(mx-mn))*(h-2*padY)]);
    let d='M '+xy[0][0].toFixed(1)+' '+xy[0][1].toFixed(1);
    for(let i=1;i<xy.length;i++){const[x0,y0]=xy[i-1],[x1,y1]=xy[i];const cx=(x0+x1)/2,cy=(y0+y1)/2;d+=' Q '+x0.toFixed(1)+' '+y0.toFixed(1)+' '+cx.toFixed(1)+' '+cy.toFixed(1);}
    d+=' L '+xy[xy.length-1][0].toFixed(1)+' '+xy[xy.length-1][1].toFixed(1);
    const svg=document.createElementNS(SVGNS,'svg');svg.setAttribute('class','mline');svg.setAttribute('width',w);svg.setAttribute('height',h);svg.setAttribute('viewBox','0 0 '+w+' '+h);
    svg.innerHTML='<defs>'+
      '<linearGradient id="mlgrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8FC2DC"/><stop offset="1" stop-color="#EBCF86"/></linearGradient>'+
      '<linearGradient id="mlarea" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8FC2DC"/><stop offset="1" stop-color="#8FC2DC" stop-opacity="0"/></linearGradient></defs>'+
      '<path class="mline-area" d="'+d+' L '+xy[xy.length-1][0].toFixed(1)+' '+h+' L '+xy[0][0].toFixed(1)+' '+h+' Z"/>'+
      '<path class="mline-path" d="'+d+'"/>';
    melodyBox.insertBefore(svg,melodyBox.firstChild);
    const p=svg.querySelector('.mline-path');const len=p.getTotalLength();p.style.setProperty('--mllen',len);
  }

  function stopPlayback(){if(timer)clearTimeout(timer);timer=null;playing=false;active=-1;chainPlaying=false;
    if(typeof stopGroove==='function')stopGroove(); // 停鼓机
    if(typeof aiPreviewRestore==='function'&&aiPreviewRestore){const r=aiPreviewRestore;aiPreviewRestore=null;r();} // 还原 AI 试听的临时数据
    const sl=melodyBox.scrollLeft;renderMelody();melodyBox.scrollLeft=sl; // 保留滚动位置,停止时不跳
    if(typeof highlightChordClip==='function')highlightChordClip(-1);
    btnPlay.textContent='▶';btnPlay.classList.remove('playing');
    if(typeof renderPhraseBar==='function')renderPhraseBar();
    if(typeof aiPanel!=='undefined'&&aiPanel&&aiPanel.classList.contains('show')&&typeof renderAIPanel==='function')renderAIPanel();
    if(typeof humResultActive==='function'&&humResultActive())renderHumResult();}

  // opts:{fromStart 从头播,noLoop 忽略循环,chained 连播中(不打断已在播状态),onEnd 自然结束回调}
  // 播放范围由 playRangeMode 决定:head=从头 / cursor=从光标 / loop=框选区间循环
  function playMelody(opts){
    opts=opts||{};
    if(playing&&!opts.chained){stopPlayback();return;}
    if(!melody.length){ // 空乐句
      if(opts.chained){if(opts.onEnd){opts.onEnd();}return;} // 连播中的空句:直接跳下一句
      if(chords.length){playChordProgression();return;} // 没旋律但有和弦→只播和弦进行
      flash('先录点音符或加个和弦');return;
    }
    if(timer){clearTimeout(timer);timer=null;} // 防御:清掉任何残留计时器
    const a=audio();if(a.state==='suspended'){a.resume();} // 确保音频已唤醒
    playing=true;btnPlay.textContent='⏸';btnPlay.classList.add('playing');
    startGroove(); // 节拍器鼓机(开了才响)
    renderMelody(); // 播放前完整渲染一次;之后只移动高亮,不再重建
    const bpm=parseInt(speedSlider.value),baseMs=(60/bpm)*1000;
    // 起点/终点/是否循环:连播(chained/fromStart)强制从头不循环;否则看 playRangeMode
    const region=(!opts.fromStart&&playRangeMode==='loop'&&loopRegion)?loopRegion:null;
    let startI;
    if(opts.fromStart)startI=0;
    else if(region)startI=Math.max(0,Math.min(region.a,melody.length-1));
    else if(playRangeMode==='cursor')startI=(caret>=0&&caret<melody.length)?caret:0;
    else startI=0; // head
    const endI=region?Math.min(region.b,melody.length):melody.length; // 不含 endI
    const doLoop=region?true:false;
    let i=startI;const mLen=measureLen();
    const beatsBefore=k=>melody.slice(0,k).reduce((s,n)=>s+4/n.durMul,0);
    let cumBeats=beatsBefore(startI),lastMeas=-1,beatAcc=0,mBeat=0;
    function step(){
      if(!playing)return;
      if(i>=endI){
        if(doLoop&&!opts.noLoop){i=startI;cumBeats=beatsBefore(startI);lastMeas=-1;}
        else if(opts.onEnd){if(timer){clearTimeout(timer);timer=null;}opts.onEnd();return;}
        else{stopPlayback();return;}
      }
      const n=melody[i];active=i;highlightActive(i);
      // 和弦:按累计拍找到当前和弦块,进入新块时弹奏
      const ci=chordAtBeat(cumBeats);
      if(ci!==lastMeas){lastMeas=ci;highlightChordClip(ci);const ch=chords[ci];if(ch){const dur=(chordEndBeat(ci)-ch.at);playChord(ch,baseMs*dur*0.92,true);}}
      const noteMs=baseMs*noteBeats(n);
      if(n.tie){
        // 延音:不重新拨弦,仅延续时间(声音由前一个音的长时值覆盖)
      }else if(!n.rest){
        // 计算跟随的延音拍数,合成一个长音
        let extra=0;for(let j=i+1;j<endI&&melody[j].tie;j++)extra+=noteBeats(melody[j]);
        const soundMs=baseMs*(noteBeats(n)+extra);
        playGuitar(n.freq,Math.min(soundMs-30,1800));
      }
      cumBeats+=noteBeats(n);
      i++;timer=setTimeout(step,noteMs);
    }
    step();
  }

  // ═══ AI 判调 ═══
  // 判调:对 12 主音 × {大调,小调} 打分(动态生成音级集,不依赖多调表)
  function analyzeKey(){
    const notes=melody.filter(n=>!n.rest&&!n.tie);
    if(notes.length<3)return null;
    const cnt={};let total=0;
    notes.forEach(n=>{const pc=NS[n.note.replace(/\d/,'')];if(pc!=null){cnt[pc]=(cnt[pc]||0)+1;total++;}});
    const firstPc=NS[notes[0].note.replace(/\d/,'')],lastPc=NS[notes[notes.length-1].note.replace(/\d/,'')];
    const cand=[];
    [['major','大调',[0,2,4,5,7,9,11]],['minor','小调',[0,2,3,5,7,8,10]]].forEach(([mid,mnm,iv])=>{
      for(let t=0;t<12;t++){
        const set=new Set(iv.map(s=>(t+s)%12));
        let inC=0;Object.entries(cnt).forEach(([pc,c])=>{if(set.has(+pc))inC+=c;});
        const cov=inC/total,tw=(cnt[t]||0)/total;
        const endsT=(lastPc===t)?1:0,startsT=(firstPc===t)?0.5:0;
        let score=Math.round((cov*0.55+tw*0.28+endsT*0.12+startsT*0.05)*100);
        let unused=0;iv.forEach(s=>{if(!cnt[(t+s)%12])unused++;});score-=unused*3;
        cand.push({tonic:t,mode:mid,name:NAMES[t]+mnm,score:Math.max(0,Math.min(100,score))});
      }
    });
    cand.sort((a,b)=>b.score-a.score);return cand;
  }
  function showAIResult(){
    const result=analyzeKey();
    if(!result){flash('至少录入3个音符才能判调');return;}
    const best=result[0];const isBest=(best.tonic===tonicPC&&best.mode===modeId);
    let html='<h3>✨ AI 调性分析</h3>';
    html+='<div class="ai-desc">基于 <b>'+melody.filter(n=>!n.rest&&!n.tie).length+'</b> 个音符,综合音名覆盖 + 主音重心分析:</div>';
    html+='<div class="ai-match">';
    result.slice(0,5).forEach(r=>{
      const cls=((r.tonic===tonicPC&&r.mode===modeId)?'current':'')+((r===best)?' best':'');
      html+='<div class="ai-match-item '+cls.trim()+'"><span class="kn">'+r.name+'</span><span class="ks">'+r.score+'%</span></div>';
    });
    html+='</div>';
    if(isBest)html+='<div class="ai-hint">当前「'+keyDisplay()+'」得分最高,与旋律主音重心吻合。</div>';
    else{html+='<div class="ai-hint">推荐切换至 <b style="color:var(--primary-deep);">「'+best.name+'」</b>(得分 '+best.score+'%)。</div>';
      html+='<button class="ai-apply" id="aiApply">切换至 '+best.name+'</button>';}
    html+='<button class="ai-close" id="aiClose">关闭</button>';
    aiCard.innerHTML=html;aiOverlay.classList.add('show');
    setTimeout(()=>{
      const bc=$('aiClose'),ba=$('aiApply');
      if(bc)bc.addEventListener('click',()=>aiOverlay.classList.remove('show'));
      if(ba)ba.addEventListener('click',()=>{applyKey(best.tonic,best.mode,capo);aiOverlay.classList.remove('show');flash('已切换至 '+best.name);});
    },50);
  }

  // ═══════════════════════════════════════════
  //  和弦引擎(第一批:L1 调内和弦盘 + 小节点选 + 加花 + 发声 + 和声地毯)
  // ═══════════════════════════════════════════
  const chordTrack=$('chordTrack'),chordInner=$('chordInner'),chordPal=$('chordPal'),ctInfo=$('ctInfo');
  const varOverlay=$('varOverlay'),varCard=$('varCard');

  const PC={'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11};
  const MAJ_QUAL=['maj','min','min','maj','maj','min','dim'];
  const MIN_QUAL=['min','dim','maj','min','min','maj','maj'];
  const MAJ_ROMAN=['I','ii','iii','IV','V','vi','vii°'];
  const MIN_ROMAN=['i','ii°','III','iv','v','VI','VII'];
  // 功能:T=主功能(稳定) SD=下属(展开) D=属(紧张)
  const MAJ_FUNC=['T','SD','T','SD','D','T','D'];
  const MIN_FUNC=['T','SD','T','SD','D','T','D'];
  const QUAL_SUFFIX={maj:'',min:'m',dim:'dim',maj7:'maj7','7':'7',min7:'m7',sus2:'sus2',sus4:'sus4',add9:'add9','6':'6',m6:'m6',m7b5:'m7♭5',dim7:'dim7'};
  const QUAL_INT={maj:[0,4,7],min:[0,3,7],dim:[0,3,6],maj7:[0,4,7,11],'7':[0,4,7,10],min7:[0,3,7,10],sus2:[0,2,7],sus4:[0,5,7],add9:[0,4,7,14],'6':[0,4,7,9],m6:[0,3,7,9],m7b5:[0,3,6,10],dim7:[0,3,6,9]};
  const isMinorKey=k=>/m$/.test(k);
  const TS_LEN={'4/4':4,'3/4':3,'6/8':3,'2/4':2}; // 每小节含多少个四分音符拍

  let timeSig='4/4',section='verse';
  // 和弦 = 起点模型:每项 {at:起始拍, rootLetter,rootPC,quality,degree,func,roman,section}
  // 一个和弦自动延音到下一个和弦起点;不存时长。按 at 升序。
  let chords=[],selChordAt=null; // selChordAt: 手动选中的插入拍(null=顺序往后)
  let chordCursor=0; // 顺序插入光标:下一个和弦落在第几小节起点
  let customPals=[]; // 自定义和弦盘按钮(全曲共享):每项为 spec

  // L2 经典和弦进行套路(以级数表示,1-based degree)
  const PROGRESSIONS=[
    {name:'4-5-3-6-2-5-1',key:'major',degs:[3,4,2,5,1,4,0],desc:'华语情歌万能进行,起伏完整'},
    {name:'卡农 1-5-6-3-4-1-4-5',key:'major',degs:[0,4,5,2,3,0,3,4],desc:'温暖流动,层层递进'},
    {name:'6-4-1-5(小调感)',key:'major',degs:[5,3,0,4],desc:'流行「思乡」进行,忧伤又抓耳'},
    {name:'1-5-6-4',key:'major',degs:[0,4,5,3],desc:'欧美流行最常见,阳光大气'},
    {name:'1-6-4-5(50s)',key:'major',degs:[0,5,3,4],desc:'复古怀旧,五十年代流行'},
    {name:'2-5-1',key:'major',degs:[1,4,0],desc:'爵士终止式,强解决感'},
    {name:'6-2-5-1(小调起)',key:'minor',degs:[5,1,4,0],desc:'小调级进,叙事感强'},
    {name:'1-7-6-5(下行)',key:'major',degs:[0,6,5,4],desc:'下行低音线,深情感伤'}
  ];

  function diatonicChords(k){return CURCHORDS.map(c=>Object.assign({},c));} // 当前调式的级数和弦
  function midiToFreq(m){return 440*Math.pow(2,(m-69)/12);}
  // ═══ 自定义和弦 spec:四层(根音/三音+五音变体/七度/延伸音/低音)→ 音程、命名、组成音 ═══
  const CB_SEVEN={maj7:11,b7:10,dim7:9,halfdim:10,mMaj7:11}; // 七度音程(半音)
  const CB_EXT={'9':14,'#9':15,'b9':13,'11':17,'#11':18,'13':21,'b13':20}; // 延伸音程
  function specIntervals(sp){
    const iv=[0];
    if(sp.five==='sus2')iv.push(2);else if(sp.five==='sus4')iv.push(5);else iv.push(sp.third==='min'?3:4); // 三音/挂留
    if(sp.five==='aug')iv.push(8);else if(sp.five==='dim')iv.push(6);else iv.push(7); // 五音
    if(sp.seven&&CB_SEVEN[sp.seven]!=null)iv.push(CB_SEVEN[sp.seven]); // 七度
    (sp.ext||[]).forEach(e=>{if(CB_EXT[e]!=null)iv.push(CB_EXT[e]);}); // 延伸音
    return iv;
  }
  function bassPC(sp){
    if(sp.bass&&sp.bass.mode==='slash'&&sp.bass.notePC!=null)return((sp.bass.notePC%12)+12)%12;
    if(sp.bass&&sp.bass.mode==='auto'&&sp.bass.tone&&sp.bass.tone!=='root'){
      const iv=specIntervals(sp),idx={third:1,fifth:2,seventh:3}[sp.bass.tone];
      if(idx!=null&&iv[idx]!=null)return (sp.rootPC+iv[idx])%12;
    }
    return sp.rootPC%12;
  }
  function bassSuffix(sp){
    if(!sp.bass)return '';
    if(sp.bass.mode==='slash'&&sp.bass.notePC!=null)return '/'+NAMES[((sp.bass.notePC%12)+12)%12];
    if(sp.bass.mode==='auto'&&sp.bass.tone&&sp.bass.tone!=='root')return '/'+NAMES[bassPC(sp)];
    return '';
  }
  function specName(sp){
    const R=sp.rootLetter,sus=(sp.five==='sus2'||sp.five==='sus4');
    const ext=(sp.ext||[]),extS=ext.length?'('+ext.join(',')+')':'',bassS=bassSuffix(sp);
    if(sp.seven==='dim7')return R+'°7'+extS+bassS;       // 减七:封装名
    if(sp.seven==='halfdim')return R+'ø7'+extS+bassS;     // 半减七
    if(sus){const sev=sp.seven==='b7'?'7':(sp.seven==='maj7'||sp.seven==='mMaj7')?'maj7':'';return R+sev+sp.five+extS+bassS;}
    let core='';
    if(sp.seven==='maj7'||sp.seven==='mMaj7')core=(sp.third==='min'||sp.seven==='mMaj7')?'m(maj7)':'maj7';
    else if(sp.seven==='b7')core=(sp.third==='min')?'m7':'7';
    else core=(sp.third==='min')?'m':'';
    let fifthS='';
    if(sp.five==='aug')fifthS=sp.seven?'(#5)':'aug';
    else if(sp.five==='dim')fifthS=(sp.third==='min'&&!sp.seven)?'':'(♭5)';
    if(sp.five==='dim'&&sp.third==='min'&&!sp.seven)core='dim'; // 减三和弦
    if(sp.five==='aug'&&!sp.seven&&sp.third!=='min'){core='aug';fifthS='';}
    return R+core+fifthS+extS+bassS;
  }
  function specNoteNames(sp){return specIntervals(sp).map(s=>NAMES[(sp.rootPC+s)%12]);}
  function specFunc(sp){const f=CURCHORDS.find(c=>c.rootPC===(sp.rootPC%12));return f?f.func:'SD';}
  function chordName(c){return c.spec?specName(c.spec):c.rootLetter+(QUAL_SUFFIX[c.quality]||'');}
  function chordFreqs(c){
    if(c.spec){
      const sp=c.spec,rel=(((sp.rootPC%12)-(tonicPC%12))%12+12)%12,rootMidi=48+(tonicPC%12)+rel+capo;
      const fs=specIntervals(sp).map(s=>midiToFreq(rootMidi+s));
      const bpc=bassPC(sp);if(bpc!==(sp.rootPC%12)||(sp.bass&&sp.bass.mode==='slash'))fs.unshift(midiToFreq(36+bpc+capo)); // 低音置于低八度
      return fs;
    }
    // 内置:根音相对主音展开——低于主音的根音升八度,使整条进行顺着级数走、不掉八度(修 G 调等和弦"从某个突然变低")
    const rel=(((c.rootPC%12)-(tonicPC%12))%12+12)%12; // 相对主音的半音数 0..11
    const rootMidi=48+(tonicPC%12)+rel+capo;
    return (QUAL_INT[c.quality]||QUAL_INT.maj).map(s=>440*Math.pow(2,(rootMidi+s-69)/12));
  }
  function playChord(c,durMs,arp){
    audio();const fs=chordFreqs(c);
    fs.forEach((f,i)=>{const d=arp?i*38:0;setTimeout(()=>pluck(f,durMs||800,0.36),d);});
  }
  function variantsFor(triadQual){
    if(triadQual==='maj')return[
      {q:'maj',desc:'大三·明亮'},{q:'maj7',desc:'大七·柔和'},{q:'7',desc:'属七·想解决'},
      {q:'6',desc:'加六·复古'},{q:'sus4',desc:'挂四·悬停'},{q:'sus2',desc:'挂二·开阔'},
      {q:'add9',desc:'加九·空灵'},{q:'min',desc:'转小·转暗'}];
    if(triadQual==='min')return[
      {q:'min',desc:'小三·忧郁'},{q:'min7',desc:'小七·慵懒'},{q:'m6',desc:'小六·爵士'},
      {q:'sus2',desc:'挂二·开阔'},{q:'sus4',desc:'挂四·悬停'},{q:'maj',desc:'转大·转亮'}];
    return[{q:'dim',desc:'减三·不安'},{q:'m7b5',desc:'半减·爵士'},{q:'dim7',desc:'减七·强紧张'}];
  }

  function measureLen(){return TS_LEN[timeSig]||4;}
  function melodyBeats(){return melody.reduce((s,n)=>s+(4/n.durMul),0);}
  function sortChords(){chords.sort((a,b)=>a.at-b.at);}
  function chordEndBeat(i){ // 延音到下一个和弦起点;最后一个默认管一小节
    if(i+1<chords.length)return chords[i+1].at;
    return chords[i].at+measureLen();
  }
  function totalSpan(){return Math.max(melodyBeats(),(chords.length?chords[chords.length-1].at+measureLen():0),measureLen()*4);}

  // ═══ 拍↔像素:和弦块与旋律音符对齐 ═══
  function melodySegs(){
    const chips=[...melodyBox.querySelectorAll('.note-chip')];const segs=[];let b=0;
    melody.forEach((n,i)=>{const nb=4/n.durMul,chip=chips[i];
      if(chip)segs.push({b0:b,b1:b+nb,x0:chip.offsetLeft,x1:chip.offsetLeft+chip.offsetWidth});
      b+=nb;});
    return segs;
  }
  function beatToX(t,segs){
    segs=segs||melodySegs();
    if(!segs.length)return t*BEAT_PX;
    if(t<=segs[0].b0+1e-6)return segs[0].x0; // 起点=第一个音符左缘
    // 命中某音符内部(含其左边界)→ 从该音符左缘按比例;边界处正好返回该音符左缘
    for(const s of segs){if(t<s.b1-1e-6)return s.x0+(t-s.b0)/(s.b1-s.b0)*(s.x1-s.x0);}
    const last=segs[segs.length-1];
    if(t<=last.b1+1e-6)return last.x1; // 末尾边界=最后音符右缘
    return last.x1+(t-last.b1)*BEAT_PX;
  }
  function xToBeat(x,segs){
    segs=segs||melodySegs();
    if(!segs.length)return x/BEAT_PX;
    if(x<=segs[0].x0)return 0;
    for(const s of segs){if(x<s.x1-1e-6)return s.b0+(x-s.x0)/(s.x1-s.x0)*(s.b1-s.b0);}
    const last=segs[segs.length-1];
    if(x<=last.x1+1e-6)return last.b1;
    return last.b1+(x-last.x1)/BEAT_PX;
  }
  function noteBoundaries(){const bs=[0];let b=0;melody.forEach(n=>{b+=4/n.durMul;bs.push(b);});return bs;}
  function snapBeat(t){ // 旋律范围内吸音符边界;超出末尾则按整拍网格,以便无限往后拖
    const bs=noteBoundaries();const mB=melodyBeats();
    if(t>mB+0.25){ // 已到旋律之后:按拍取整,不再拉回
      return Math.max(mB,Math.round(t));
    }
    if(!bs.length)return Math.round(t);
    let best=bs[0],bd=Math.abs(bs[0]-t);
    bs.forEach(x=>{const d=Math.abs(x-t);if(d<bd){bd=d;best=x;}});
    return best;
  }

  // 放一个和弦到 at 拍(同位置替换)
  function placeChord(baseC,atBeat,quality){
    const at=Math.max(0,atBeat);
    const c=Object.assign({},baseC,{at:at,section:section});if(quality)c.quality=quality;
    const ex=chords.findIndex(x=>Math.abs(x.at-at)<0.25);
    if(ex>=0)chords[ex]=c;else chords.push(c);
    sortChords();playChord(c,700,true);renderChordTrack();
  }
  // 点和弦盘:选了位置就填那;没选则顺序往后(每点一个=一小节,可无限往后加)
  function fillChord(baseC,quality){
    const mL=measureLen();
    let at;
    if(selChordAt!=null){at=selChordAt;selChordAt=null;chordCursor=Math.round(at/mL)*mL+mL;}
    else{at=chordCursor;chordCursor+=mL;} // 默认:直接按整小节递增,不吸附→可无限往后
    placeChord(baseC,at,quality);
  }

  // ═══════════════════════════════════════════
  //  自定义和弦构建面板(四层:根音 / 三音+五音 / 七度 / 延伸音 / 低音)
  // ═══════════════════════════════════════════
  const cbOverlay=$('cbOverlay'),cbCard=$('cbCard');
  let cbSpec=null;
  const EXT_ORDER=['b9','9','#9','11','#11','b13','13'];
  function defaultSpec(){return {rootPC:tonicPC,rootLetter:NAMES[tonicPC],third:'maj',five:'P5',seven:'',ext:[],bass:{mode:'auto',tone:'root',notePC:null}};}
  function cbChord(){const sp=JSON.parse(JSON.stringify(cbSpec));return {rootLetter:sp.rootLetter,rootPC:sp.rootPC,quality:'custom',spec:sp,func:specFunc(sp),section:section};}
  const O=(k,v,txt,on,cls)=>'<button class="cb-opt'+(cls?' '+cls:'')+(on?' on':'')+'" data-k="'+k+'" data-v="'+v+'">'+txt+'</button>';
  function openChordBuilder(){cbSpec=defaultSpec();renderChordBuilder();cbOverlay.classList.add('show');}
  function renderChordBuilder(){
    const sp=cbSpec,notes=specNoteNames(sp),sus=(sp.five==='sus2'||sp.five==='sus4');
    let h='';
    h+='<div class="cb-preview"><div class="cb-pv-name">'+specName(sp)+'</div>'
      +'<div class="cb-pv-notes">'+notes.join(' · ')+(bassSuffix(sp)?'<br>低音 '+NAMES[bassPC(sp)]:'')+'</div>'
      +'<button class="cb-pv-play" id="cbPlay">▶</button></div>';
    // 第一层:根音
    h+='<div class="cb-layer"><div class="cb-lb">根音</div><div class="cb-grid roots">';
    NAMES.forEach((n,pc)=>{h+=O('r',pc,n,sp.rootPC===pc);});h+='</div></div>';
    // 第一层:三音
    h+='<div class="cb-layer"><div class="cb-lb">三音性质</div><div class="cb-seg">'
      +O('third','maj','大三',sp.third==='maj'&&!sus)+O('third','min','小三',sp.third==='min'&&!sus)+'</div>';
    // 第一层:五音变体(含挂留,互斥)
    h+='<div class="cb-lb">五音 / 挂留 <small>互斥单选</small></div><div class="cb-grid c3">'
      +O('five','P5','纯五',sp.five==='P5')+O('five','aug','增五<small>aug</small>',sp.five==='aug')
      +O('five','dim','减五<small>dim</small>',sp.five==='dim')+O('five','sus2','挂二<small>sus2</small>',sp.five==='sus2')
      +O('five','sus4','挂四<small>sus4</small>',sp.five==='sus4')+'</div></div>';
    // 第二层:七度
    h+='<div class="cb-layer"><div class="cb-lb">七度音 <small>可空=三和弦</small></div><div class="cb-grid c3">'
      +O('seven','','无七',!sp.seven)+O('seven','maj7','大七<small>maj7</small>',sp.seven==='maj7')
      +O('seven','b7','小七<small>♭7</small>',sp.seven==='b7')+O('seven','dim7','减七<small>°7</small>',sp.seven==='dim7')
      +O('seven','halfdim','半减七<small>ø7</small>',sp.seven==='halfdim')+O('seven','mMaj7','小大七<small>m(maj7)</small>',sp.seven==='mMaj7')
      +'</div></div>';
    // 第三层:延伸音(多选)
    h+='<div class="cb-layer"><div class="cb-lb">延伸音 <small>多选叠加</small></div><div class="cb-grid c7">';
    ['9','#9','b9','11','#11','13','b13'].forEach(e=>{h+=O('ext',e,e,sp.ext.includes(e),'ext');});h+='</div></div>';
    // 第四层:低音
    h+='<div class="cb-layer"><div class="cb-lb">低音设置 <small>与转位分离</small></div><div class="cb-seg">'
      +O('bmode','auto','自动转位',sp.bass.mode==='auto')+O('bmode','slash','斜杠低音',sp.bass.mode==='slash')+'</div>';
    if(sp.bass.mode==='auto'){
      h+='<div class="cb-grid c4">'+O('btone','root','根音',sp.bass.tone==='root')+O('btone','third','三音',sp.bass.tone==='third')
        +O('btone','fifth','五音',sp.bass.tone==='fifth')+O('btone','seventh','七音',sp.bass.tone==='seventh')+'</div>';
    }else{
      h+='<div class="cb-lb" style="margin-top:7px"><small>任意音(可不在和弦内,如 C/B♭)</small></div><div class="cb-grid cb-note-grid">';
      NAMES.forEach((n,pc)=>{h+=O('bnote',pc,n,sp.bass.notePC===pc);});h+='</div>';
    }
    h+='</div>';
    h+='<button class="cb-add" id="cbAdd">＋ 添加和弦</button>';
    h+='<button class="ai-close" id="cbClose">取消</button>';
    cbCard.innerHTML=h;
    setTimeout(()=>{
      cbCard.querySelectorAll('.cb-opt').forEach(b=>b.addEventListener('click',()=>cbPick(b.dataset.k,b.dataset.v)));
      const pl=$('cbPlay');if(pl)pl.addEventListener('click',()=>playChord(cbChord(),820,true));
      const ad=$('cbAdd');if(ad)ad.addEventListener('click',cbCommit);
      const cl=$('cbClose');if(cl)cl.addEventListener('click',()=>cbOverlay.classList.remove('show'));
    },20);
  }
  function cbPick(k,v){
    const sp=cbSpec;
    if(k==='r'){sp.rootPC=+v;sp.rootLetter=NAMES[+v];}
    else if(k==='third'){sp.third=v;if(sp.five==='sus2'||sp.five==='sus4')sp.five='P5';}
    else if(k==='five'){sp.five=v;}
    else if(k==='seven'){sp.seven=v;}
    else if(k==='ext'){const i=sp.ext.indexOf(v);if(i>=0)sp.ext.splice(i,1);else sp.ext.push(v);sp.ext.sort((a,b)=>EXT_ORDER.indexOf(a)-EXT_ORDER.indexOf(b));}
    else if(k==='bmode'){sp.bass.mode=v;if(v==='slash'&&sp.bass.notePC==null)sp.bass.notePC=sp.rootPC;}
    else if(k==='btone'){sp.bass.tone=v;}
    else if(k==='bnote'){sp.bass.notePC=+v;}
    renderChordBuilder();
  }
  function cbCommit(){
    const sp=JSON.parse(JSON.stringify(cbSpec)),nm=specName(sp);
    if(customPals.some(s=>specName(s)===nm)){flash('已有相同和弦');cbOverlay.classList.remove('show');return;}
    customPals.push(sp);
    cbOverlay.classList.remove('show');renderChordPal();flash('已添加到和弦区:'+nm);
  }
  cbOverlay.addEventListener('click',e=>{if(e.target===cbOverlay)cbOverlay.classList.remove('show');});

  // ═══════════════════════════════════════════
  //  AI 帮写:悬浮气泡 + 面板(桌面浮窗/手机底sheet)+ 框选 + DeepSeek + 回填
  // ═══════════════════════════════════════════
  const aiOrb=$('aiOrb'),aiPanel=$('aiPanel'),aipBody=$('aipBody'),aiScrim=$('aiScrim');
  const DS_KEY_LS='deepseek_api_key';
  let aiTarget='melody';        // 'melody' | 'chord'
  let aiSel=null;               // 旋律:{track:'melody',i0,i1,b0,b1};和弦:{track:'chord',b0,b1}
  let aiResult=null;            // 模型返回并解析后的结构
  let aiBusy=false;
  let aiPreviewBackup=null,aiPreviewRestore=null; // AI 试听临时数据的备份/还原钩子

  // —— 气泡拖动 + 位置记忆(统一 left/top 定位,横竖都可拖)——
  const ORB=54;
  function placeOrb(x,y){
    const m=6,W=window.innerWidth,H=window.innerHeight;
    x=Math.max(m,Math.min(W-ORB-m,x));y=Math.max(m,Math.min(H-ORB-m,y));
    aiOrb.style.left=x+'px';aiOrb.style.top=y+'px';aiOrb.style.right='auto';aiOrb.style.bottom='auto';
  }
  (function(){
    // 初始定位:优先本地记忆,否则右下角
    let init=null;try{init=JSON.parse(localStorage.getItem('ai_orb_pos')||'null');}catch(e){}
    if(init)placeOrb(init.x,init.y);
    else placeOrb(window.innerWidth-ORB-18,window.innerHeight-ORB-88);
    let px=0,py=0,ox=0,oy=0,moved=false,dragging=false;
    // 拖动/移动/结束都挂在 document 上:手指移出气泡范围也能持续跟手(修复"要先移动一点才拖得动")
    const onMove=e=>{
      if(!dragging)return;e.preventDefault();
      const dx=e.clientX-px,dy=e.clientY-py;
      if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;
      placeOrb(ox+dx,oy+dy);
    };
    const onUp=()=>{
      if(!dragging)return;dragging=false;aiOrb.classList.remove('dragging');
      document.removeEventListener('pointermove',onMove,{passive:false});
      document.removeEventListener('pointerup',onUp);document.removeEventListener('pointercancel',onUp);
      if(moved){
        const cx=(parseFloat(aiOrb.style.left)||0)+ORB/2,m=6; // 吸附最近的左/右屏幕边缘
        const snapX=(cx<window.innerWidth/2)?m:(window.innerWidth-ORB-m);
        placeOrb(snapX,parseFloat(aiOrb.style.top)||0);
        try{localStorage.setItem('ai_orb_pos',JSON.stringify({x:parseFloat(aiOrb.style.left),y:parseFloat(aiOrb.style.top)}));}catch(_){}
      }else openAI(); // 未拖动=点击
    };
    aiOrb.addEventListener('pointerdown',e=>{
      e.preventDefault();e.stopPropagation();dragging=true;moved=false;px=e.clientX;py=e.clientY;
      ox=parseFloat(aiOrb.style.left)||0;oy=parseFloat(aiOrb.style.top)||0;
      aiOrb.classList.add('dragging');
      document.addEventListener('pointermove',onMove,{passive:false});
      document.addEventListener('pointerup',onUp);document.addEventListener('pointercancel',onUp);
    });
    window.addEventListener('resize',()=>placeOrb(parseFloat(aiOrb.style.left)||0,parseFloat(aiOrb.style.top)||0));
  })();

  function openAI(){
    aiResult=null;
    document.body.classList.add('ai-armed');
    setAiTarget(aiTarget);
    renderAIPanel();
    aiPanel.classList.add('show');aiPanel.setAttribute('aria-hidden','false');
    aiOrb.classList.add('hidden'); // 打开时气泡隐藏,不与面板重叠
    setTimeout(()=>document.addEventListener('pointerdown',outsideClose,true),0);
  }
  function closeAI(){
    if(playing&&aiPreviewRestore)stopPlayback(); // 关面板时若在 AI 试听,停止并还原数据
    aiPanel.classList.remove('show');aiPanel.setAttribute('aria-hidden','true');
    aiOrb.classList.remove('hidden');
    document.body.classList.remove('ai-armed','ai-selecting','ai-tgt-chord');
    clearSelRange();aiSel=null;
    document.removeEventListener('pointerdown',outsideClose,true);
  }
  // 点击「面板/气泡/旋律轨/和弦轨」以外的区域 → 关闭(轨道要能拖选,故排除)
  function outsideClose(e){
    const t=e.target;
    if(aiPanel.contains(t)||aiOrb.contains(t))return;
    if(melodyBox.contains(t)||(chordTrack&&chordTrack.contains(t)))return;
    closeAI();
  }
  $('aipClose').addEventListener('click',closeAI);

  function setAiTarget(t){
    aiTarget=t;aiSel=null;clearSelRange();
    document.body.classList.toggle('ai-tgt-chord',t==='chord');
    if(t==='chord'&&panel!=='chord')setPanel('chord');
    if(t==='melody'&&panel!=='melody')setPanel('melody');
    setTimeout(()=>renderMeasureCells(t),0); // 轨道渲染完后铺小节格
  }

  // —— 小节点选(替代拖选:点小节格来选,天然对齐小节;点相邻扩到2小节,点已选取消)——
  let mcells=[];
  function clearSelRange(){mcells.forEach(c=>c.remove());mcells=[];}
  // 小节线的真实像素位置:旋律轨优先读 DOM 小节线(避免行内小节线宽度导致的偏移),否则回退 beatToX
  function measureX(beat,segs){
    const bl=melodyBox.querySelector('.bar-line[data-mb="'+beat+'"]');
    if(bl)return bl.offsetLeft+ (parseFloat(getComputedStyle(bl).marginLeft)||0);
    return beatToX(beat,segs);
  }
  function renderMeasureCells(track){
    clearSelRange();
    if(!document.body.classList.contains('ai-armed'))return;
    const mL=measureLen(),segs=melodySegs();
    const n=Math.max(4,Math.round(totalSpan()/mL));
    const inner=(track==='melody')?melodyBox:chordInner;
    if(!inner)return;
    const px=(track==='melody')?(b=>measureX(b,segs)):(b=>beatToX(b,segs));
    for(let m=0;m<n;m++){
      const b0=m*mL,b1=(m+1)*mL,x=px(b0),w=px(b1)-x;
      const cell=document.createElement('div');cell.className='ai-mcell';
      if(aiSel&&aiSel.track===track&&b0>=aiSel.b0-1e-6&&b1<=aiSel.b1+1e-6)cell.classList.add('on');
      cell.style.left=x+'px';cell.style.width=Math.max(12,w)+'px';
      cell.innerHTML='<span>'+(m+1)+'</span>';
      cell.addEventListener('click',ev=>{ev.stopPropagation();pickMeasure(m,track);});
      inner.appendChild(cell);mcells.push(cell);
    }
  }
  const AI_MAX_MEASURES=4; // 最多可选小节数
  function pickMeasure(m,track){
    const mL=measureLen();
    let s0=(aiSel&&aiSel.track===track)?Math.round(aiSel.b0/mL):-1;
    let cnt=(aiSel&&aiSel.track===track)?Math.round((aiSel.b1-aiSel.b0)/mL):0;
    if(s0<0){aiSel={track,b0:m*mL,b1:(m+1)*mL};}                     // 新选 1 格
    else if(m>=s0&&m<s0+cnt){                                       // 点已选区内
      if(cnt===1)aiSel=null;                                        //   单格→取消
      else aiSel={track,b0:m*mL,b1:(m+1)*mL};                       //   多格→缩成点中的这格
    }
    else if(m===s0-1&&cnt<AI_MAX_MEASURES)aiSel={track,b0:m*mL,b1:(s0+cnt)*mL};   // 紧邻左侧→向左扩
    else if(m===s0+cnt&&cnt<AI_MAX_MEASURES)aiSel={track,b0:s0*mL,b1:(m+1)*mL};   // 紧邻右侧→向右扩
    else aiSel={track,b0:m*mL,b1:(m+1)*mL};                         // 不相邻/已满→重选 1 格
    if(aiSel)finalizeSel();
    renderMeasureCells(track);renderAIPanel();
  }
  function finalizeSel(){
    if(!aiSel)return;
    if(aiSel.track==='melody'){
      const bs=noteBoundaries();let i0=-1,i1=-1;
      for(let i=0;i<melody.length;i++){const a=bs[i],b=bs[i+1];if(b>aiSel.b0+1e-6&&a<aiSel.b1-1e-6){if(i0<0)i0=i;i1=i;}}
      if(i0<0){ // 选区内没有音符:标记为在该小节起点插入
        let ins=0;for(let i=0;i<melody.length;i++){if(bs[i+1]<=aiSel.b0+1e-6)ins=i+1;}
        aiSel.i0=ins;aiSel.i1=ins-1;aiSel.empty=true; // i1<i0 表示纯插入,无删除
      }else{aiSel.i0=i0;aiSel.i1=i1;aiSel.empty=false;}
    }
  }

  // —— 采集选区内容 + 上下文 ——
  function labelToNoteMap(){ // 当前调:简谱标签→音名(oct0),含升降双写法
    const s=SCALES[key],m={};
    s.inKey.forEach(([n,l])=>{if(!(l in m))m[l]=n;});
    s.outKey.forEach(([n,sh,fl])=>{if(!(sh in m))m[sh]=n;if(!(fl in m))m[fl]=n;});
    return m;
  }
  const DEG_SEMI={'1':0,'2':2,'3':4,'4':5,'5':7,'6':9,'7':11};
  function degToNote(deg,oct){ // "1"/"#4"/"b7" + 八度 → 音名
    const map=labelToNoteMap();
    if(map[deg]){return shiftOct(map[deg],oct||0);}
    const mm=String(deg).match(/^([#b]*)(\d)$/);if(!mm)return null;
    let semi=DEG_SEMI[mm[2]];if(semi==null)return null;
    for(const c of mm[1])semi+=(c==='#'?1:-1);
    return midiName(60+((tonicPC+semi)%12)+ (oct||0)*12);
  }
  function collectMelody(i0,i1){
    return melody.slice(i0,i1+1).map(n=>({
      deg:n.rest?'0':n.tie?'—':n.label, note:n.note||null, beats:noteBeats(n),
      rest:!!n.rest, tie:!!n.tie, inKey:!!n.inKey, ly:n.ly||''
    }));
  }
  function collectChords(b0,b1){
    return chords.filter(c=>c.at>=b0-1e-6&&c.at<b1-1e-6).map(c=>({
      atRel:+(c.at-b0).toFixed(3), name:chordName(c), roman:c.roman||null, func:c.func,
      degree:(c.degree!=null?c.degree+1:null), notes:(c.spec?specNoteNames(c.spec):(QUAL_INT[c.quality]||QUAL_INT.maj).map(s=>NAMES[(c.rootPC+s)%12]))
    }));
  }
  function aiContext(){
    const mL=measureLen(),ph=song[curPhrase]||{};
    const ctx={
      key:keyDisplay(), tonic:NAMES[tonicPC], mode:MODES[modeId].name, timeSig:timeSig, measureBeats:mL,
      capo:capo, section:SECTIONS[ph.section||'verse']||'', phraseDesc:ph.desc||'',
      target:aiTarget, spanBeats:aiSel?+(aiSel.b1-aiSel.b0).toFixed(3):0, spanMeasures:aiSel?+((aiSel.b1-aiSel.b0)/mL).toFixed(2):0
    };
    if(!aiSel)return ctx;
    if(aiTarget==='melody'){
      ctx.selection=collectMelody(aiSel.i0,aiSel.i1);
      ctx.before=collectMelody(Math.max(0,aiSel.i0-4),aiSel.i0-1);
      ctx.after=collectMelody(aiSel.i1+1,Math.min(melody.length-1,aiSel.i1+4));
      ctx.chordsUnder=collectChords(aiSel.b0,aiSel.b1); // 这段下方的和弦,供参考
      // 选区已填的歌词(按序,供 AI 参考字调平仄、避免倒字);无则空
      ctx.lyricsInSel=melody.slice(aiSel.i0,aiSel.i1+1).map(n=>n.ly||'').join('');
      // 全曲常用音(音级频次 top4,供旋律呼应,保持整曲统一);排除休止/延音/无 label
      ctx.commonDegs=(function(){const cnt={};song.forEach(p=>(p&&p.melody||[]).forEach(n=>{if(n.rest||n.tie||!n.label)return;cnt[n.label]=(cnt[n.label]||0)+1;}));return Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]).slice(0,4).map(k=>({deg:k,count:cnt[k]}));})();
      // 前一乐句开头动机(最多6音,供再现/模进呼应)
      ctx.prevMotif=(function(){const p=song[curPhrase-1];if(!p||!p.melody||!p.melody.length)return null;const arr=[];for(const n of p.melody){if(arr.length>=6)break;arr.push({deg:n.rest?'0':n.tie?'—':n.label,beats:noteBeats(n)});}return arr.length?{section:SECTIONS[p.section||'verse']||'',notes:arr}:null;})();
    }else{
      ctx.selection=collectChords(aiSel.b0,aiSel.b1);
      ctx.melodyOver=(function(){const bs=noteBoundaries();const arr=[];melody.forEach((n,i)=>{if(bs[i+1]>aiSel.b0+1e-6&&bs[i]<aiSel.b1-1e-6)arr.push({deg:n.rest?'0':n.tie?'—':n.label,beats:noteBeats(n),atRel:+(bs[i]-aiSel.b0).toFixed(3)});});return arr;})();
      ctx.diatonic=CURCHORDS.map((c,i)=>({deg:i+1,roman:c.roman,name:chordName(c),func:c.func}));
    }
    return ctx;
  }

    return {system:sys,user:up.join('\n')};

  async function callDeepSeek(sys,user){
    const key=(localStorage.getItem(DS_KEY_LS)||'').trim();
    if(!key)throw new Error('NO_KEY');
    const res=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'deepseek-chat',temperature:0.8,response_format:{type:'json_object'},
        messages:[{role:'system',content:sys},{role:'user',content:user}]})
    });
    if(!res.ok){const t=await res.text().catch(()=>'');throw new Error('HTTP '+res.status+' '+t.slice(0,120));}
    const data=await res.json();
    const txt=data&&data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;
    if(!txt)throw new Error('空返回');
    return JSON.parse(txt);
  }

  // —— 解析模型 JSON → 内部可填结构 ——
  function parseAIResult(j){
    const out={reason:(j&&j.reason)||'',target:aiTarget,items:[]};
    if(aiTarget==='melody'&&Array.isArray(j.notes)){
      j.notes.forEach(nn=>{
        if(nn.rest||nn.deg==='0'){out.items.push({rest:true,label:'0',note:null,freq:0,durMul:durOf(nn.dur),inKey:false});return;}
        if(nn.tie||nn.deg==='—'){out.items.push({tie:true,label:'—',note:null,freq:0,durMul:4});return;}
        const note=degToNote(String(nn.deg),nn.oct|0);if(!note)return;
        const inK=SCALES[key].inKey.some(([,l])=>l===String(nn.deg));
        out.items.push({note,label:String(nn.deg),freq:soundFreq(note),inKey:inK,durMul:durOf(nn.dur)});
      });
    }else if(aiTarget==='chord'&&Array.isArray(j.chords)){
      j.chords.forEach(cc=>{
        const di=(cc.deg|0)-1;const base=CURCHORDS[di]||CURCHORDS[0];if(!base)return;
        const c=Object.assign({},base,{at:(aiSel?aiSel.b0:0)+(+cc.beat||0),section:section});
        if(cc.quality&&QUAL_INT[cc.quality])c.quality=cc.quality;
        out.items.push(c);
      });
    }
    return out;
  }
  function durOf(d){return 4/(DUR_BEATS[d]!=null?DUR_BEATS[d]:1);}

  // —— 结果预览:与旋律区同款「用长度表示时值」的块;每音下方标脚下和弦 ——
  function previewHTML(r){
    if(r.target==='melody'){
      // 选区起点拍 + 覆盖该段的和弦(优先 AI 生成时用到的下方和弦),给每个音标脚下和弦名
      const base=aiSel?aiSel.b0:0;
      const spans=chords.map((c,ci)=>({name:chordName(c),func:c.func,b0:c.at,b1:chordEndBeat(ci)}));
      const chordAt=b=>{for(let k=spans.length-1;k>=0;k--){if(b>=spans[k].b0-1e-6&&b<spans[k].b1-1e-6)return spans[k];}return null;};
      let cum=base,lastNm=null,h='<div class="ai-mel">';
      r.items.forEach(it=>{
        const beats=4/it.durMul,w=chipWidth(beats);
        const ch=(!it.rest&&!it.tie)?chordAt(cum):null;
        let tag='';
        if(ch&&ch.name!==lastNm){tag='<span class="arc func-'+ch.func+'">'+ch.name+'</span>';lastNm=ch.name;}
        const cls=it.tie?'tie':it.rest?'rest':(it.inKey?'':'out');
        const lbl=it.tie?'—':it.rest?'0':it.label;
        h+='<span class="arn '+cls+'" style="width:'+w+'px">'
          +'<span class="arn-l">'+lbl+'</span>'
          +((!it.tie&&!it.rest&&beats>0.25)?'<span class="arn-tail"></span>':'')
          +tag+'</span>';
        cum+=beats;
      });
      return h+'</div>';
    }
    // 和弦目标:块宽按和弦覆盖拍数,直观看到时长
    const base=aiSel?aiSel.b0:0,end=aiSel?aiSel.b1:base;
    const sorted=r.items.slice().sort((a,b)=>a.at-b.at);
    let h='<div class="ai-mel">';
    sorted.forEach((c,idx)=>{
      const next=idx+1<sorted.length?sorted[idx+1].at:end;
      const beats=Math.max(0.5,next-c.at),w=Math.max(44,chipWidth(beats));
      h+='<span class="arc-blk func-'+c.func+'" style="width:'+w+'px">'+chordName(c)+'</span>';
    });
    return h+'</div>';
  }

  // —— 应用:替换选区 ——
  function applyAIResult(){
    if(!aiResult||!aiSel||!aiResult.items.length){flash('没有可填入的内容');return;}
    if(aiTarget==='melody'){
      const del=aiSel.i1-aiSel.i0+1;
      melody.splice(aiSel.i0,del,...aiResult.items.map(x=>Object.assign({},x)));
      caret=Math.min(aiSel.i0+aiResult.items.length,melody.length);
    }else{
      // 删除选区内旧和弦,插入新和弦
      for(let i=chords.length-1;i>=0;i--){if(chords[i].at>=aiSel.b0-1e-6&&chords[i].at<aiSel.b1-1e-6)chords.splice(i,1);}
      aiResult.items.forEach(c=>chords.push(Object.assign({},c)));
      sortChords();
    }
    commitPhrase();renderMelody();renderChordTrack();
    flash('已填入');closeAI();
  }

  // —— 试听:把 AI 结果临时合入当前乐句,从段落开头完整播放,停止后还原(不改数据)——
  function buildPreviewData(){
    // 返回临时的 melody/chords(应用了 aiResult),不改全局
    let mel=melody.map(x=>Object.assign({},x)), chs=chords.map(x=>Object.assign({},x));
    if(!aiResult||!aiSel)return {mel,chs};
    if(aiTarget==='melody'){
      const del=aiSel.i1-aiSel.i0+1;
      mel.splice(aiSel.i0,Math.max(0,del),...aiResult.items.map(x=>Object.assign({},x,{_ghost:true})));
    }else{
      chs=chs.filter(c=>!(c.at>=aiSel.b0-1e-6&&c.at<aiSel.b1-1e-6));
      aiResult.items.forEach(c=>chs.push(Object.assign({},c,{_ghost:true})));
      chs.sort((a,b)=>a.at-b.at);
    }
    return {mel,chs};
  }
  function previewPlayAI(){
    if(playing){stopPlayback();return;}
    if(!aiResult||!aiSel){flash('先生成内容');return;}
    const {mel,chs}=buildPreviewData();
    aiPreviewBackup={melody,chords};   // 备份真实引用
    melody=mel;chords=chs;             // 临时替换
    renderMelody();renderChordTrack();
    const restore=()=>{ if(aiPreviewBackup){melody=aiPreviewBackup.melody;chords=aiPreviewBackup.chords;aiPreviewBackup=null;renderMelody();renderChordTrack();} };
    aiPreviewRestore=restore; // 供 stopPlayback(手动停止/播完)时还原
    playMelody({fromStart:true,noLoop:true,onEnd:()=>{stopPlayback();}});
  }

    const rd=$('aipRedo');if(rd)rd.addEventListener('click',runAI);

  async function runAI(){
    if(!aiSel){flash('先在轨道上拖选一段');return;}
    if(aiBusy)return;
    const userText=($('aipNote')&&$('aipNote').value||'').trim();
    aiBusy=true;aiResult=null;renderAIPanel();
    try{
      const ctx=aiContext();const {system,user}=buildAIPrompt(ctx,userText);
      const j=await callDeepSeek(system,user);
      aiResult=parseAIResult(j);
      if(!aiResult.items.length)flash('AI 没给出可用内容,换个说法再试');
    }catch(e){
      if(e.message==='NO_KEY')flash('请先填入 DeepSeek API Key');
      else flash('生成失败:'+e.message);
    }
    aiBusy=false;renderAIPanel();
  }

  // 轨道上绑定框选(捕获阶段,armed 时拦截,避免触发音符/和弦原有点击)
  // AI 小节点选:改为点小节格(renderMeasureCells 里绑 click),不再用轨道拖选

  function renderChordTrack(){
    if(!chordInner)return;
    sortChords();chordInner.innerHTML='';
    const segs=melodySegs();
    const span=totalSpan();
    let totalW=Math.max(melodyBox.scrollWidth||0, beatToX(span,segs));
    const mL=measureLen();
    // 小节竖线
    for(let m=1;m*mL<span+1e-6;m++){
      const ln=document.createElement('div');ln.className='cbar';ln.style.left=beatToX(m*mL,segs)+'px';chordInner.appendChild(ln);
    }
    // 每小节一个透明可点区(与和弦块同坐标系,点它=把插入位定到该小节起拍,零坐标误差)
    const spanM=Math.max(1,Math.ceil(span/mL))+3; // 末尾多给几格,便于往后加
    for(let m=0;m<spanM;m++){
      const l=beatToX(m*mL,segs),r=beatToX((m+1)*mL,segs);
      const hz=document.createElement('div');hz.className='ct-hit';hz.dataset.at=m*mL;
      hz.style.left=l+'px';hz.style.width=Math.max(20,r-l)+'px';chordInner.appendChild(hz);
    }
    // 位置光标:手动选中显示实线"在此放";否则显示下一个顺序插入位(淡)
    const caretAt=(selChordAt!=null)?selChordAt:chordCursor;
    if(caretAt!=null){
      const cx=beatToX(caretAt,segs);
      const car=document.createElement('div');car.className='chord-caret'+(selChordAt!=null?'':' ghost');car.style.left=(cx-1)+'px';
      if(selChordAt!=null)car.innerHTML='<span class="cc-tip">在此放和弦</span>';
      chordInner.appendChild(car);
    }
    // 和弦块:起点清晰,向右渐隐;渐隐范围 = min(到下一和弦, 一小节)
    chords.forEach((c,i)=>{
      const start=c.at;
      const fadeEnd=Math.min(chordEndBeat(i),start+mL); // 渐隐最长一小节
      const left=beatToX(start,segs),w=Math.max(34,beatToX(fadeEnd,segs)-left);
      const slot=document.createElement('div');slot.dataset.i=i;
      slot.className='chord-clip func-'+c.func+(c._ghost?' ai-ghost':'');
      slot.style.left=left+'px';slot.style.width=w+'px';
      // 左侧把手=拖动热区(触摸时才独占,不与音轨滑动打架);其余区域点=选中/试听
      slot.innerHTML='<span class="cc-start"></span><span class="cc-drag" title="拖动移位">⋮</span><span class="cname">'+chordName(c)+'</span>';
      clipInteract(slot,i,c);
      chordInner.appendChild(slot);
    });
    chordInner.style.width=totalW+'px';
    if(chordTrack)chordTrack.scrollLeft=melodyBox.scrollLeft;
    if(ctInfo)ctInfo.textContent=chords.length?(chords.length+'个和弦'):'';
  }

  // 和弦块交互:
  //  · 拖动只从左侧把手(.cc-drag)发起 → 不和音轨横向滑动打架
  //  · 块主体:轻点=选位/试听,长按=加花/删除
  function clipInteract(el,i,c){
    const grip=el.querySelector('.cc-drag');
    // 主体点击/长按(不含把手)
    let lp=null,fired=false,px=0,py=0;
    el.addEventListener('pointerdown',e=>{
      if(e.target===grip)return; // 把手交给拖动逻辑
      fired=false;px=e.clientX;py=e.clientY;
      lp=setTimeout(()=>{fired=true;if(navigator.vibrate)navigator.vibrate(14);openVariants(c,i);},420);
    });
    el.addEventListener('pointermove',e=>{if(lp&&Math.hypot(e.clientX-px,e.clientY-py)>10){clearTimeout(lp);lp=null;}});
    el.addEventListener('pointerup',e=>{
      if(e.target===grip)return;
      if(lp){clearTimeout(lp);lp=null;}if(fired)return;
      const segs=melodySegs();const rect=chordTrack.getBoundingClientRect();
      const at=snapBeat(xToBeat(e.clientX-rect.left+chordTrack.scrollLeft,segs));
      if(Math.abs(at-c.at)<0.25){playChord(c,600,true);selChordAt=null;}
      else{selChordAt=at;flash('在此处点和弦→上个和弦到此终止');}
      renderChordTrack();
    });
    el.addEventListener('pointercancel',()=>{if(lp){clearTimeout(lp);lp=null;}});
    // 把手拖动
    if(grip){
      let dragging=false,curAt=c.at,segsCache=null,pid=null;
      grip.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();
        dragging=true;curAt=c.at;pid=e.pointerId;segsCache=melodySegs();
        document.body.classList.add('resizing');try{grip.setPointerCapture(pid);}catch(_){}});
      grip.addEventListener('pointermove',e=>{if(!dragging)return;e.preventDefault();e.stopPropagation();
        const rect=chordTrack.getBoundingClientRect();const x=e.clientX-rect.left+chordTrack.scrollLeft;
        let at=snapBeat(xToBeat(x,segsCache));
        const prev=i>0?chords[i-1].at+0.5:0, next=i<chords.length-1?chords[i+1].at-0.5:1e9;
        at=Math.max(prev,Math.min(next,at));curAt=at;el.style.left=beatToX(at,segsCache)+'px';});
      const gend=e=>{if(!dragging)return;dragging=false;document.body.classList.remove('resizing');
        try{grip.releasePointerCapture(pid);}catch(_){}
        chords[i].at=curAt;sortChords();renderChordTrack();};
      grip.addEventListener('pointerup',gend);grip.addEventListener('pointercancel',gend);
    }
  }

  function renderChordPal(){
    if(!chordPal)return;
    chordPal.innerHTML='';
    diatonicChords(key).forEach(c=>{
      const b=document.createElement('button');b.className='chord-btn func-'+c.func;
      b.innerHTML='<span class="cn">'+chordName(c)+'</span><span class="rn">'+c.roman+'</span>';
      let lp=null,fired=false,px=0,py=0;
      b.addEventListener('pointerdown',e=>{fired=false;px=e.clientX;py=e.clientY;
        lp=setTimeout(()=>{fired=true;if(navigator.vibrate)navigator.vibrate(14);openVariants(c,-1);},460);});
      b.addEventListener('pointermove',e=>{if(lp&&Math.hypot(e.clientX-px,e.clientY-py)>10){clearTimeout(lp);lp=null;}});
      b.addEventListener('pointerup',()=>{if(lp){clearTimeout(lp);lp=null;}if(!fired){hit(b);
        if(tryMode){playChord(c,700,true);pushRecentChord(c);if(isMobileMode)spawnBubble({kind:'chord',chord:c});}else{fillChord(c);}}}); // 试听态:只发声、冒成泡泡,不直接填入
      b.addEventListener('pointercancel',()=>{if(lp){clearTimeout(lp);lp=null;}});
      chordPal.appendChild(b);
    });
    // 自定义和弦按钮(点=填入,长按=删除)
    customPals.forEach((sp,ci)=>{
      const c={rootLetter:sp.rootLetter,rootPC:sp.rootPC,quality:'custom',spec:sp,func:specFunc(sp),section:section};
      const b=document.createElement('button');b.className='chord-btn func-'+c.func+' custom';
      b.innerHTML='<span class="cn">'+specName(sp)+'</span><span class="rn">自定义</span>';
      let lp=null,fired=false,px=0,py=0;
      b.addEventListener('pointerdown',e=>{fired=false;px=e.clientX;py=e.clientY;
        lp=setTimeout(()=>{fired=true;if(navigator.vibrate)navigator.vibrate(14);
          if(confirm('删除自定义和弦「'+specName(sp)+'」?')){customPals.splice(ci,1);renderChordPal();}},520);});
      b.addEventListener('pointermove',e=>{if(lp&&Math.hypot(e.clientX-px,e.clientY-py)>10){clearTimeout(lp);lp=null;}});
      b.addEventListener('pointerup',()=>{if(lp){clearTimeout(lp);lp=null;}if(!fired){hit(b);
        if(tryMode){playChord(c,700,true);pushRecentChord(c);if(isMobileMode)spawnBubble({kind:'chord',chord:c});}else{fillChord(c);}}});
      b.addEventListener('pointercancel',()=>{if(lp){clearTimeout(lp);lp=null;}});
      chordPal.appendChild(b);
    });
    // 末尾:虚线加号 → 打开构建面板
    const add=document.createElement('button');add.className='chord-btn cb-add-btn';
    add.innerHTML='<span class="cn">＋</span>';add.title='自定义和弦';
    add.addEventListener('click',()=>{hit(add);openChordBuilder();});
    chordPal.appendChild(add);
  }

  // 加花:target>=0 改已有和弦 i;target=-1 表示对和弦盘按钮长按(新建变体到选中位)
  function openVariants(baseC,target){
    const triadQual=(CURCHORDS[baseC.degree]||{}).quality||'maj';
    const vars=variantsFor(triadQual);
    const curQual=(target>=0&&chords[target])?chords[target].quality:baseC.quality;
    let html='<div class="var-pop"><div class="vp-head">为 <b>'+baseC.rootLetter+'</b>('+baseC.roman+')加花 · 选一种色彩</div><div class="var-grid">';
    vars.forEach(v=>{const nm=baseC.rootLetter+(QUAL_SUFFIX[v.q]||'');
      html+='<button class="var-item'+(v.q===curQual?' on':'')+'" data-q="'+v.q+'"><span>'+nm+'</span><span class="vdesc">'+v.desc+'</span></button>';});
    html+='</div>';
    if(target>=0)html+='<button class="ai-close var-clear" id="varClear">删除此和弦</button>';
    html+='<button class="ai-close" id="varClose">关闭</button></div>';
    varCard.innerHTML=html;varOverlay.classList.add('show');
    setTimeout(()=>{
      varCard.querySelectorAll('.var-item').forEach(vb=>vb.addEventListener('click',()=>{
        const q=vb.dataset.q;
        if(target>=0){const nc=Object.assign({},chords[target],baseC,{quality:q,at:chords[target].at});chords[target]=nc;playChord(nc,700,true);renderChordTrack();}
        else fillChord(baseC,q);
        varOverlay.classList.remove('show');
      }));
      const cl=$('varClear');if(cl)cl.addEventListener('click',()=>{const delAt=chords[target].at;chords.splice(target,1);selChordAt=null;chordCursor=delAt;renderChordTrack();varOverlay.classList.remove('show');flash('已删除,下一个填回这里');});
      const cc=$('varClose');if(cc)cc.addEventListener('click',()=>varOverlay.classList.remove('show'));
    },40);
  }

  function chordAtBeat(b){ // 当前拍属于哪个和弦(最后一个 at<=b)
    let idx=-1;for(let i=0;i<chords.length;i++){if(chords[i].at<=b+1e-6)idx=i;else break;}return idx;
  }
  function highlightChordClip(idx){if(!chordInner)return;chordInner.querySelectorAll('.chord-clip').forEach((s)=>s.classList.toggle('playing',parseInt(s.dataset.i)===idx));}

  // ═══ L2 经典进行套路(铺成一小节一个) ═══
  const progOverlay=$('progOverlay'),progCard=$('progCard');
  function openProgressions(){
    const minorK=(MODES[modeId].parent==='minor');
    let html='<h3>🎼 经典和弦进行</h3><div class="ai-desc">一键铺成每小节一个和弦,可再拖动/替换</div><div class="prog-list">';
    PROGRESSIONS.forEach((p,pi)=>{
      const dia=diatonicChords(key);const preview=p.degs.map(d=>chordName(dia[d])).join(' - ');
      html+='<div class="prog-item" data-pi="'+pi+'"><div class="pname">'+p.name+(p.key===(minorK?'minor':'major')?' <span class="pdeg">·契合当前调</span>':'')+'</div><div class="pdeg">'+preview+'</div><div class="pdesc">'+p.desc+'</div></div>';
    });
    html+='</div><button class="ai-close" id="progClose">关闭</button>';
    progCard.innerHTML=html;progOverlay.classList.add('show');
    setTimeout(()=>{
      progCard.querySelectorAll('.prog-item').forEach(it=>it.addEventListener('click',()=>{
        applyProgression(PROGRESSIONS[parseInt(it.dataset.pi)]);progOverlay.classList.remove('show');
      }));
      const cl=$('progClose');if(cl)cl.addEventListener('click',()=>progOverlay.classList.remove('show'));
    },40);
  }
  function applyProgression(p){
    const dia=diatonicChords(key),mL=measureLen();
    chords.length=0;p.degs.forEach((d,i)=>chords.push(Object.assign({},dia[d],{at:i*mL,section:section})));
    selChordAt=null;chordCursor=p.degs.length*mL;renderChordTrack();flash('已套用:'+p.name);
  }
  progOverlay.addEventListener('click',e=>{if(e.target===progOverlay)progOverlay.classList.remove('show');});

  // 只播和弦进行(无旋律时);按每个和弦的真实时长走,支持循环 + 停止
  function playChordProgression(){
    if(playing){stopPlayback();return;}
    if(!chords.length){flash('还没有和弦');return;}
    if(timer){clearTimeout(timer);timer=null;}
    const a=audio();if(a.state==='suspended'){a.resume();}
    playing=true;btnPlay.textContent='⏸';btnPlay.classList.add('playing');startGroove();
    const bpm=parseInt(speedSlider.value),baseMs=(60/bpm)*1000;let j=0;
    function step(){
      if(!playing)return;
      if(j>=chords.length){if(playRangeMode==='loop'){j=0;}else{stopPlayback();return;}}
      const c=chords[j],dur=chordEndBeat(j)-c.at;
      highlightChordClip(j);playChord(c,baseMs*dur*0.92,true);
      j++;timer=setTimeout(step,baseMs*dur);
    }
    step();
  }

  // 旋律轨 ⇆ 歌词轨 ⇆ 和弦轨 横向滚动同步(三轨始终对齐)
  let syncing=false;
  function syncScroll(x){if(syncing)return;syncing=true;
    if(melodyBox.scrollLeft!==x)melodyBox.scrollLeft=x;
    if(chordTrack&&chordTrack.scrollLeft!==x)chordTrack.scrollLeft=x;
    if(lyricTrack&&lyricTrack.scrollLeft!==x)lyricTrack.scrollLeft=x;
    if(typeof phLayout==='function'&&phLayout)phLayout(); // 滚动时同步移动播放光标
    syncing=false;}
  melodyBox.addEventListener('scroll',()=>syncScroll(melodyBox.scrollLeft));
  if(chordTrack)chordTrack.addEventListener('scroll',()=>syncScroll(chordTrack.scrollLeft));
  if(lyricTrack)lyricTrack.addEventListener('scroll',()=>syncScroll(lyricTrack.scrollLeft));
  // 乐谱左右滚动:按住持续滚动,越按越快(松手停);轻点走一小步
  const _sl=$('scrollL'),_sr=$('scrollR');
  function holdScroll(btn,dir){
    if(!btn)return;let raf=null,vel=0,held=false,t0=0;
    function tick(){if(!held)return;vel=Math.min(26,vel+0.6);melodyBox.scrollLeft+=dir*vel;raf=requestAnimationFrame(tick);}
    function start(e){e.preventDefault();held=true;vel=6;btn.classList.add('holding');raf=requestAnimationFrame(tick);}
    function stop(){held=false;if(raf)cancelAnimationFrame(raf);btn.classList.remove('holding');}
    btn.addEventListener('pointerdown',start);
    btn.addEventListener('pointerup',stop);btn.addEventListener('pointerleave',stop);btn.addEventListener('pointercancel',stop);
  }
  holdScroll(_sl,-1);holdScroll(_sr,1);

  // 点轨聚焦:点哪条轨,哪条轨点亮为当前编辑对象(旋律 / 歌词 / 和弦);离开歌词轨自动结束填词
  let panel='melody',prevPanel='melody';
  function setPanel(p){
    if(lyEdit&&p!=='lyric')endLyEdit();
    panel=p;
    document.body.classList.toggle('focus-melody',p==='melody');
    document.body.classList.toggle('focus-lyric',p==='lyric');
    document.body.classList.toggle('focus-chord',p==='chord');
    if(p==='chord'){renderChordPal();renderChordTrack();}
  }
  // 试听态是"没有在编辑哪条轨"的全局态:点轨不自动切换(靠录入/试听切换进出)
  melodyBox.addEventListener('pointerdown',()=>{if(!tryMode&&panel!=='melody')setPanel('melody');},true);
  if(chordTrack)chordTrack.addEventListener('pointerdown',()=>{if(!tryMode&&panel!=='chord')setPanel('chord');},true);
  if(lyricTrack)lyricTrack.addEventListener('pointerdown',()=>{if(!tryMode&&panel!=='lyric')setPanel('lyric');},true);
  // 点和弦轨小节可点区 = 把插入位光标定到该小节起拍(和弦块自身点击由 clipInteract 处理)
  if(chordInner)chordInner.addEventListener('click',e=>{
    if(e.target.closest&&e.target.closest('.chord-clip'))return;
    const hit=e.target.closest&&e.target.closest('.ct-hit');if(!hit)return;
    selChordAt=parseFloat(hit.dataset.at)||0;
    renderChordTrack();flash('已选位置 · 点下方和弦放入');
  });
  // 轨道头点击:聚焦对应轨(点歌词头顺带进入填词);若在试听态,先退出试听
  document.querySelectorAll('.lane-head').forEach(h=>h.addEventListener('click',()=>{
    if(tryMode)setTryMode(false);
    const p=h.dataset.lane;
    if(p==='lyric'){if(!lyEdit)startLyEdit();else setPanel('lyric');}
    else setPanel(p);
  }));
  setPanel('melody'); // 初始聚焦旋律轨
  varOverlay.addEventListener('click',e=>{if(e.target===varOverlay)varOverlay.classList.remove('show');});

  // 段落
  document.querySelectorAll('#sectionRow button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#sectionRow button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');
    section=b.dataset.sec;flash('当前段落:'+b.textContent);
  }));

  // 和弦休止 / 套路 / 试听进行
  const btnChordClear=$('btnChordClear');if(btnChordClear)btnChordClear.addEventListener('click',()=>{if(!chords.length){flash('没有和弦');return;}chords.length=0;selChordAt=null;chordCursor=0;renderChordTrack();flash('已清空和弦');});
  const btnProg=$('btnProg');if(btnProg)btnProg.addEventListener('click',openProgressions);

  // ═══ 键盘快捷键 ═══
  document.addEventListener('keydown',e=>{
    if(isMobileMode)return;
    if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName))return;
    if(aiOverlay.classList.contains('show'))return;
    if(e.metaKey||e.ctrlKey||e.altKey)return;
    const k=e.key;
    if(!e.shiftKey&&k>='1'&&k<='7'){
      e.preventDefault();const idx=parseInt(k)-1;
      if(curIn[idx]){hit(inBtns[idx]);ripple(inBtns[idx]);add(curIn[idx][0],curIn[idx][1],true);}
      return;
    }
    if(e.shiftKey&&k>='1'&&k<='5'){
      e.preventDefault();const idx=parseInt(k)-1;
      if(curOut[idx]){hit(outBtns[idx]);ripple(outBtns[idx],'rgba(235,207,134,0.6)');addOut(curOut[idx][0],curOut[idx][1],curOut[idx][2]);}
      return;
    }
    if(k==='ArrowLeft'){e.preventDefault();if(octave>-1){octave--;renderNotes();flash(OCT_LABELS[octave]+'音区');}else{flash('已是最低音区');}return;}
    if(k==='ArrowRight'){e.preventDefault();if(octave<1){octave++;renderNotes();flash(OCT_LABELS[octave]+'音区');}else{flash('已是最高音区');}return;}
    if(k===' '){e.preventDefault();hit(tieBtn);addTie();return;}
    if(k==='0'){e.preventDefault();hit(restBtn);addRest();return;}
    if(k==='Enter'){e.preventDefault();playMelody();return;}
    if(k==='Backspace'||k==='Delete'){e.preventDefault();if(playing)return;if(melody.length){melody.pop();renderMelody();flash('已撤销');}return;}
  });

  // ═══ 切换调:保持简谱级数,整体移到新调 ═══
  const PC_NAME=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  function transposeNote(note,semis){
    const m=note&&note.match(/^([A-G][#b]?)(\d)$/);if(!m)return note;
    const abs=(parseInt(m[2])+1)*12+PC[m[1]]+semis;
    return PC_NAME[((abs%12)+12)%12]+(Math.floor(abs/12)-1);
  }
  function parseDeg(label){ // 从简谱标签解析级数与八度
    let oct=0;if(label.indexOf('̲')>=0)oct=-1;else if(label.indexOf('̄')>=0)oct=1;
    const base=label.replace(/[̲̄]/g,'');
    if(/^[1-7]$/.test(base))return{deg:parseInt(base)-1,oct:oct,inKey:true};
    return{inKey:false};
  }
  // 切换主音/调式/变调夹后:重建音阶,按简谱标签把旋律重映射到新调式,和弦按级数重映射
  function applyKey(nTonic,nMode,nCapo){
    commitPhrase(); // 先把当前缓冲写回,整首歌统一调性
    const oldQual=CURCHORDS.map(c=>c.quality); // 旧调式各级基本三和弦(用于识别未加花的和弦)
    const oldTonic=tonicPC; // 记录旧主音,自定义和弦按主音差整体移调
    tonicPC=((nTonic%12)+12)%12;modeId=nMode in MODES?nMode:'major';capo=nCapo|0;
    const tDelta=((tonicPC-oldTonic)%12+12)%12; // 主音升了几个半音
    rebuildKey();
    // 建 标签→音符 映射表(含高低音区 + 调外)
    const cur=SCALES[key],oc=OCT[key],labMap={};
    const put=arr=>arr.forEach(([n,l])=>{if(!(l in labMap))labMap[l]=n;});
    put(cur.inKey);put(oc.down);put(oc.up);
    // 调外音:升号/降号两种写法都登记(等音,指向同一音符)
    cur.outKey.forEach(([n,sh,fl])=>{if(!(sh in labMap))labMap[sh]=n;if(!(fl in labMap))labMap[fl]=n;});
    const remapMel=mel=>mel.map(n=>{
      if(n.rest||n.tie)return n;
      const nn=labMap[n.label];
      if(nn){const isIn=cur.inKey.concat(oc.down,oc.up).some(([,l])=>l===n.label);
        return Object.assign({},n,{note:nn,inKey:isIn,freq:soundFreq(nn)});}
      // 该标签在新调式中不存在(如切到五声后的 4/7):保留原音名,重算发声,标为调外
      return Object.assign({},n,{inKey:false,freq:soundFreq(n.note)});
    });
    // 和弦:级数不变,根音/性质换成新调式对应级数(加花变体保留)
    const remapCh=arr=>arr.map(c=>{
      // 自定义和弦是绝对和弦:按主音差整体移调(根音+斜杠低音),级数结构不变
      if(c.spec){
        const sp=Object.assign({},c.spec);sp.rootPC=(sp.rootPC+tDelta)%12;sp.rootLetter=NAMES[sp.rootPC];
        if(sp.bass&&sp.bass.mode==='slash'&&sp.bass.notePC!=null)sp.bass=Object.assign({},sp.bass,{notePC:(sp.bass.notePC+tDelta)%12});
        else sp.bass=Object.assign({},sp.bass);
        return Object.assign({},c,{spec:sp,rootPC:sp.rootPC,rootLetter:sp.rootLetter,func:specFunc(sp)});
      }
      const nd=CURCHORDS[c.degree]||CURCHORDS[0];if(!nd)return c;
      let q=c.quality;if(oldQual[c.degree]&&q===oldQual[c.degree])q=nd.quality;
      return Object.assign({},c,{rootLetter:nd.rootLetter,rootPC:nd.rootPC,func:nd.func,roman:nd.roman,quality:q});
    });
    // 整首歌每个乐句都重映射(调性是全曲统一的)
    song.forEach(p=>{p.melody=remapMel(p.melody);p.chords=remapCh(p.chords);});
    // 自定义和弦盘按钮:绝对和弦,随主音差整体移调
    customPals=customPals.map(sp=>{const ns=Object.assign({},sp);ns.rootPC=(sp.rootPC+tDelta)%12;ns.rootLetter=NAMES[ns.rootPC];
      if(sp.bass&&sp.bass.mode==='slash'&&sp.bass.notePC!=null)ns.bass=Object.assign({},sp.bass,{notePC:(sp.bass.notePC+tDelta)%12});else ns.bass=Object.assign({},sp.bass);
      return ns;});
    const p=song[curPhrase];melody=p.melody;chords=p.chords;
    octave=0;renderNotes();renderMelody();renderChordTrack();
    updateKeyBtn();
  }
  function updateKeyBtn(){const b=$('keyBtn');if(b)b.textContent=keyDisplay()+(capo>0?(' +'+capo):capo<0?(' '+capo):'');if(typeof syncPropsBar==='function')syncPropsBar();}

  // ═══ 调性弹窗:主音 + 调式 + 变调夹 + AI判调 ═══
  const keyOverlay=$('keyOverlay'),keyCard=$('keyCard');
  function openKeyPicker(){
    const hasContent=melody.some(n=>!n.rest&&!n.tie)||chords.length>0;
    let html='<h3>选择调性</h3>';
    html+='<div class="kp-label">主音</div><div class="kp-grid tonics">';
    NAMES.forEach((nm,pc)=>{html+='<button class="kp-btn'+(pc===tonicPC?' on':'')+'" data-t="'+pc+'">'+nm+'</button>';});
    html+='</div>';
    html+='<div class="kp-label">调式</div><div class="kp-grid modes">';
    Object.keys(MODES).forEach(mid=>{html+='<button class="kp-btn wide'+(mid===modeId?' on':'')+'" data-m="'+mid+'">'+MODES[mid].name+'</button>';});
    html+='</div>';
    html+='<div class="kp-label">升降调(整体升高/降低,记谱与级数不变)</div><div class="kp-capo"><button class="kp-cbtn" id="capoDown">−</button><span id="capoVal">'+(capo>0?'+'+capo:capo)+' 半音</span><button class="kp-cbtn" id="capoUp">+</button></div>';
    html+='<button class="kp-ai'+(hasContent?'':' disabled')+'" id="kpAI"'+(hasContent?'':' disabled')+'>✨ AI 判调'+(hasContent?'':'(先录点音符或和弦)')+'</button>';
    html+='<button class="ai-close" id="kpClose">完成</button>';
    keyCard.innerHTML=html;keyOverlay.classList.add('show');
    setTimeout(()=>{
      keyCard.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',()=>{applyKey(parseInt(b.dataset.t),modeId,capo);openKeyPicker();}));
      keyCard.querySelectorAll('[data-m]').forEach(b=>b.addEventListener('click',()=>{applyKey(tonicPC,b.dataset.m,capo);openKeyPicker();}));
      const cu=$('capoUp'),cd=$('capoDown');
      if(cu)cu.addEventListener('click',()=>{if(capo<12){applyKey(tonicPC,modeId,capo+1);$('capoVal').textContent=(capo>0?'+'+capo:capo)+' 半音';}});
      if(cd)cd.addEventListener('click',()=>{if(capo>-12){applyKey(tonicPC,modeId,capo-1);$('capoVal').textContent=(capo>0?'+'+capo:capo)+' 半音';}});
      const ai=$('kpAI');if(ai&&hasContent)ai.addEventListener('click',()=>{keyOverlay.classList.remove('show');showAIResult();});
      const cl=$('kpClose');if(cl)cl.addEventListener('click',()=>keyOverlay.classList.remove('show'));
    },40);
  }
  keyOverlay.addEventListener('click',e=>{if(e.target===keyOverlay)keyOverlay.classList.remove('show');});
  $('keyBtn').addEventListener('click',openKeyPicker);

  // ═══════════════════════════════════════════
  //  乐句系统:数据模型 + 胶囊条 + 切换/新建/删除/复制/段落
  // ═══════════════════════════════════════════
  const phraseBar=$('phraseBar'),phraseOverlay=$('phraseOverlay'),phraseCard=$('phraseCard');
  // 把当前编辑缓冲(melody/chords/section)写回当前乐句
  function commitPhrase(){const p=song[curPhrase];if(p){p.melody=melody;p.chords=chords;p.section=section;}}
  // 载入某乐句到编辑缓冲(不提交,调用方负责先 commit)
  function activatePhrase(i){
    curPhrase=Math.max(0,Math.min(i,song.length-1));
    const p=song[curPhrase];
    melody=p.melody;chords=p.chords;section=p.section||'verse';
    selChordAt=null;chordCursor=chords.length?(chords[chords.length-1].at+measureLen()):0;
    playStart=0;caret=melody.length;octave=0;
    renderNotes();renderMelody();renderChordTrack();
  }
  // 乐句标签:同段落多于一个时带序号(主歌1 / 主歌2 / 副歌…)
  function phraseLabel(i){
    const s=song[i].section,total=song.reduce((c,p)=>c+(p.section===s?1:0),0);
    if(total<=1)return SECTIONS[s]||'乐句';
    let n=0;for(let k=0;k<=i;k++)if(song[k].section===s)n++;
    return (SECTIONS[s]||'乐句')+n;
  }
  function renderPhraseBar(){
    if(!phraseBar)return;
    let h='<div class="ph-track">';
    song.forEach((p,i)=>{
      if(i>0)h+='<span class="ph-link"></span>';
      const cnt=(p.melody||[]).filter(n=>!n.rest&&!n.tie).length;
      h+='<button class="ph-cap sec-'+(p.section||'verse')+(i===curPhrase?' on':'')+'" data-i="'+i+'">'
        +'<span class="pc-name">'+phraseLabel(i)+'</span>'
        +'<span class="pc-meta">'+(cnt?cnt+'音':'空')+'</span></button>';
    });
    h+='</div>';
    h+='<button class="ph-add" id="phAdd" title="新建乐句">＋</button>';
    h+='<button class="ph-play'+(playing&&chainPlaying?' playing':'')+'" id="phPlay" title="整曲连播">▶全曲</button>';
    phraseBar.innerHTML=h;
    phraseBar.querySelectorAll('.ph-cap').forEach(b=>bindCapDrag(b,+b.dataset.i));
    const a=$('phAdd');if(a)a.addEventListener('click',newPhrase);
    const pp=$('phPlay');if(pp)pp.addEventListener('click',playSong);
    // 当前句滚动到可见
    const on=phraseBar.querySelector('.ph-cap.on');if(on)on.scrollIntoView({inline:'center',block:'nearest'});
  }
  function switchPhrase(i){
    if(i===curPhrase)return;if(playing)stopPlayback();
    commitPhrase();activatePhrase(i);renderPhraseBar();scrollToCaret();
  }
  // 拖动重排:按住胶囊横向拖 → 实时显示插入位;未超阈值则视为点击(切换/设置)
  function bindCapDrag(el,idx){
    el.addEventListener('pointerdown',e=>{
      if(e.button!=null&&e.button>0)return; // 忽略右键
      const startX=e.clientX,startY=e.clientY;
      let dragging=false,to=idx,line=null;
      const cleanup=()=>{
        document.removeEventListener('pointermove',onMove);
        document.removeEventListener('pointerup',onUp);
        document.removeEventListener('pointercancel',onCancel);
      };
      const onMove=ev=>{
        const dx=ev.clientX-startX,dy=ev.clientY-startY;
        if(!dragging){
          if(Math.abs(dx)<7||Math.abs(dx)<Math.abs(dy))return; // 需横向且超阈值,纵向留给页面滚动
          if(playing)stopPlayback();
          dragging=true;el.classList.add('dragging');document.body.classList.add('ph-dragging');
          try{el.setPointerCapture(ev.pointerId);}catch(_){}
          line=document.createElement('div');line.className='ph-drop-line';phraseBar.appendChild(line);
          if(navigator.vibrate)try{navigator.vibrate(15);}catch(_){}
        }
        ev.preventDefault();
        el.style.transform='translateX('+dx+'px) scale(1.09)';
        to=updateDrop(el,ev.clientX,line);
      };
      const onUp=()=>{
        cleanup();
        if(dragging){
          el.classList.remove('dragging');el.style.transform='';document.body.classList.remove('ph-dragging');
          if(line)line.remove();movePhrase(idx,to);
        }else{ // 点击
          if(idx===curPhrase)openPhrasePopup(idx);else switchPhrase(idx);
        }
      };
      const onCancel=()=>{
        cleanup();
        if(dragging){el.classList.remove('dragging');el.style.transform='';document.body.classList.remove('ph-dragging');if(line)line.remove();renderPhraseBar();}
      };
      document.addEventListener('pointermove',onMove,{passive:false});
      document.addEventListener('pointerup',onUp);
      document.addEventListener('pointercancel',onCancel);
    });
  }
  // 计算指针落点对应的插入序(在"移除被拖元素后"列表里的位置),并把指示线放到对应缝隙
  function updateDrop(el,px,line){
    const others=[...phraseBar.querySelectorAll('.ph-cap')].filter(c=>c!==el);
    let to=0;others.forEach(c=>{const r=c.getBoundingClientRect();if(r.left+r.width/2<px)to++;});
    if(line){
      const barR=phraseBar.getBoundingClientRect();let x;
      if(!others.length)x=barR.left+16;
      else if(to===0)x=others[0].getBoundingClientRect().left-5;
      else if(to>=others.length)x=others[others.length-1].getBoundingClientRect().right+5;
      else x=(others[to-1].getBoundingClientRect().right+others[to].getBoundingClientRect().left)/2;
      line.style.left=(x-barR.left+phraseBar.scrollLeft)+'px';
    }
    return to;
  }
  // to:在移除 from 之后的数组里的插入位置
  function movePhrase(from,to){
    if(from===to){renderPhraseBar();return;}
    commitPhrase();
    const cur=song[curPhrase];
    const p=song.splice(from,1)[0];
    song.splice(to,0,p);
    curPhrase=song.indexOf(cur); // 编辑缓冲仍指向同一乐句,仅修正其索引
    renderPhraseBar();flash('乐句已重排');
  }
  function newPhrase(){
    if(playing)stopPlayback();commitPhrase();
    song.push({name:'',section:song[curPhrase]?song[curPhrase].section:'verse',desc:'',melody:[],chords:[]});
    activatePhrase(song.length-1);renderPhraseBar();flash('已新建乐句');
  }
  function deletePhrase(i){
    if(song.length<=1){flash('至少保留一个乐句');return;}
    if(playing)stopPlayback();commitPhrase();
    song.splice(i,1);
    let ni=curPhrase;if(i<curPhrase)ni=curPhrase-1;else if(i===curPhrase)ni=Math.min(i,song.length-1);
    activatePhrase(ni);renderPhraseBar();phraseOverlay.classList.remove('show');flash('已删除乐句');
  }
  function copyPhrase(i){
    if(playing)stopPlayback();commitPhrase();
    const p=song[i],clone={name:p.name,section:p.section,desc:p.desc,
      melody:p.melody.map(n=>Object.assign({},n)),chords:p.chords.map(c=>Object.assign({},c))};
    song.splice(i+1,0,clone);activatePhrase(i+1);renderPhraseBar();phraseOverlay.classList.remove('show');flash('已复制乐句');
  }
  function setPhraseSection(sec){
    if(!SECTIONS[sec])return;song[curPhrase].section=sec;section=sec;
    renderPhraseBar();openPhrasePopup(curPhrase);
  }
  function openPhrasePopup(i){
    curPhrase=i;
    let h='<h3>乐句设置 · '+phraseLabel(i)+'</h3>';

  // 取库并做一致性维护:未归类的乐曲=顶层单曲;清理死引用
  function getLib(){
    let lib=loadLib();const saves=loadSaves();
    if(!lib)lib={albums:[],order:[]};
    if(!Array.isArray(lib.albums))lib.albums=[];if(!Array.isArray(lib.order))lib.order=[];
    const saveIds=new Set(saves.map(s=>s.id));
    lib.albums.forEach(a=>{a.songIds=(a.songIds||[]).filter(id=>saveIds.has(id));});
    const inAlbum=new Set();lib.albums.forEach(a=>a.songIds.forEach(id=>inAlbum.add(id)));

    lib.order=lib.order.filter(o=>o&&(o.type==='album'?lib.albums.some(a=>a.id===o.id):(saveIds.has(o.id)&&!inAlbum.has(o.id))));
    lib.order.forEach(o=>{if(o.type==='song')orderSongs.add(o.id);else orderAlbums.add(o.id);});
    lib.albums.forEach(a=>{if(!orderAlbums.has(a.id))lib.order.unshift({type:'album',id:a.id});});
    saves.forEach(s=>{if(!inAlbum.has(s.id)&&!orderSongs.has(s.id))lib.order.unshift({type:'song',id:s.id});});

  // ═══════════════════════════════════════════
  //  哼唱录入:哼一段 → 测音高 → 切分量化 → 吸附到当前调+和弦 → 复用结果面板
  // ═══════════════════════════════════════════
  const humOverlay=$('humOverlay'),humCard=$('humCard');
  let humStream=null,humCtx=null,humAnalyser=null,humBuf=null,humRAF=null,humRecording=false,humTrack=[],humT0=0;
  let humMetroOn=false,metroTimer=null,humBPM=120,humStage='setup';

  // —— 自相关测频(单音哼唱)——
  function autoCorrelate(buf,sr){
    let SIZE=buf.length,rms=0;
    for(let i=0;i<SIZE;i++)rms+=buf[i]*buf[i];
    rms=Math.sqrt(rms/SIZE);
    if(rms<0.006)return -1; // 静音门(放低,避免把人声当静音)
    let r1=0,r2=SIZE-1,th=0.2;
    for(let i=0;i<SIZE/2;i++)if(Math.abs(buf[i])<th){r1=i;break;}
    for(let i=1;i<SIZE/2;i++)if(Math.abs(buf[SIZE-i])<th){r2=SIZE-i;break;}
    const b=buf.slice(r1,r2);const N=b.length;if(N<2)return -1;
    const c=new Array(N).fill(0);
    for(let i=0;i<N;i++)for(let j=0;j<N-i;j++)c[i]+=b[j]*b[j+i];
    let d=0;while(d<N-1&&c[d]>c[d+1])d++;
    let mx=-1,pos=-1;
    for(let i=d;i<N;i++)if(c[i]>mx){mx=c[i];pos=i;}
    if(pos<=0)return -1;
    let T0=pos;const x1=c[T0-1]||0,x2=c[T0],x3=c[T0+1]||0;
    const aa=(x1+x3-2*x2)/2,bb=(x3-x1)/2;if(aa)T0=T0-bb/(2*aa);
    const f=sr/T0;return (f>60&&f<1200)?f:-1;
  }
  async function humStartRec(){
    try{
      // 关掉降噪/回声消除:它们会把持续哼唱当噪声抑制掉,导致测不到音高;只保留自动增益
      const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:true}});
      humStream=stream;const a=audio();humCtx=a;
      const src=a.createMediaStreamSource(stream),an=a.createAnalyser();an.fftSize=1024;src.connect(an);
      humAnalyser=an;humBuf=new Float32Array(an.fftSize);
      humTrack=[];humT0=a.currentTime;humRecording=true;
      if(humMetroOn)startMetro();
      renderHumSetup();humLoop();
    }catch(e){flash('无法使用麦克风:'+(e.message||e.name||'权限被拒'));}
  }
  function humLoop(){
    if(!humRecording)return;
    humAnalyser.getFloatTimeDomainData(humBuf);
    const f=autoCorrelate(humBuf,humCtx.sampleRate);
    const t=humCtx.currentTime-humT0;
    let midi=null;
    if(f>0){const m=Math.round(69+12*Math.log2(f/440));if(m>=45&&m<=88)midi=m;}
    humTrack.push({t,midi});drawHumLine();
    const cnt=$('humCount');if(cnt)cnt.innerHTML='已录 <b>'+t.toFixed(1)+'</b> 秒 · 继续哼,点停止结束';
    humRAF=requestAnimationFrame(humLoop);
  }
  function humStopRec(silent){
    if(!humRecording)return;
    humRecording=false;if(humRAF)cancelAnimationFrame(humRAF);humRAF=null;stopMetro();
    if(humStream){humStream.getTracks().forEach(t=>t.stop());humStream=null;}
    if(silent)return;
    const items=humTrackToNotes(humTrack);
    if(!items.length){flash('没捕捉到音高 · 用「啊/啦」哼、每个音拖长一点、离麦近些再试');renderHumSetup();return;}
    aiTarget='melody';
    aiResult={target:'melody',items,reason:'按当前「'+keyDisplay()+'」和脚下和弦,把你哼的旋律吸附成了简谱——跑调和节奏都帮你归整了。试听下,不满意可重哼或手动微调。'};
    const b0=melody.slice(0,caret).reduce((s,n)=>s+4/(n.durMul||4),0);
    const tot=items.reduce((s,n)=>s+4/(n.durMul||4),0);

  }
  // 切音符 + 量化 + 吸附
  function humTrackToNotes(track){
    if(!track.length)return [];
    // ① 中位数平滑:窗口只取 ±1 帧,压毛刺但不糊掉短音(窗口太大会吃掉快音符)
    const N=track.length,sm=new Array(N);
    for(let i=0;i<N;i++){
      const w=[];for(let j=Math.max(0,i-1);j<=Math.min(N-1,i+1);j++){if(track[j].midi!=null)w.push(track[j].midi);}
      sm[i]=w.length?w.sort((a,b)=>a-b)[w.length>>1]:null;
    }
    // ② 容差合并成段:相邻帧音高差 ≤1 半音视为同一个音(而非精确相等),避免被抖动切碎
    const segs=[];let cur=null;
    for(let i=0;i<N;i++){
      const m=sm[i],t=track[i].t;
      if(cur&&cur.midi!=null&&m!=null&&Math.abs(m-cur.midi)<=1){cur.t1=t;cur.sum+=m;cur.cnt++;}
      else if(cur&&cur.midi==null&&m==null){cur.t1=t;}
      else{if(cur)segs.push(cur);cur={midi:m,t0:t,t1:t,sum:(m==null?0:m),cnt:(m==null?0:1)};}
    }
    if(cur)segs.push(cur);
    // 用段内均值定音高(更稳)
    segs.forEach(s=>{if(s.cnt)s.midi=Math.round(s.sum/s.cnt);});
    // 最短音符门槛:随 BPM 动态 = 半个十六分音符时长,且不超过 55ms,让快音符也能保留
    const sixteenth=60/humBPM/4; // 一个十六分音符的秒数
    const MIN=Math.min(0.055,sixteenth*0.5);
    let clean=segs.filter(s=>(s.t1-s.t0)>=MIN);
    while(clean.length&&clean[0].midi==null)clean.shift();
    while(clean.length&&clean[clean.length-1].midi==null)clean.pop();
    if(!clean.some(s=>s.midi!=null))return [];
    const bpm=humBPM,items=[];
    let atBeat=melody.slice(0,caret).reduce((s,n)=>s+4/(n.durMul||4),0);
    clean.forEach(s=>{
      const durSec=s.t1-s.t0,beats=durSec*bpm/60,durMul=quantizeDur(beats),qb=4/durMul;
      if(s.midi==null){if(beats>=0.4){items.push({rest:true,label:'0',note:null,freq:0,durMul});atBeat+=qb;}return;}
      const snap=snapMidiToKey(s.midi,atBeat);

  function quantizeDur(beats){
    const opts=[['16',0.25],['8',0.5],['8.',0.75],['4',1],['4.',1.5]];

  function snapMidiToKey(midi,atBeat){
    const iv=MODES[modeId].iv,lab=MODES[modeId].lab;
    const rel=((midi-(60+tonicPC))%12+12)%12;
    let pool=iv.map((s,i)=>({s,i}));
    const strong=Math.abs(atBeat-Math.round(atBeat))<0.12;
    const ci=(typeof chordAtBeat==='function')?chordAtBeat(atBeat):-1;
    if(strong&&ci>=0&&chords[ci]){
      const ch=chords[ci],cs=(QUAL_INT[ch.quality]||QUAL_INT.maj).map(x=>((ch.rootPC+x-tonicPC)%12+12)%12);
      const cp=pool.filter(p=>cs.includes(p.s));if(cp.length)pool=cp;
    }
    let best=pool[0],bd=99;
    pool.forEach(p=>{const dd=Math.min((p.s-rel+12)%12,(rel-p.s+12)%12);if(dd<bd){bd=dd;best=p;}});

    return {label,oct,note:degToNote(label,oct)};
  }
  // 节拍器 & 主音。发声可选 tick(电子哒) / drum(强拍底鼓、弱拍军鼓)
  function metroTick(strong){
    const a=audio(),o=a.createOscillator(),g=a.createGain();
    o.frequency.value=strong?1600:1050;o.connect(g);g.connect(masterGain||a.destination);
    const t=a.currentTime;g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.3,t+0.004);g.gain.exponentialRampToValueAtTime(0.0001,t+0.06);

  }
  function metroKick(){ // 底鼓:低频正弦快速下滑 + 短促
    const a=audio(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(48,t+0.11);
    g.gain.setValueAtTime(0.9,t);g.gain.exponentialRampToValueAtTime(0.0008,t+0.16);
    o.connect(g);g.connect(masterGain||a.destination);o.start(t);o.stop(t+0.2);
  }
  function metroSnare(){ // 军鼓:噪声 + 带通,短促

    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
    const src=a.createBufferSource();src.buffer=buf;
    const bp=a.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1900;bp.Q.value=0.7;
    const g=a.createGain();g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.0008,t+0.12);
    src.connect(bp);bp.connect(g);g.connect(masterGain||a.destination);src.start(t);src.stop(t+0.13);

  function metroHat(open){ // 踩镲:高通噪声,很短

  function buildStageData(){

        if(n.tie){for(let i=items.length-1;i>=0;i--){if(items[i].pitched){items[i].beats+=beats;break;}}gb+=beats;return;}
        if(n.rest){items.push({rest:true,start:gb,beats});gb+=beats;return;}

  const scoreOverlay=$('scoreOverlay'),scoreCard=$('scoreCard'),btnScore=$('btnScore');

  // 单个音符 → 简谱单元 HTML。noU=true 时不画自身减时线(交给连梁组统一画)
  function jpNote(n,noU){

    const body=raw.replace(/[̲̄]/g,'');               // 去掉八度记号

    const acc=am?am[1]:'';
    const digit=esc(body.slice(acc.length));           // 纯数字部分
    const beats=jpBeats(n);
    let u=jpUnder(n),dot=false;                                   // 下划线条数 / 附点

  function jpChordSummary(ph){

  // 一个乐句 → 段落块 HTML(小节线按累计拍与编辑区一致的逻辑落点)
  function jpSection(ph,withName){
    const mel=ph.melody||[];
    let h='';
    if(withName)h+='<div class="jp-sec-name">'+esc(SECTIONS[ph.section]||'乐句')+jpChordSummary(ph)+'</div>';
    if(!mel.length){h+='<div class="jp-empty">(此句为空)</div>';return h;}
    h+='<div class="jp-line">';
    const mL=measureLen();
    // 预计算每个音符的累计拍/所在小节/拍号/减时线数
    let cum=0;const arr=mel.map(n=>{const beats=jpBeats(n);const o={n,beats,cum,m:Math.floor(cum/mL+1e-6),bi:Math.floor(cum+1e-6),u:jpUnder(n)};cum+=beats;return o;});
    let curM=0;
    for(let i=0;i<arr.length;i++){
      const it=arr[i];
      if(i>0&&it.m!==curM){h+='<span class="jp-bar">|</span>';}
      curM=it.m;
      // 连梁组:从 i 起,连续 且 同拍(bi) 且 同小节 且 u>=1 的音符
      if(it.u>=1){
        let j=i;const grp=[];
        while(j<arr.length&&arr[j].u>=1&&arr[j].bi===it.bi&&arr[j].m===it.m){grp.push(arr[j]);j++;}
        if(grp.length>=2){
          const allU2=grp.every(g=>g.u>=2);
          h+='<span class="jp-beamgrp">';
          grp.forEach(g=>{h+=jpNote(g.n,true);});
          h+='<span class="jp-beam1"></span>'+(allU2?'<span class="jp-beam2"></span>':'');
          h+='</span>';
          i=j-1;continue;
        }
      }
      h+=jpNote(it.n); // 单独音符,自己画减时线
    }
    h+='<span class="jp-bar end">‖</span></div>';
    return h;
