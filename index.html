<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>写歌灵感 · 意识流旋律</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* 弥散风 · 梦幻亮色 — 半透明玻璃 + 弥散渐变背景;仅气泡保留拟态 */
    --primary:#A6D2EC;        /* 更亮的天空蓝 */
    --primary-deep:#7DB4D6;
    --primary-soft:#C4E2F2;
    --secondary:#A6D2EC;
    --accent:#F2DA97;         /* 更亮奶黄 */
    --accent-deep:#E4C56E;
    --accent-pink:#F3D3DC;
    --ink-blue:#4A6577;
    --bg:#F3F8FC;             /* 背景更亮 */
    --bg-2:#F3F8FC;
    --surface:#FBFDFF;
    --fg:#3A4A5C;
    --fg-dim:#6B7C8C;
    --fg-muted:#9AAAB8;
    /* 弥散玻璃:半透明白 + 毛玻璃(靠 backdrop-filter) */
    --glass:rgba(255,255,255,0.55);
    --glass-2:rgba(255,255,255,0.38);
    --glass-brd:rgba(255,255,255,0.75);
    --glass-brd-soft:rgba(160,185,210,0.22);
    /* 极轻柔单向投影(弥散风) */
    --soft-sh:0 8px 26px rgba(120,150,190,0.14);
    --soft-sh-sm:0 4px 14px rgba(120,150,190,0.12);
    --danger:#EE7A7A;
    --r-xl:30px;
    --r-lg:24px;
    --r-md:18px;
    --r-sm:14px;
    --font:'Plus Jakarta Sans',-apple-system,'Segoe UI',system-ui,'PingFang SC','Hiragino Sans GB',sans-serif;
    --brand-font:'Plus Jakarta Sans',var(--font);
    /* 拟态阴影(仅左上气泡 orb + 灵感气泡 float-bub 用) */
    --neu-raise:6px 6px 14px rgba(163,188,209,0.5),-6px -6px 14px rgba(255,255,255,0.95);
    --neu-raise-sm:4px 4px 10px rgba(163,188,209,0.45),-4px -4px 10px rgba(255,255,255,0.9);
    --neu-press:inset 3px 3px 7px rgba(163,188,209,0.5),inset -3px -3px 7px rgba(255,255,255,0.9);
    /* 选中高光:细描边 + 轻投影 */
    --glow-p:0 0 0 2px rgba(166,210,236,0.7),var(--soft-sh-sm);
    --glow-a:0 0 0 2px rgba(242,218,151,0.7),var(--soft-sh-sm);
  }

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none}

  body{
    font-family:var(--font);color:var(--fg);background:var(--bg);
    display:flex;justify-content:center;align-items:stretch;
    user-select:none;-webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation;
    position:relative;
    /* 亮色底:整体字体抗锯齿更清晰 */
    -webkit-font-smoothing:antialiased;
  }

  /* ══ 弥散风 · 蓝+粉两色柔光渐变背景 ══ */
  .aurora{position:fixed;inset:-20%;z-index:0;filter:blur(90px) saturate(1.05);opacity:0.9;pointer-events:none;}
  .aurora span{position:absolute;border-radius:50%;mix-blend-mode:normal;will-change:transform;}
  /* 蓝 */
  .a1{width:66vmax;height:60vmax;left:-14vmax;top:-16vmax;background:radial-gradient(circle at 38% 34%,#B6DCF4,transparent 66%);animation:drift1 34s ease-in-out infinite;}
  .a3{width:60vmax;height:56vmax;left:-6vmax;bottom:-22vmax;background:radial-gradient(circle at 42% 58%,#C4E4F6,transparent 64%);animation:drift3 40s ease-in-out infinite;}
  /* 粉 */
  .a2{width:56vmax;height:56vmax;right:-12vmax;top:-6vmax;background:radial-gradient(circle at 58% 40%,#F6D6E0,transparent 64%);animation:drift2 38s ease-in-out infinite;}
  .a4{width:46vmax;height:46vmax;right:-6vmax;bottom:-16vmax;background:radial-gradient(circle at 50% 48%,#F3D8E4,transparent 62%);animation:drift4 46s ease-in-out infinite;opacity:0.8;}
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(6vmax,5vmax) scale(1.08)}66%{transform:translate(-3vmax,8vmax) scale(0.97)}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-7vmax,6vmax) scale(1.10)}}
  @keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(7vmax,-5vmax) scale(1.06)}80%{transform:translate(-4vmax,-2vmax) scale(1.02)}}
  @keyframes drift4{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-5vmax,-6vmax) scale(1.12)}}
  /* grain:亮色底不需要深色压暗层,改成极淡顶部柔光 */
  .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.25;
    background:radial-gradient(circle at 50% 0%,rgba(143,194,220,0.08),transparent 55%);}

  /* 视口 + 横向轨道:编辑器 / 成曲页两屏并排,整体左划切换(阶段推进感) */
  .viewport{position:relative;z-index:2;width:100%;max-width:600px;height:100dvh;overflow:hidden;}
  body.is-desktop .viewport{max-width:960px;}
  .track{display:flex;width:200%;height:100%;transform:translateX(0);transition:transform .4s cubic-bezier(.4,0,.2,1);}
  body.stage-on .track{transform:translateX(-50%);}
  .track>.app,.track>.stage-pane{width:50%;flex:0 0 50%;height:100%;}
  .app{
    position:relative;z-index:2;
    display:flex;flex-direction:column;overflow:hidden;
  }

  /* ══ HEADER ══ */
  .header{
    flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
    padding:18px 20px 10px;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .orb{
    width:34px;height:34px;border-radius:50%;flex-shrink:0;position:relative;
    background:radial-gradient(circle at 35% 30%,var(--primary-soft),var(--primary) 55%,var(--primary-deep));
    box-shadow:var(--neu-raise-sm);animation:breathe 4.5s ease-in-out infinite;
  }
  .brand .orb::after{content:'';position:absolute;inset:6px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(255,255,255,0.85),transparent 60%);opacity:0.7;}
  @keyframes breathe{0%,100%{transform:scale(1);box-shadow:var(--neu-raise-sm)}50%{transform:scale(1.08);box-shadow:4px 4px 12px rgba(163,188,209,0.6),-4px -4px 12px rgba(255,255,255,0.95),0 0 0 3px rgba(143,194,220,0.25)}}
  .brand .txt{display:flex;flex-direction:column;line-height:1.05;}
  .brand .txt b{font-family:var(--brand-font);font-size:clamp(18px,5vw,23px);font-weight:700;letter-spacing:0.5px;background:linear-gradient(100deg,var(--fg),var(--primary));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .brand .txt small{font-size:9.5px;color:var(--fg-muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}
  .key-wrap{position:relative;flex-shrink:0;display:flex;align-items:center;gap:7px;}
  .header select{
    appearance:none;-webkit-appearance:none;
    background:var(--surface);
    color:var(--fg);border:none;border-radius:var(--r-sm);
    padding:9px 26px 9px 12px;font-size:13px;font-weight:700;font-family:var(--font);
    cursor:pointer;outline:none;max-width:96px;
    box-shadow:var(--soft-sh-sm);
    background-image:linear-gradient(45deg,transparent 50%,var(--primary-deep) 50%),linear-gradient(135deg,var(--primary-deep) 50%,transparent 50%);
    background-position:calc(100% - 15px) 55%,calc(100% - 10px) 55%;background-size:5px 5px,5px 5px;background-repeat:no-repeat;
  }
  .header select option{background:var(--surface);color:var(--fg);}
  .header select:focus{box-shadow:var(--glow-p);outline:none;}
  .hdr-btn{flex-shrink:0;border:none;border-radius:var(--r-sm);background:var(--surface);color:var(--ink-blue);
    font-family:var(--font);font-size:12.5px;font-weight:700;padding:9px 11px;cursor:pointer;
    box-shadow:var(--soft-sh-sm);transition:transform .12s,box-shadow .15s;white-space:nowrap;}
  .hdr-btn:active{transform:scale(0.94);box-shadow:var(--soft-sh-sm);}

  /* ══ CONTENT ══ */
  .content{
    flex:1 1 0;min-height:0;overflow-y:auto;overflow-x:hidden;
    padding:2px 16px 8px;display:flex;flex-direction:column;gap:12px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .content::-webkit-scrollbar{display:none;}

  .panel{
    background:var(--glass);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--glass-brd);
    border-radius:var(--r-lg);
    box-shadow:var(--soft-sh),inset 0 1px 0 rgba(255,255,255,0.6);
  }

  /* ══ 清晨拟态 · 旋律之河 ══ */
  .stream{
    flex-shrink:0;padding:12px 16px 14px;min-height:66px;position:relative;overflow:hidden;
    display:flex;align-items:center;flex-wrap:nowrap;gap:2px;
    overflow-x:auto;scrollbar-width:none;
    -webkit-overflow-scrolling:touch;touch-action:pan-x;overscroll-behavior-x:contain;
  }
  .stream::-webkit-scrollbar{display:none;}
  /* 插入光标:视觉细线,但点击热区加宽(14px)便于点中,负边距不撑开音符 */
  .ins-caret{flex:0 0 auto;width:14px;margin:0 -5px;align-self:stretch;cursor:pointer;position:relative;z-index:3;background:transparent;
    display:flex;align-items:center;justify-content:center;}
  .ins-caret::before{content:'';width:2.5px;align-self:stretch;margin:5px 0;border-radius:2px;background:transparent;transition:background .15s;}
  .ins-caret:hover::before{background:rgba(143,194,220,0.35);}
  .ins-caret.on::before{background:linear-gradient(180deg,var(--primary),rgba(143,194,220,0.4));
    box-shadow:0 0 5px rgba(143,194,220,0.5);animation:caretBlink 1.1s ease-in-out infinite;}
  .ins-caret.on::after{content:'✎';position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--primary);}
  @keyframes caretBlink{0%,100%{opacity:1}50%{opacity:0.45}}
  /* 循环区间:高亮带 + 两端手柄 */
  /* 播放光标浮层:覆盖三轨(旋律/词/和弦),从光标 & 循环共用 */
  .ph-overlay{position:absolute;left:0;top:0;z-index:20;pointer-events:none;overflow:hidden;}
  .loop-region{position:absolute;top:0;bottom:0;z-index:1;pointer-events:none;border-radius:6px;
    background:rgba(143,194,220,0.14);box-shadow:inset 0 0 0 1.5px rgba(143,194,220,0.45);}
  .loop-handle{position:absolute;top:0;bottom:0;width:3px;z-index:8;cursor:ew-resize;border-radius:3px;
    touch-action:none;-webkit-user-select:none;user-select:none;background:var(--primary-deep);pointer-events:auto;
    box-shadow:0 0 6px rgba(107,166,198,0.6);}
  /* 加宽的透明触摸热区(30px),手机好抓;不裁剪 */
  .loop-handle .lh-grip{position:absolute;top:-6px;bottom:-6px;left:50%;transform:translateX(-50%);width:30px;}
  .loop-handle::after{content:'';position:absolute;left:50%;top:-7px;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:var(--primary-deep);box-shadow:0 1px 4px rgba(107,166,198,0.85);}
  .loop-handle.grab{width:4px;background:var(--accent);}
  .loop-handle.grab::after{background:var(--accent);transform:translateX(-50%) scale(1.2);}
  /* 从光标:单条可拖的整体光标 */
  .ph-cursor{position:absolute;top:0;bottom:0;width:2.5px;z-index:8;cursor:ew-resize;border-radius:2px;
    touch-action:none;-webkit-user-select:none;user-select:none;pointer-events:auto;
    background:var(--primary-deep);box-shadow:0 0 5px rgba(107,166,198,0.55);}
  .ph-cursor .lh-grip{position:absolute;top:-6px;bottom:-6px;left:50%;transform:translateX(-50%);width:30px;}
  .ph-cursor::after{content:'';position:absolute;left:50%;top:-6px;transform:translateX(-50%);width:11px;height:11px;border-radius:50%;background:var(--primary-deep);box-shadow:0 1px 4px rgba(107,166,198,0.7);}
  .ph-cursor.grab{background:var(--primary);}
  .ph-cursor.grab::after{background:var(--primary);}
  /* 漂浮气泡:真·气泡质感(半透明玻璃球 + 高光 + 浮动呼吸) */
  .float-bub{position:absolute;z-index:4;min-width:34px;height:34px;padding:0 9px;border-radius:17px;cursor:pointer;pointer-events:auto;
    font-family:var(--font);font-size:15px;font-weight:700;color:var(--primary-deep);
    background:radial-gradient(circle at 35% 28%,#fff,rgba(226,242,251,0.82) 70%);border:1px solid rgba(255,255,255,0.85);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 5px 14px rgba(120,170,205,0.3),inset 0 2px 3px rgba(255,255,255,0.9);
    animation:bubFloat 3.5s ease-in-out infinite;transition:transform .14s,box-shadow .15s;}
  .float-bub::before{content:'';position:absolute;top:5px;left:8px;width:8px;height:5px;border-radius:50%;
    background:rgba(255,255,255,0.85);transform:rotate(-18deg);pointer-events:none;}
  .float-bub.out{color:var(--accent-deep);background:radial-gradient(circle at 35% 28%,#fff,rgba(250,240,206,0.82) 70%);}
  .float-bub.predict{opacity:0.85;}
  .float-bub:active{transform:scale(0.86);box-shadow:0 3px 8px rgba(120,170,205,0.3);}
  .float-bub.fly{animation:bubFly .32s cubic-bezier(.4,0,.6,1) forwards;}
  @keyframes bubFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.03)}}
  @keyframes bubFly{to{opacity:0;transform:translateY(-38px) scale(0.45);}}
  /* 弹奏区泡泡飘浮层(仅手机试听态):覆盖整个演奏区,泡泡随意游走 */
  .play-bubbles{display:none;}
  body.is-mobile.try-on .play-bubbles{display:block;position:absolute;left:0;right:0;top:0;bottom:0;z-index:25;pointer-events:none;overflow:hidden;}
  /* 弹奏泡泡:更透的玻璃球(能看穿后面的键盘),背景模糊出球面感 */
  .play-bubbles .float-bub{min-width:40px;height:40px;font-size:15.5px;color:#5E97BC;
    background:radial-gradient(circle at 34% 26%,rgba(255,255,255,0.72),rgba(214,236,249,0.34) 68%,rgba(190,222,242,0.28));
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);border:1px solid rgba(255,255,255,0.6);
    box-shadow:0 6px 16px rgba(120,170,205,0.22),inset 0 2px 5px rgba(255,255,255,0.75),inset 0 -4px 8px rgba(150,190,220,0.18);
    animation:bubWander 7s ease-in-out infinite;}
  .play-bubbles .float-bub.out{color:#B79A4C;
    background:radial-gradient(circle at 34% 26%,rgba(255,255,255,0.72),rgba(249,238,206,0.34) 68%,rgba(240,225,180,0.28));}
  .play-bubbles .float-bub::before{width:9px;height:6px;top:6px;left:9px;background:rgba(255,255,255,0.78);}
  .play-bubbles .chord-bub{min-width:52px;height:40px;border-radius:20px;padding:0 14px;font-size:14.5px;}
  .play-bubbles .chord-bub.func-T{color:#5E97BC;background:radial-gradient(circle at 34% 26%,rgba(255,255,255,0.72),rgba(200,228,244,0.36) 68%,rgba(178,214,238,0.3));}
  .play-bubbles .chord-bub.func-SD{color:#C27E92;background:radial-gradient(circle at 34% 26%,rgba(255,255,255,0.72),rgba(245,216,224,0.36) 68%,rgba(238,200,212,0.3));}
  .play-bubbles .chord-bub.func-D{color:#B08A2E;background:radial-gradient(circle at 34% 26%,rgba(255,255,255,0.72),rgba(246,233,192,0.36) 68%,rgba(240,224,175,0.3));}
  .play-bubbles .pb-hint{position:absolute;left:16px;right:16px;top:14px;text-align:center;
    font-size:11.5px;color:var(--fg-muted);font-style:italic;pointer-events:none;}
  /* 缓慢游走:每个泡泡用内联 --dx/--dy/--rot 定制方向,整体轻飘不打扰 */
  @keyframes bubWander{0%,100%{transform:translate(0,0)}
    25%{transform:translate(calc(var(--dx,10px)*0.6),calc(var(--dy,-12px)*0.5))}
    50%{transform:translate(var(--dx,10px),var(--dy,-14px))}
    75%{transform:translate(calc(var(--dx,10px)*0.4),calc(var(--dy,-12px)*0.8))}}
  .stream::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;transform:translateY(-50%);
    background:linear-gradient(90deg,transparent,rgba(143,194,220,0.18),rgba(235,207,134,0.14),transparent);opacity:0.7;z-index:0;}
  /* 背景旋律线 */
  .mline{position:absolute;left:0;top:0;height:100%;z-index:0;pointer-events:none;overflow:visible;}
  .mline-path{fill:none;stroke:url(#mlgrad);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;
    opacity:0.45;filter:drop-shadow(0 0 3px rgba(143,194,220,0.35));
    stroke-dasharray:var(--mllen);stroke-dashoffset:var(--mllen);animation:mlDraw .6s ease-out forwards;}
  @keyframes mlDraw{to{stroke-dashoffset:0;}}
  .mline-area{fill:url(#mlarea);opacity:0.10;}
  .stream-empty{color:var(--fg-muted);font-size:12.5px;font-style:italic;white-space:nowrap;position:relative;z-index:1;
    display:flex;align-items:center;gap:8px;}
  .stream-empty::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--primary-soft);box-shadow:0 0 0 3px rgba(143,194,220,0.2);animation:breathe 3s ease-in-out infinite;}

  .note-chip{
    position:relative;z-index:1;display:inline-flex;align-items:center;justify-content:flex-start;
    height:38px;padding:0 4px;border-radius:var(--r-sm);
    background:var(--surface);color:var(--fg);border:none;
    font-size:15px;font-weight:600;cursor:pointer;flex-shrink:0;box-sizing:border-box;
    box-shadow:var(--soft-sh-sm);
    transition:box-shadow .18s,background .18s;
    animation:chipIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  .note-chip .nl{flex-shrink:0;white-space:nowrap;}
  /* AI 试听中、尚未填入的内容:半透明虚线,区别于已填入 */
  .note-chip.ai-ghost{opacity:0.5;border:1.5px dashed rgba(125,180,214,0.7);background:rgba(143,194,220,0.12);box-shadow:none;}
  .chord-clip.ai-ghost{opacity:0.5;outline:1.5px dashed rgba(125,180,214,0.7);outline-offset:-2px;}
  /* 时值拖尾:表达音的长短(块越宽=音越长,尾越长) */
  .note-chip .dur-tail{flex:1 1 auto;height:3px;margin-left:4px;border-radius:2px;
    background:linear-gradient(90deg,rgba(143,194,220,0.55),rgba(143,194,220,0.08));min-width:0;}
  .note-chip.out-chip .dur-tail{background:linear-gradient(90deg,rgba(235,207,134,0.65),rgba(235,207,134,0.08));}
  /* ── 歌词位:挂在音符下方的小词轨 ── */
  .chip-ly{position:absolute;left:50%;transform:translateX(-50%);top:calc(100% + 3px);
    min-width:14px;max-width:72px;text-align:center;white-space:nowrap;line-height:1;
    font-size:12.5px;font-weight:600;color:var(--fg-dim);overflow:hidden;text-overflow:ellipsis;
    pointer-events:none;transition:color .15s;}
  .chip-ly.empty{color:var(--fg-muted);opacity:0.42;font-weight:400;}
  .note-chip.active .chip-ly{color:var(--primary-deep);}
  .chip-ly.cur{color:var(--primary-deep);}
  body.ly-editing .chip-ly{pointer-events:auto;cursor:text;}
  body.ly-editing .chip-ly.empty{opacity:0.7;}
  .ly-edit-inp{width:52px;max-width:62px;border:none;outline:none;background:transparent;
    text-align:center;font-family:var(--font);font-size:12.5px;font-weight:600;color:var(--primary-deep);
    padding:0 0 2px;margin:0;border-bottom:1.5px solid var(--primary);line-height:1;-webkit-appearance:none;}
  /* 填词按钮激活态(桌面 rest 行 / 移动 mpad-foot 共用) */
  .ly-btn.on,#btnLyricM.on{background:var(--primary)!important;color:#fff!important;border-color:transparent!important;
    box-shadow:0 0 0 3px rgba(143,194,220,0.25)!important;}
  @keyframes chipIn{from{opacity:0;transform:translateY(8px) scale(0.6)}to{opacity:1;transform:none}}
  .note-chip:active{box-shadow:var(--soft-sh-sm);}
  .note-chip.active{
    background:var(--primary);color:#fff;border:none;
    box-shadow:0 0 0 3px rgba(143,194,220,0.25),var(--soft-sh-sm);
    animation:pulseHalo 0.9s ease-in-out infinite;
  }
  .note-chip.active .dur-tail{background:linear-gradient(90deg,rgba(255,255,255,0.8),rgba(255,255,255,0.2));}
  @keyframes pulseHalo{0%,100%{box-shadow:0 0 0 2px rgba(143,194,220,0.35),var(--soft-sh-sm)}50%{box-shadow:0 0 0 5px rgba(143,194,220,0.18),var(--soft-sh-sm)}}
  .note-chip.playhead{box-shadow:0 0 0 2px var(--primary),var(--soft-sh-sm);}
  .note-chip.playhead::before{content:'▶';position:absolute;left:-13px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--primary);opacity:0.85;}
  .note-chip.rest{background:var(--glass-2);color:var(--fg-muted);border:1.5px dashed var(--glass-brd);box-shadow:none;font-size:12px;}
  /* 延音:蓝色系,视觉"连"住前一音 */
  .note-chip.tie{background:linear-gradient(135deg,rgba(143,194,220,0.4),rgba(62,151,204,0.28));
    border:1px solid rgba(143,194,220,0.45);color:var(--primary-deep);justify-content:center;margin-left:-3px;box-shadow:none;}
  .note-chip.tie .nl{font-size:20px;opacity:0.95;letter-spacing:2px;font-weight:700;}
  .note-chip.rest .dur-tail{background:linear-gradient(90deg,rgba(163,188,209,0.4),rgba(163,188,209,0.06));}
  .note-chip.out-chip{background:rgba(235,207,134,0.15);color:var(--accent-deep);border:1px solid rgba(235,207,134,0.35);box-shadow:none;}
  /* 虚位格子 */
  .ghost-cell{position:relative;z-index:1;height:38px;flex-shrink:0;border-radius:var(--r-sm);box-sizing:border-box;
    border:1px dashed rgba(163,188,209,0.4);background:rgba(244,249,252,0.5);
    display:inline-flex;align-items:center;justify-content:center;}
  .ghost-cell span{width:4px;height:4px;border-radius:50%;background:rgba(163,188,209,0.55);opacity:0.7;}
  .bar-line{position:relative;width:2px;height:30px;border-radius:2px;flex-shrink:0;margin:0 5px;
    background:linear-gradient(180deg,transparent,rgba(143,194,220,0.4),transparent);}
  .bar-line .mtick{position:absolute;top:-2px;left:4px;font-size:8px;color:var(--fg-muted);font-weight:600;opacity:0.7;white-space:nowrap;}

  /* ══ TRANSPORT ══ */
  /* 播放行:左播放组件 + 右录入/试听组件,两个独立矩形,中间留间距,共占一行 */
  .transport-row{display:flex;align-items:stretch;gap:10px;flex-shrink:0;}
  .transport{flex:1 1 0;min-width:0;display:flex;align-items:center;gap:10px;padding:11px 14px;flex-wrap:wrap;}
  .transport.compact{padding:8px 14px;gap:8px;}
  .transport.compact .speed{max-width:170px;}
  /* 移动端:播放条元素平均分布铺满一行 */
  body.is-mobile .transport.compact{justify-content:space-between;gap:6px;}
  .btn-icon{
    width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
    font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
    color:var(--fg-dim);background:var(--surface);
    box-shadow:var(--soft-sh-sm);
    transition:transform .12s,box-shadow .18s,background .18s;
  }
  .transport.compact .btn-icon{width:34px;height:34px;font-size:13px;}
  .btn-icon:active{transform:scale(0.9);box-shadow:var(--soft-sh-sm);}
  .btn-play{background:var(--primary);border:none;box-shadow:var(--soft-sh-sm),0 0 0 0 rgba(143,194,220,0);color:#fff;}
  .btn-play.playing{background:var(--danger);box-shadow:var(--soft-sh-sm);}
  .speed{flex:1 1 0;min-width:0;display:flex;align-items:center;gap:8px;}
  .speed label{font-size:9.5px;color:var(--fg-muted);white-space:nowrap;text-transform:uppercase;letter-spacing:1px;font-weight:600;}
  .speed input[type=range]{flex:1 1 0;min-width:0;height:5px;-webkit-appearance:none;appearance:none;border-radius:3px;outline:none;
    background:linear-gradient(90deg,var(--primary),var(--primary-soft));}
  .speed input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,var(--primary-soft));cursor:pointer;border:none;box-shadow:var(--soft-sh-sm);}
  .bpm{font-size:12px;font-weight:700;color:var(--ink-blue);min-width:30px;text-align:right;font-variant-numeric:tabular-nums;}
  .loop{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;}
  .loop input{display:none;}
  .loop-track{width:36px;height:20px;background:var(--glass-2);border:none;border-radius:11px;position:relative;transition:.25s;
    box-shadow:var(--soft-sh-sm);}
  .loop-track::after{content:'';width:14px;height:14px;background:var(--fg-muted);border-radius:50%;position:absolute;top:3px;left:3px;transition:.25s cubic-bezier(.34,1.56,.64,1);box-shadow:1px 1px 3px rgba(163,188,209,0.6);}
  .loop input:checked+.loop-track{background:var(--primary);box-shadow:var(--soft-sh-sm);}
  .loop input:checked+.loop-track::after{left:19px;background:#fff;}
  .loop-lbl{font-size:9.5px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}

  /* ══ SEG CONTROLS ══ */
  .ctrls{flex-shrink:0;display:flex;flex-direction:column;gap:9px;}
  .seg-block{display:flex;flex-direction:column;gap:6px;}
  .seg-title{font-size:9.5px;color:var(--fg-muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;padding-left:4px;display:flex;align-items:center;gap:8px;}
  .seg-title .k{font-size:9px;letter-spacing:0;text-transform:none;font-weight:500;color:var(--fg-dim);background:var(--glass-2);border:1px solid var(--glass-brd-soft);border-radius:6px;padding:1px 7px;}
  .seg{display:flex;gap:5px;padding:5px;}
  .seg button{
    flex:1 1 0;padding:9px 4px;border-radius:var(--r-sm);border:none;background:var(--surface);
    color:var(--ink-blue);font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;
    box-shadow:var(--soft-sh-sm);
    transition:all .2s;white-space:nowrap;
  }
  .seg button:active{transform:scale(0.95);box-shadow:var(--soft-sh-sm);}
  .seg button.sel{background:var(--primary);color:#fff;
    box-shadow:var(--soft-sh-sm),0 0 0 2px rgba(143,194,220,0.3);}

  /* ══ NOTE PAD ══ */
  .pad{flex-shrink:0;display:flex;flex-direction:column;gap:12px;padding:15px 14px;}
  .pad-block{display:flex;flex-direction:column;gap:8px;}
  .pad-label{font-size:9.5px;color:var(--fg-muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;padding-left:4px;
    display:flex;align-items:center;gap:7px;}
  .pad-label i{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .pad-label.in i{background:var(--primary);box-shadow:0 0 0 3px rgba(143,194,220,0.22);}
  .pad-label.out i{background:var(--accent);box-shadow:0 0 0 3px rgba(235,207,134,0.22);}
  .note-row{display:flex;gap:8px;}

  .note-btn{flex:1 1 0;min-width:0;border:none;font-family:var(--font);cursor:pointer;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    transition:transform .1s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,filter .2s;}
  .note-btn .lbl{position:relative;z-index:2;line-height:1;}
  .note-btn.out .lbl .alt,.n-btn .lbl .alt{opacity:0.5;font-size:0.72em;font-weight:600;margin-left:1px;}
  .note-btn .kh{position:absolute;bottom:5px;right:8px;font-size:9px;font-weight:500;opacity:0.55;z-index:2;}
  .note-btn:active{transform:scale(0.9);}
  .note-btn.hit{transform:scale(0.9);}

  /* 调内 · 天空蓝气泡 */
  .note-btn.in{
    height:60px;border-radius:var(--r-md);color:#fff;font-size:clamp(19px,5.2vw,24px);font-weight:600;
    background:linear-gradient(140deg,var(--primary),var(--primary-deep));
    box-shadow:0 3px 8px rgba(120,150,190,0.16),inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .note-btn.in::before{content:'';position:absolute;inset:0;border-radius:inherit;
    background:radial-gradient(circle at 50% 0%,rgba(255,255,255,0.35),transparent 55%);opacity:0.7;}
  .note-btn.in.hit{box-shadow:var(--soft-sh-sm),0 0 0 3px rgba(143,194,220,0.3);filter:brightness(1.08);}

  /* 调外 · 暖黄琥珀 */
  .note-btn.out{
    height:42px;border-radius:var(--r-sm);color:var(--ink-blue);font-size:clamp(13px,3.8vw,16px);font-weight:600;
    background:rgba(235,207,134,0.14);border:1px solid rgba(235,207,134,0.4);
    box-shadow:var(--soft-sh-sm);
  }
  .note-btn.out.hit{background:rgba(235,207,134,0.25);box-shadow:var(--soft-sh-sm),0 0 0 2px rgba(235,207,134,0.3);filter:brightness(1.06);}

  /* 涟漪 */
  .ripple{position:absolute;border-radius:50%;transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:1;
    background:radial-gradient(circle,rgba(255,255,255,0.7),transparent 70%);animation:rippleOut .55s ease-out forwards;}
  @keyframes rippleOut{to{transform:translate(-50%,-50%) scale(4);opacity:0;}}

  .rest-row{display:flex;justify-content:center;align-items:center;gap:10px;}
  .note-btn.rest{flex:0 0 auto;width:110px;height:42px;border-radius:var(--r-sm);color:var(--fg-dim);font-size:13px;font-weight:600;
    background:var(--glass-2);border:1.5px dashed rgba(163,188,209,0.5);box-shadow:none;}
  .note-btn.rest.hit,.note-btn.rest:active{background:rgba(143,194,220,0.12);color:var(--primary);border-color:rgba(143,194,220,0.45);}
  .note-btn.tie{flex:0 0 auto;width:110px;height:42px;border-radius:var(--r-sm);color:var(--primary);font-size:14px;font-weight:700;
    background:rgba(143,194,220,0.12);border:1px solid rgba(143,194,220,0.38);box-shadow:var(--soft-sh-sm);}
  .note-btn.tie.hit,.note-btn.tie:active{background:var(--primary);color:#fff;box-shadow:var(--soft-sh-sm);}
  .rest-row .rk{font-size:9.5px;color:var(--fg-muted);}

  /* ══ KB HINT ══ */
  .kb-hint{display:none;flex-wrap:wrap;gap:5px 14px;justify-content:center;align-items:center;font-size:11px;color:var(--fg-muted);padding:2px 0;}
  .kb-hint span{display:inline-flex;align-items:center;gap:4px;}
  .kb-hint kbd{display:inline-block;background:var(--surface);border:none;border-radius:6px;
    padding:2px 7px;font-size:10px;font-family:var(--font);color:var(--fg-dim);font-weight:600;min-width:20px;text-align:center;
    box-shadow:var(--soft-sh-sm);}

  /* ══ ACTIONS ══ */
  .actions{flex-shrink:0;display:flex;gap:9px;padding:8px 16px 14px;justify-content:center;}
  .actions button{
    border:none;border-radius:var(--r-md);padding:12px 18px;
    font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;
    background:var(--surface);color:var(--fg);
    box-shadow:var(--soft-sh-sm);
    transition:transform .1s,box-shadow .18s,background .18s;
  }
  .actions button:active{transform:scale(0.94);box-shadow:var(--soft-sh-sm);}
  .btn-clear{color:var(--danger);}
  .btn-clear:active{background:rgba(224,90,90,0.10);}
  .btn-ai{background:var(--primary);color:#fff;box-shadow:var(--soft-sh-sm),0 0 0 0 rgba(143,194,220,0);}

  /* ══ AI OVERLAY ══ */
  .ai-overlay{position:fixed;inset:0;background:rgba(58,74,92,0.35);backdrop-filter:blur(8px);z-index:200;
    display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
  .ai-overlay.show{opacity:1;pointer-events:auto;}
  .ai-card{background:var(--surface);
    border-radius:var(--r-xl);padding:26px 22px;max-width:370px;width:90%;
    max-height:88dvh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
    box-shadow:var(--soft-sh),0 20px 50px rgba(163,188,209,0.4);
    border:none;display:flex;flex-direction:column;gap:14px;
    transform:scale(0.92) translateY(10px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
  .ai-card::-webkit-scrollbar{width:5px;}
  .ai-card::-webkit-scrollbar-thumb{background:rgba(160,185,210,0.4);border-radius:3px;}
  .ai-overlay.show .ai-card{transform:none;}
  .ai-card h3{font-size:18px;text-align:center;font-weight:700;color:var(--fg);}
  .ai-card .ai-desc{font-size:12.5px;color:var(--fg-dim);line-height:1.6;text-align:center;}
  .ai-match{display:flex;flex-direction:column;gap:7px;}
  .ai-match-item{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;
    background:var(--glass-2);border-radius:var(--r-sm);font-size:13px;border:1.5px solid transparent;box-shadow:var(--soft-sh-sm);}
  .ai-match-item .kn{font-weight:600;color:var(--fg);}
  .ai-match-item .ks{font-weight:700;font-variant-numeric:tabular-nums;color:var(--fg-dim);}
  .ai-match-item.best{border-color:var(--primary);background:rgba(143,194,220,0.12);box-shadow:var(--soft-sh-sm),0 0 0 2px rgba(143,194,220,0.3);}
  .ai-match-item.best .kn,.ai-match-item.best .ks{color:var(--primary-deep);}
  .ai-match-item.current{border-color:var(--accent);background:rgba(235,207,134,0.12);}
  .ai-match-item.current .kn,.ai-match-item.current .ks{color:var(--accent-deep);}
  .ai-hint{font-size:12px;color:var(--fg-muted);text-align:center;line-height:1.5;}
  .ai-card button{padding:13px;border-radius:var(--r-md);border:none;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:transform .1s,box-shadow .15s;}
  .ai-card button:active{transform:scale(0.95);box-shadow:var(--soft-sh-sm);}
  .ai-apply{background:var(--primary);color:#fff;box-shadow:var(--soft-sh-sm);}
  .ai-close{background:var(--surface);color:var(--fg-dim);box-shadow:var(--soft-sh-sm);}

  /* ══ 旋律库(存储) ══ */
  .store-save{display:flex;gap:8px;}
  .store-save input{flex:1 1 0;min-width:0;background:var(--glass-2);border:1px solid var(--glass-brd);border-radius:var(--r-sm);
    color:var(--fg);font-family:var(--font);font-size:13px;padding:11px 13px;outline:none;}
  .store-save input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(143,194,220,0.2);}
  .store-save input::placeholder{color:var(--fg-muted);}
  .store-save button{flex:0 0 auto;padding:0 16px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;
    border:none;border-radius:var(--r-sm);font-weight:600;font-size:13px;font-family:var(--font);cursor:pointer;box-shadow:var(--glow-p);}
  .store-list{display:flex;flex-direction:column;gap:7px;max-height:44vh;overflow-y:auto;scrollbar-width:thin;}
  .store-list::-webkit-scrollbar{width:5px;}.store-list::-webkit-scrollbar-thumb{background:var(--glass-brd);border-radius:3px;}
  .store-empty{text-align:center;color:var(--fg-muted);font-size:12px;padding:14px 0;font-style:italic;}
  .store-item{display:flex;align-items:center;gap:9px;padding:10px 13px;background:var(--glass-2);
    border:1px solid var(--glass-brd-soft);border-radius:var(--r-sm);}
  .store-item .si-main{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .store-item .si-name{font-size:13px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .store-item .si-meta{font-size:10px;color:var(--fg-muted);letter-spacing:0.2px;}
  .store-item button{flex:0 0 auto;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;
    font-family:var(--font);cursor:pointer;transition:transform .1s,background .15s;}
  .store-item button:active{transform:scale(0.92);}
  .si-load{background:rgba(143,194,220,0.25);color:var(--primary-soft);}
  .si-del{background:rgba(248,113,113,0.16);color:var(--danger);}
  .store-share{background:var(--surface);color:var(--primary-deep);border:none;box-shadow:var(--soft-sh-sm);}

  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-8px);
    background:var(--surface);
    color:var(--fg);padding:10px 24px;border-radius:24px;font-size:13px;font-weight:500;
    z-index:100;pointer-events:none;opacity:0;transition:opacity .3s,transform .3s;
    box-shadow:0 8px 26px rgba(0,0,0,0.4);border:1px solid var(--glass-brd);font-family:var(--font);}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ══ 设备自适应显隐 ══ */
  .desk-only{display:none;}
  .mob-only{display:none;}
  body.is-desktop .desk-only{display:flex;}
  body.is-desktop .kb-hint.desk-only{display:flex;}
  body.is-mobile .mob-only{display:flex;}

  /* ══ MOBILE · 重叠卡片音区选择器 ══ */
  .mpad{flex-direction:column;gap:10px;padding:0;}  /* 去掉外层大矩形,与下方和弦盘风格一致(裸排布) */
  .mpad-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 3px;}
  .oct-ind{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ink-blue);}
  .oct-ind .dots{display:flex;flex-direction:column;gap:4px;}
  .oct-ind .dots i{width:7px;height:7px;border-radius:50%;background:var(--glass-brd);transition:.28s cubic-bezier(.34,1.56,.64,1);}
  .oct-ind .dots i.on{background:var(--primary-soft);box-shadow:0 0 9px var(--primary);transform:scale(1.35);}
  .swipe-hint{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--fg-muted);letter-spacing:0.3px;}
  .swipe-hint .ar{font-size:13px;color:var(--primary-soft);animation:bobY 2s ease-in-out infinite;}
  @keyframes bobY{0%,100%{transform:translateY(-2px);opacity:.6}50%{transform:translateY(2px);opacity:1}}

  .oct-stage{position:relative;touch-action:pan-y;-webkit-user-select:none;user-select:none;padding:4px 30px;}
  .oct-cards{position:relative;will-change:transform;}
  .oct-cards.animating{transition:transform .34s cubic-bezier(.22,1,.36,1),opacity .34s;}
  .oct-card{border-radius:var(--r-lg);padding:11px;
    background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--glass-brd);box-shadow:var(--soft-sh);
    display:flex;flex-direction:column;gap:9px;transition:transform .3s,opacity .3s,filter .3s;}
  .oct-card.live{position:relative;z-index:3;opacity:1;filter:none;transform:none;}
  .oct-card.ghost{position:absolute;left:0;right:0;top:0;bottom:0;z-index:2;pointer-events:none;filter:blur(0.6px);}
  .oct-card.ghost.left{transform:translateX(-13px) scale(0.93);opacity:0.42;}
  .oct-card.ghost.right{transform:translateX(13px) scale(0.93);opacity:0.42;}
  .oct-card.ghost.void{opacity:0;}
  /* 左右切换箭头(叠在两侧,不占额外高度) */
  .oct-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:6;width:26px;height:46px;border:none;cursor:pointer;
    background:var(--surface);color:var(--primary-deep);font-size:20px;font-weight:700;line-height:1;
    border-radius:13px;box-shadow:var(--soft-sh-sm);display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;transition:opacity .2s,transform .1s;}
  .oct-arrow:active{transform:translateY(-50%) scale(.88);}
  .oct-arrow.left{left:-2px;}
  .oct-arrow.right{right:-2px;}
  .oct-arrow.disabled{opacity:.2;pointer-events:none;}
  .oc-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--ink-blue);text-align:center;}
  .oc-row{display:flex;gap:6px;}
  .n-btn{flex:1 1 0;min-width:0;position:relative;overflow:hidden;border:none;font-family:var(--font);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:transform .1s cubic-bezier(.34,1.56,.64,1),filter .15s;}
  .n-btn .kh{position:absolute;bottom:3px;right:5px;font-size:8px;font-weight:500;opacity:0.45;}
  .n-btn:active{transform:scale(0.9);}
  .n-btn.hit{filter:brightness(1.28);transform:scale(0.9);}
  .oc-row.inn .n-btn{height:50px;border-radius:var(--r-md);color:#fff;font-size:19px;font-weight:700;
    background:linear-gradient(140deg,var(--primary),var(--primary-deep));border:none;
    box-shadow:var(--soft-sh-sm),inset 0 1px 0 rgba(255,255,255,0.4);}
  .oc-row.outn .n-btn{height:36px;border-radius:var(--r-sm);color:var(--ink-blue);font-size:14px;font-weight:700;
    background:var(--surface);border:none;box-shadow:var(--soft-sh-sm);}
  .mpad-foot{display:flex;align-items:center;gap:9px;}
  .btn-rest-m{flex:1 1 0;padding:11px;border-radius:var(--r-sm);color:var(--fg-dim);font-size:13px;font-weight:600;
    font-family:var(--font);cursor:pointer;background:var(--surface);border:none;box-shadow:var(--soft-sh-sm);transition:all .18s;}
  .btn-rest-m.hit,.btn-rest-m:active{box-shadow:var(--soft-sh-sm);color:var(--primary-deep);}

  /* 移动端整体收紧,提升屏幕利用率 */
  body.is-mobile .transport{padding:9px 12px;gap:8px;}
  body.is-mobile .btn-icon{width:38px;height:38px;}
  body.is-mobile .actions{padding:6px 12px 12px;gap:7px;}
  body.is-mobile .actions button{padding:10px 12px;font-size:12px;flex:1 1 0;}
  body.is-mobile .content{gap:14px;}

  /* 速度步进 + 拍号(两区共用) */
  .tempo{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .tempo-btn{width:26px;height:26px;border-radius:8px;border:1px solid var(--glass-brd);background:var(--glass);
    color:var(--fg);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .12s;}
  .tempo-btn:active{transform:scale(0.9);background:var(--primary);color:#fff;}
  .tempo-val{display:flex;flex-direction:column;align-items:center;line-height:1;min-width:38px;}
  .tempo-val input{width:38px;text-align:center;background:transparent;border:none;border-bottom:1px solid transparent;
    font-family:var(--font);font-size:14px;font-weight:700;color:var(--ink-blue);font-variant-numeric:tabular-nums;outline:none;padding:0;}
  .tempo-val input:focus{border-bottom-color:var(--primary-soft);}
  .tempo-val small{font-size:7px;color:var(--fg-muted);letter-spacing:0.5px;}
  .legend-loop{margin-left:auto;} /* 与右侧箭头成组 */
  .track-legend .score-nav{margin-left:6px;}
  .ts-inline{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--fg-muted);font-weight:600;flex-shrink:0;}
  .ts-inline select{appearance:none;-webkit-appearance:none;background:var(--glass);color:var(--fg);
    border:1px solid var(--glass-brd);border-radius:7px;padding:5px 8px;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;outline:none;}
  .ts-inline select option{background:#EEF4FA;color:#3A4A5C;}
  .try-switch input:checked+.loop-track{background:linear-gradient(135deg,var(--accent),var(--accent-deep));border-color:transparent;box-shadow:var(--glow-a);}
  body.is-desktop .mob-tempo{display:none;} /* 桌面用大滑条 */
  body.is-desktop .transport.compact{flex-wrap:nowrap;} /* 桌面全挤一行 */
  /* 桌面速度大滑条(在播放条内,占满剩余宽度) */
  .speed-inline{align-items:center;gap:10px;flex:1 1 0;min-width:0;}
  .speed-inline input[type=range]{flex:1 1 0;min-width:0;height:6px;-webkit-appearance:none;appearance:none;border-radius:3px;outline:none;
    background:linear-gradient(90deg,var(--primary),var(--secondary));}
  .speed-inline input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,var(--primary-soft));cursor:pointer;border:none;box-shadow:var(--glow-p);}
  .speed-inline .speed-bpm{font-size:13px;color:var(--fg-dim);flex-shrink:0;min-width:52px;text-align:right;}
  .speed-inline .speed-bpm::after{content:' BPM';font-size:9px;color:var(--fg-muted);}
  .speed-inline .speed-bpm b{color:var(--primary-soft);font-weight:700;font-variant-numeric:tabular-nums;}
  body.is-desktop .speed-inline{display:flex;}

  /* ══ 乐谱区:三条统一轨道(旋律 / 歌词 / 和弦),对齐 + 吸顶(两端通用) ══ */
  .score-head{position:sticky;top:0;z-index:30;display:flex;flex-direction:column;gap:8px;
    padding:4px 0 8px;margin:0 auto;width:100%;background:transparent;}

  /* —— 统一轨道系统:每条轨左侧一个规格一致的「轨道头」,承载选中态 —— */
  .lane{display:flex;align-items:stretch;gap:8px;transition:opacity .22s;}
  .lane-body{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:5px;justify-content:center;}
  .lane-head{flex:0 0 36px;width:36px;border-radius:13px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:3px;cursor:pointer;-webkit-user-select:none;user-select:none;
    background:var(--glass-2);border:1px solid var(--glass-brd-soft);box-shadow:var(--soft-sh-sm);
    transition:transform .22s cubic-bezier(.34,1.4,.64,1),background .2s,color .2s,box-shadow .2s;}
  .lane-head .lh-nm{font-size:13.5px;font-weight:800;letter-spacing:1px;line-height:1.1;
    writing-mode:vertical-rl;text-orientation:upright;}
  /* 未选中:只透出一点专属色,克制 */
  .lane-melody .lane-head{color:#7DB4D6;}
  .lane-lyric  .lane-head{color:#D98BA6;}
  .lane-chord  .lane-head{color:#E0B63E;}
  /* 选中态:轨道头实心填充专属色 + 反白 + 微微凸出(取代原来单薄的描边) */
  body.focus-melody .lane-melody .lane-head{background:#7DB4D6;color:#fff;border-color:transparent;transform:translateX(2px) scale(1.03);box-shadow:0 5px 15px rgba(125,180,214,0.45);}
  body.focus-lyric  .lane-lyric  .lane-head{background:#D98BA6;color:#fff;border-color:transparent;transform:translateX(2px) scale(1.03);box-shadow:0 5px 15px rgba(217,139,166,0.42);}
  body.focus-chord  .lane-chord  .lane-head{background:#EAC24E;color:#fff;border-color:transparent;transform:translateX(2px) scale(1.03);box-shadow:0 5px 15px rgba(234,194,78,0.5);}
  /* 未选中的两条轨整体轻微退后(仍完全可见,作为参照上下文) */
  body.focus-melody .lane-lyric,body.focus-melody .lane-chord,
  body.focus-lyric  .lane-melody,body.focus-lyric  .lane-chord,
  body.focus-chord  .lane-melody,body.focus-chord  .lane-lyric{opacity:0.58;}

  /* 选中轨内容区:用专属色描边呼应轨道头 */
  #melodyBox,.chord-track,.lyric-track{transition:box-shadow .2s;}
  body.focus-melody #melodyBox{box-shadow:var(--soft-sh),inset 0 1px 0 rgba(255,255,255,0.6),0 0 0 2px rgba(125,180,214,0.85);}
  body.focus-lyric  .lyric-track{box-shadow:0 0 0 2px rgba(217,139,166,0.8);}
  body.focus-chord  .chord-track{box-shadow:var(--soft-sh),inset 0 1px 0 rgba(255,255,255,0.6),0 0 0 2px rgba(234,194,78,0.9);}

  /* —— 歌词轨:格子按音符实测坐标绝对定位,宽度随音符(不等宽),与旋律同滚 —— */
  .lyric-track{position:relative;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;height:34px;box-sizing:border-box;
    background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--glass-brd);border-radius:var(--r-lg);
    box-shadow:var(--soft-sh),inset 0 1px 0 rgba(255,255,255,0.6);touch-action:pan-x;}
  .lyric-track::-webkit-scrollbar{display:none;}
  .lyric-inner{position:relative;height:100%;min-width:100%;}
  .ly-cell{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;
    font-size:13.5px;font-weight:600;color:var(--fg-dim);cursor:pointer;box-sizing:border-box;padding:0 2px;
    overflow:hidden;white-space:nowrap;border-radius:8px;transition:background .15s,color .15s;}
  .ly-cell.empty{color:var(--fg-muted);opacity:0.4;font-weight:400;}
  .ly-cell.cur{background:rgba(243,211,220,0.55);color:#C25F86;box-shadow:inset 0 0 0 1.5px #E7A9BF;}
  .ly-cell:active{background:rgba(243,211,220,0.4);}
  body.focus-lyric .ly-cell.empty{opacity:0.72;}
  .lyric-empty{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:11px;font-style:italic;
    color:var(--fg-muted);pointer-events:none;white-space:nowrap;}
  .ly-cell-inp{width:100%!important;max-width:none!important;height:100%;border:none!important;outline:none;background:transparent;
    text-align:center;font-family:var(--font);font-size:13.5px;font-weight:600;color:#C25F86;padding:0!important;margin:0;-webkit-appearance:none;}

  /* 工具区:桌面左右并排(音符7:和弦3),移动端按聚焦切换 */
  .tools{display:flex;flex-direction:column;gap:18px;}
  .melody-panel{display:flex;flex-direction:column;gap:11px;}
  .chord-panel{display:flex;flex-direction:column;gap:11px;}
  .lyric-panel{display:none;flex-direction:column;gap:10px;padding:4px 2px;}
  /* 换词气泡:排在词末尾,略微区分(暖黄色调) */
  .ly-word.ly-shuffle{color:#C77A96;
    background:radial-gradient(circle at 34% 26%,rgba(255,255,255,0.88),rgba(247,224,232,0.62) 66%,rgba(242,212,222,0.52));
    box-shadow:0 3px 10px rgba(210,150,175,0.2),inset 0 2px 5px rgba(255,255,255,0.85),inset 0 -3px 7px rgba(220,175,195,0.16);}
  /* 词气泡:玻璃球感(与弹奏区泡泡一致),点一下一音一字填入 */
  .ly-words{display:flex;flex-wrap:wrap;gap:9px;}
  .ly-word{border:1px solid rgba(255,255,255,0.7);color:#8A93A6;border-radius:20px;padding:8px 15px;
    font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;
    background:radial-gradient(circle at 34% 26%,rgba(255,255,255,0.85),rgba(240,244,249,0.6) 66%,rgba(228,235,244,0.5));
    box-shadow:0 3px 10px rgba(150,170,195,0.18),inset 0 2px 5px rgba(255,255,255,0.85),inset 0 -3px 7px rgba(180,195,215,0.15);
    transition:box-shadow .15s;animation:lyFloat 4.5s ease-in-out infinite;}
  /* 轻微漂浮:每颗相位错开(靠 nth-child 延迟),点一下缩一下 */
  @keyframes lyFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .ly-word:nth-child(3n){animation-duration:5.2s;animation-delay:-1.4s;}
  .ly-word:nth-child(3n+1){animation-duration:4.1s;animation-delay:-.6s;}
  .ly-word:nth-child(3n+2){animation-duration:4.8s;animation-delay:-2.1s;}
  .ly-word:active{transform:scale(0.88);animation-play-state:paused;box-shadow:0 2px 6px rgba(200,140,165,0.25),inset 0 2px 5px rgba(255,255,255,0.7);}
  body.is-desktop .tools{flex-direction:row;align-items:flex-start;gap:16px;}
  body.is-desktop .melody-panel{flex:78 1 0;min-width:0;border-right:1px solid var(--glass-brd-soft);padding-right:16px;}
  body.is-desktop .chord-panel{flex:22 1 0;min-width:0;}
  body.is-desktop .lyric-panel{display:none!important;} /* 桌面用旋律面板里的「✎填词」入口 */
  body.is-mobile.focus-melody .chord-panel,body.is-mobile.focus-melody .lyric-panel{display:none;}
  body.is-mobile.focus-chord .melody-panel,body.is-mobile.focus-chord .lyric-panel{display:none;}
  body.is-mobile.focus-lyric .melody-panel,body.is-mobile.focus-lyric .chord-panel{display:none;}
  body.is-mobile.focus-lyric .lyric-panel{display:flex;}

  /* ══ 手机端「弹奏模式」(试听态):键盘 + 和弦同时出现,轨道让出空间 ══ */
  /* 试听态没有 focus-*,melody-panel 与 chord-panel 都回落到默认 display:flex(即同时显示) */
  body.is-mobile.try-on .score-head{position:relative;top:auto;z-index:1;}      /* 轨道不再常驻置顶 */
  body.is-mobile.try-on .ctrls{display:none;}                                    /* 极简键盘:去掉时值选择 */
  body.is-mobile.try-on .mpad-foot{display:none;}                                /* 去掉延音/休止/哼唱/填词 */
  body.is-mobile.try-on .kb-hint{display:none;}
  body.is-mobile.try-on .lyric-panel{display:none!important;}
  body.is-mobile.try-on .melody-panel{border-right:none;padding-right:0;}
  /* 弹奏区:布局保持原样,泡泡层浮在其上 */
  body.is-mobile.try-on .tools{position:relative;}
  /* 试听态不再给音区盘套额外描边——与录入态的音符盘外观一致 */

  /* ══ 拍号 / 段落选择器 ══ */
  .ts-row{display:flex;gap:9px;}
  .ts-block{flex:1 1 0;display:flex;flex-direction:column;gap:5px;min-width:0;}
  .ts-block .seg{overflow-x:auto;scrollbar-width:none;}.ts-block .seg::-webkit-scrollbar{display:none;}
  .ts-block .seg button{padding:8px 6px;font-size:12px;}

  /* ══ 和弦轨 / 和声地毯(与旋律轨对齐) ══ */
  .chord-track-wrap{display:flex;flex-direction:column;gap:5px;}
  .chord-track{position:relative;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;height:66px;box-sizing:border-box;
    background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--glass-brd);border-radius:var(--r-lg);
    box-shadow:var(--soft-sh),inset 0 1px 0 rgba(255,255,255,0.6);}
  .chord-track::-webkit-scrollbar{display:none;}
  .chord-inner{position:relative;height:100%;min-width:100%;}
  /* 小节参考竖线 */
  .cbar{position:absolute;top:0;bottom:0;width:1px;background:rgba(143,194,220,0.14);pointer-events:none;}
  /* 小节可点区(选插入位;在底层,和弦块盖其上) */
  .ct-hit{position:absolute;top:0;bottom:0;z-index:1;cursor:pointer;}
  .ct-hit:active{background:rgba(143,194,220,0.12);}
  /* 和弦块(时间轴 clip) */
  /* 和弦块:起点清晰(左),向右渐隐 */
  .chord-clip{position:absolute;top:50%;transform:translateY(-50%);height:34px;z-index:3;border-radius:8px;cursor:pointer;overflow:hidden;touch-action:pan-x;
    display:flex;align-items:center;padding:0 6px 0 20px;box-sizing:border-box;transition:filter .15s;}
  .chord-clip .cname{font-size:17px;font-weight:700;line-height:1;letter-spacing:0.3px;position:relative;z-index:2;pointer-events:none;}
  /* 左侧起点实心竖条 */
  .chord-clip .cc-start{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:8px 0 0 8px;z-index:2;pointer-events:none;}
  /* 左侧拖动把手(唯一拖动热区,不与音轨滑动冲突) */
  .chord-clip .cc-drag{position:absolute;left:4px;top:0;bottom:0;width:15px;z-index:3;cursor:grab;touch-action:none;
    display:flex;align-items:center;justify-content:center;font-size:12px;letter-spacing:-1px;color:rgba(255,255,255,0.55);}
  .chord-clip .cc-drag:active{cursor:grabbing;}
  /* 空态引导(可点 + 闪烁):虚框框住整条和弦轨 */
  .chord-guide{position:absolute;left:4px;top:4px;bottom:4px;display:flex;align-items:center;justify-content:center;padding:0 14px;cursor:pointer;
    font-size:12.5px;font-weight:600;color:var(--ink-blue);white-space:nowrap;border-radius:12px;
    background:rgba(143,194,220,0.10);border:1.5px dashed rgba(143,194,220,0.55);}
  .chord-guide.pulse{animation:guidePulse 1.3s ease-in-out infinite;}
  @keyframes guidePulse{0%,100%{background:rgba(143,194,220,0.08);border-color:rgba(143,194,220,0.45);}50%{background:rgba(143,194,220,0.2);border-color:rgba(143,194,220,0.8);}}
  .chord-pal.flash{animation:palFlash 1.4s ease-in-out;}
  @keyframes palFlash{0%,100%{box-shadow:none;}30%,70%{box-shadow:0 0 0 3px rgba(143,194,220,0.4);}}
  .chord-clip.playing{filter:brightness(1.25);}
  .chord-clip.playing .cc-start{box-shadow:0 0 12px currentColor;}
  /* 渐隐背景(左实右透) */
  .chord-clip.func-T{background:linear-gradient(90deg,rgba(143,194,220,0.42),rgba(143,194,220,0.02));color:#6BA6C6;}
  .chord-clip.func-T .cc-start{background:#8FC2DC;}
  .chord-clip.func-SD{background:linear-gradient(90deg,rgba(231,189,199,0.45),rgba(231,189,199,0.02));color:#C99AA6;}
  .chord-clip.func-SD .cc-start{background:#E7BDC7;}
  .chord-clip.func-D{background:linear-gradient(90deg,rgba(235,207,134,0.45),rgba(235,207,134,0.02));color:#B39A52;}
  .chord-clip.func-D .cc-start{background:#EBCF86;}
  /* 位置光标 */
  .chord-caret{position:absolute;top:1px;bottom:1px;width:2.5px;z-index:5;border-radius:2px;background:linear-gradient(180deg,var(--primary),rgba(143,194,220,0.4));
    box-shadow:0 0 5px rgba(143,194,220,0.5);animation:caretBlink 1.1s ease-in-out infinite;}
  .chord-caret .cc-tip{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--primary);white-space:nowrap;}
  .chord-caret.ghost{background:rgba(143,194,220,0.4);box-shadow:none;animation:none;width:2px;} /* 下一个顺序插入位,淡 */
  body.resizing{cursor:grabbing;}
  /* 和弦插入光标(细线 + 加宽透明热区便于点) */
  .cchip-caret{position:absolute;top:2px;bottom:2px;width:10px;margin-left:-4px;background:transparent;cursor:pointer;z-index:4;}
  .cchip-caret::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:2px;background:transparent;border-radius:2px;}
  .cchip-caret:hover::before{background:rgba(143,194,220,0.4);}
  .cchip-caret::before{width:2.5px;} /* 与旋律插入光标一致 */
  .cchip-caret.on::before{background:linear-gradient(180deg,var(--primary),rgba(143,194,220,0.4));box-shadow:0 0 5px rgba(143,194,220,0.5);animation:caretBlink 1.1s ease-in-out infinite;}
  .track-legend{display:flex;gap:12px;justify-content:flex-start;align-items:center;font-size:9.5px;color:var(--fg-muted);flex-wrap:wrap;padding-left:44px;margin-top:-1px;}
  .track-legend span{display:inline-flex;align-items:center;gap:4px;}
  .track-legend i{width:9px;height:9px;border-radius:3px;}
  .track-legend .lg-T{background:#8FC2DC;}.track-legend .lg-SD{background:#E7BDC7;}.track-legend .lg-D{background:#EBCF86;}
  .score-nav{display:flex;gap:6px;}
  .score-nav button{width:26px;height:22px;border-radius:7px;border:1px solid var(--glass-brd);
    background:var(--glass);color:var(--fg-dim);font-size:10px;cursor:pointer;transition:all .15s;
    display:flex;align-items:center;justify-content:center;padding:0;}
  .score-nav button:active,.score-nav button.holding{transform:scale(0.9);background:var(--primary);color:#fff;}
  .score-nav button.holding{box-shadow:0 0 12px rgba(143,194,220,0.6);}

  /* ══ 和弦盘 ══ */
  .chord-pal-label{font-size:9.5px;color:var(--fg-muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;padding-left:4px;display:flex;align-items:center;gap:8px;}
  .chord-pal-label .tip{font-size:9px;letter-spacing:0;text-transform:none;font-weight:500;color:var(--fg-dim);background:var(--glass);border:1px solid var(--glass-brd-soft);border-radius:6px;padding:1px 7px;}
  .chord-pal{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;}
  /* 桌面:和弦区窄列 */
  body.is-desktop .chord-pal{grid-template-columns:repeat(2,1fr);gap:14px;}
  body.is-desktop .chord-btn{flex-direction:column;justify-content:center;gap:3px;padding:12px 10px;height:auto;min-height:50px;}
  body.is-desktop .chord-btn .cn{font-size:18px;}
  body.is-desktop .chord-btn .rn{font-size:10.5px;}
  /* 功能色半透明底(同上方和弦块的 button 感,无左侧竖条),底色比和弦块更浅 */
  .chord-btn{position:relative;overflow:hidden;border:none;font-family:var(--font);cursor:pointer;border-radius:var(--r-md);
    padding:12px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    background:var(--glass);box-shadow:var(--soft-sh-sm);color:var(--ink-blue);
    transition:transform .1s cubic-bezier(.34,1.56,.64,1),filter .15s,box-shadow .2s;}
  .chord-btn:active{transform:scale(0.92);}
  .chord-btn.hit{filter:brightness(1.05);box-shadow:var(--soft-sh);}
  .chord-btn .cn{font-size:16px;font-weight:700;line-height:1;}
  .chord-btn .rn{font-size:9px;font-weight:500;opacity:0.7;}

  /* 加花弹窗 */

  .var-clear{background:rgba(248,113,113,0.14);color:var(--danger);border:1px solid rgba(248,113,113,0.3);}

  /* 段落色条(和声地毯上方的段落标记) */
  .chord-empty-tip{text-align:center;font-size:11px;color:var(--fg-muted);padding:16px 8px;font-style:italic;line-height:1.6;}

  /* 和弦选项行 */
  .chord-opts{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .anchor-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;}
  .anchor-toggle input{display:none;}
  .anchor-toggle input:checked+.loop-track{background:linear-gradient(135deg,var(--accent),var(--accent-deep));border-color:transparent;box-shadow:var(--glow-a);}
  .anchor-toggle input:checked+.loop-track::after{left:18px;background:#fff;}
  .mini-btn{border:1px solid var(--glass-brd);background:var(--glass);color:var(--fg);border-radius:var(--r-sm);
    padding:8px 13px;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .15s;}
  .mini-btn:active{transform:scale(0.94);background:var(--primary);color:#fff;}

  /* 套路列表 */
  .prog-list{display:flex;flex-direction:column;gap:8px;max-height:52vh;overflow-y:auto;scrollbar-width:thin;}
  .prog-item{display:flex;flex-direction:column;gap:4px;padding:12px 14px;background:var(--glass-2);
    border:1px solid var(--glass-brd-soft);border-radius:var(--r-sm);cursor:pointer;transition:all .15s;}
  .prog-item:active{transform:scale(0.98);border-color:var(--primary);}
  .prog-item .pname{font-size:14px;font-weight:700;color:var(--fg);display:flex;align-items:center;gap:8px;}
  .prog-item .pdeg{font-size:11px;color:var(--primary-soft);font-weight:600;letter-spacing:0.5px;}
  .prog-item .pdesc{font-size:11px;color:var(--fg-muted);line-height:1.4;}

  /* 自由锚点徽标 */
  .anchor-badge{position:absolute;top:4px;transform:translateX(-50%);border-radius:9px;padding:5px 8px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:1px;white-space:nowrap;
    box-shadow:0 3px 10px rgba(0,0,0,0.3);border:1px solid;}
  .anchor-badge .abn{font-size:14px;font-weight:700;line-height:1;}
  .anchor-badge .abr{font-size:8px;opacity:0.8;}
  .anchor-badge.func-T{background:linear-gradient(150deg,#A6D0E4,#6BA6C6);border-color:rgba(143,194,220,0.6);color:#fff;}
  .anchor-badge.func-SD{background:linear-gradient(150deg,#EAC7D0,#D9A6B2);border-color:rgba(231,189,199,0.6);color:#fff;}
  .anchor-badge.func-D{background:linear-gradient(150deg,#F0DA9A,#DEC576);border-color:rgba(235,207,134,0.6);color:#fff;}
  .anchor-badge.playing{box-shadow:0 0 0 2px #fff,0 0 16px rgba(255,255,255,0.4);}
  body.anchor-on .measure-slot{opacity:0.28;filter:grayscale(0.5);pointer-events:none;}
  .anchor-hint-chip{outline:2px dashed rgba(235,207,134,0.6)!important;outline-offset:-2px;}

  @supports(padding-bottom:env(safe-area-inset-bottom)){
    .actions{padding-bottom:calc(14px + env(safe-area-inset-bottom));}
  }
  @media(max-width:480px){
    .header{padding:14px 15px 8px;}
    .content{padding:2px 12px 8px;gap:10px;}

    .note-row{gap:6px;}
    .note-btn.rest{width:130px;}
  }
  @media(prefers-reduced-motion:reduce){
    .aurora span,.brand .orb,.note-chip.active,.note-chip{animation:none!important;}
    *{transition-duration:.01ms!important;}
  }
  /* 调性弹窗 */
  .key-btn{min-width:70px;}
  .kp-label{font-size:11px;font-weight:700;color:var(--fg-muted);letter-spacing:1px;margin:14px 2px 7px;}
  .kp-grid{display:grid;gap:7px;}
  .kp-grid.tonics{grid-template-columns:repeat(6,1fr);}
  .kp-grid.modes{grid-template-columns:repeat(3,1fr);}
  .kp-btn{border:none;background:var(--glass-2);color:var(--fg);border-radius:10px;padding:9px 4px;font-family:var(--font);
    font-size:13px;font-weight:700;cursor:pointer;box-shadow:var(--soft-sh-sm);transition:all .15s;}
  .kp-btn.wide{font-size:12px;}
  .kp-btn.on{background:linear-gradient(140deg,var(--primary),var(--primary-deep));color:#fff;}
  .kp-btn:active{transform:scale(0.93);}
  .kp-capo{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:4px;}
  .kp-cbtn{width:38px;height:38px;border-radius:12px;border:none;background:var(--glass-2);color:var(--primary-deep);
    font-size:22px;font-weight:700;cursor:pointer;box-shadow:var(--soft-sh-sm);}
  .kp-cbtn:active{transform:scale(0.9);}
  #capoVal{font-size:14px;font-weight:700;color:var(--ink-blue);min-width:74px;text-align:center;}
  .kp-ai{width:100%;margin-top:16px;padding:12px;border-radius:14px;border:none;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;
    background:linear-gradient(140deg,var(--accent),var(--accent-deep));color:#fff;box-shadow:var(--soft-sh-sm);}
  .kp-ai.disabled{background:var(--glass-2);color:var(--fg-muted);cursor:not-allowed;box-shadow:none;font-size:12.5px;}

  /* ══ 乐句条:一首歌的段落流 ══ */
  .phrase-bar{position:relative;flex-shrink:0;display:flex;align-items:center;gap:8px;padding:6px 16px 8px;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;}
  .phrase-bar::-webkit-scrollbar{display:none;}
  .ph-track{display:flex;align-items:center;flex:1;min-width:0;}
  .ph-link{flex-shrink:0;width:10px;height:3px;border-radius:2px;background:rgba(160,185,210,0.4);}
  .ph-cap{flex-shrink:0;position:relative;border:none;cursor:grab;font-family:var(--font);touch-action:pan-y;
    display:flex;flex-direction:column;align-items:flex-start;gap:1px;line-height:1.1;
    padding:7px 13px;border-radius:13px;background:var(--glass);box-shadow:var(--soft-sh-sm);
    transition:transform .16s cubic-bezier(.34,1.4,.6,1),box-shadow .18s,background .18s;}
  .ph-cap.dragging{z-index:20;cursor:grabbing;opacity:0.96;transition:none;box-shadow:0 8px 22px rgba(120,150,190,0.38);}
  body.ph-dragging{user-select:none;-webkit-user-select:none;}
  .ph-drop-line{position:absolute;top:9px;bottom:11px;width:3px;border-radius:2px;margin-left:-1.5px;
    background:var(--primary-deep);box-shadow:0 0 8px rgba(125,180,214,0.85);pointer-events:none;z-index:15;}
  .ph-cap .pc-name{font-size:12.5px;font-weight:700;color:var(--ink-blue);white-space:nowrap;}
  .ph-cap .pc-meta{font-size:9px;font-weight:500;color:var(--fg-muted);white-space:nowrap;}
  .ph-cap:active{transform:scale(0.94);}
  /* 段落色(左侧一点色 + 淡底) */
  .ph-cap::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:3px;border-radius:0 3px 3px 0;}
  .ph-cap.sec-intro::before{background:#9BD3D0;}   .ph-cap.sec-intro{background:rgba(155,211,208,0.14);}
  .ph-cap.sec-verse::before{background:#8FC2DC;}    .ph-cap.sec-verse{background:rgba(143,194,220,0.14);}
  .ph-cap.sec-prechorus::before{background:#A9D0A0;} .ph-cap.sec-prechorus{background:rgba(169,208,160,0.15);}
  .ph-cap.sec-chorus::before{background:#EDA9B9;}   .ph-cap.sec-chorus{background:rgba(237,169,185,0.16);}
  .ph-cap.sec-bridge::before{background:#C3A9E0;}   .ph-cap.sec-bridge{background:rgba(195,169,224,0.15);}
  .ph-cap.sec-interlude::before{background:#EBCF86;} .ph-cap.sec-interlude{background:rgba(235,207,134,0.16);}
  .ph-cap.sec-outro::before{background:#A6B4C4;}    .ph-cap.sec-outro{background:rgba(166,180,196,0.16);}
  /* 当前句:放大 + 高光描边 */
  .ph-cap.on{transform:scale(1.12);box-shadow:0 0 0 2px rgba(166,210,236,0.7),var(--soft-sh);z-index:2;}
  .ph-cap.on .pc-name{color:var(--fg);}
  .ph-add,.ph-play{flex-shrink:0;border:none;cursor:pointer;font-family:var(--font);font-weight:700;
    border-radius:12px;box-shadow:var(--soft-sh-sm);transition:transform .12s,box-shadow .15s;}
  .ph-add{width:34px;height:34px;font-size:20px;line-height:1;color:var(--primary-deep);background:var(--surface);}
  .ph-play{padding:0 12px;height:34px;font-size:12px;color:#fff;background:linear-gradient(140deg,var(--primary),var(--primary-deep));white-space:nowrap;}
  .ph-add:active,.ph-play:active{transform:scale(0.9);}
  .ph-play.playing{background:linear-gradient(140deg,var(--accent),var(--accent-deep));}
  body.is-mobile .phrase-bar{padding:4px 12px 6px;}
  /* 乐句设置弹窗 */
  .ph-secs{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .sec-chip{position:relative;}
  .php-note{width:100%;box-sizing:border-box;margin-top:2px;padding:11px 13px;border-radius:12px;resize:none;
    font-family:var(--font);font-size:13px;line-height:1.5;color:var(--fg);
    background:var(--glass-2);border:1px solid var(--glass-brd-soft);box-shadow:var(--soft-sh-sm) inset;outline:none;
    transition:box-shadow .18s,border-color .18s;}
  .php-note::placeholder{color:var(--fg-muted);font-size:12px;line-height:1.5;}
  .php-note:focus{border-color:rgba(143,194,220,0.6);box-shadow:0 0 0 2px rgba(166,210,236,0.35);}
  .php-acts{display:flex;gap:9px;margin-top:16px;}
  .php-act{flex:1;border:none;border-radius:12px;padding:11px;font-family:var(--font);font-size:13px;font-weight:700;
    cursor:pointer;background:var(--glass-2);color:var(--ink-blue);box-shadow:var(--soft-sh-sm);}
  .php-act.danger{color:var(--danger);}
  .php-act:disabled{opacity:0.4;cursor:not-allowed;}
  .php-act:active{transform:scale(0.95);}

  /* ══ 自定义和弦构建面板 ══ */
  .cb-card{max-width:360px;padding:14px 20px 18px;gap:0;}
  .cb-preview{position:sticky;top:-14px;z-index:3;display:flex;align-items:center;gap:10px;margin:-14px -20px 6px;padding:14px 20px 9px;
    background:linear-gradient(140deg,rgba(224,238,248,0.96),rgba(248,236,240,0.96));backdrop-filter:blur(6px);box-shadow:0 4px 10px rgba(120,150,190,0.1);}
  .cb-pv-name{font-size:20px;font-weight:800;color:var(--fg);line-height:1;letter-spacing:0.3px;}
  .cb-pv-notes{flex:1;font-size:10.5px;color:var(--fg-dim);line-height:1.35;}
  .cb-pv-play{flex-shrink:0;width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;font-size:13px;color:#fff;
    display:flex;align-items:center;justify-content:center;padding:0;line-height:1;
    background:linear-gradient(140deg,var(--primary),var(--primary-deep));box-shadow:var(--soft-sh-sm);}
  .cb-pv-play:active{transform:scale(0.9);}
  .cb-layer{margin-top:9px;}
  .cb-lb{font-size:10px;font-weight:700;color:var(--fg-muted);letter-spacing:0.5px;margin:0 2px 4px;display:flex;align-items:baseline;gap:5px;}
  .cb-lb small{font-size:9px;font-weight:500;letter-spacing:0;color:var(--fg-muted);opacity:0.8;}

  .cb-grid.c4{grid-template-columns:repeat(4,1fr);}

  .cb-opt.on{background:linear-gradient(140deg,var(--primary),var(--primary-deep));color:#fff;}
  .cb-opt.on small{color:rgba(255,255,255,0.85);}
  .cb-opt.ext.on{background:linear-gradient(140deg,var(--accent),var(--accent-deep));color:#5A4A20;}
  .cb-opt:active{transform:scale(0.92);}
  .cb-seg{display:flex;gap:5px;margin-bottom:5px;}
  .cb-seg .cb-opt{flex:1;}
  .cb-bass-body{margin-top:6px;}
  .cb-note-grid{grid-template-columns:repeat(6,1fr);}
  .cb-add{width:100%;margin-top:12px;padding:11px;border-radius:12px;border:none;font-family:var(--font);font-size:14px;font-weight:800;
    cursor:pointer;color:#fff;background:linear-gradient(140deg,var(--primary),var(--primary-deep));box-shadow:var(--soft-sh);}
  .cb-add:active{transform:scale(0.97);}

  /* ══ AI 悬浮气泡 ══ */
  .ai-orb{position:fixed;z-index:150;right:18px;bottom:88px;width:54px;height:54px;border-radius:50%;border:none;cursor:grab;
    display:flex;align-items:center;justify-content:center;color:#fff;touch-action:none;
    background:radial-gradient(circle at 35% 30%,#B6DCF4,var(--primary) 50%,var(--primary-deep));
    box-shadow:var(--neu-raise),0 6px 18px rgba(125,180,214,0.4);animation:orbBreathe 4s ease-in-out infinite;transition:transform .15s;}
  .ai-orb:active{cursor:grabbing;}
  .ai-orb.dragging{transition:none;animation:none;transform:scale(1.08);}
  .ai-orb svg{filter:drop-shadow(0 1px 2px rgba(80,120,150,0.4));}
  @keyframes orbBreathe{0%,100%{box-shadow:var(--neu-raise),0 6px 18px rgba(125,180,214,0.35)}50%{box-shadow:var(--neu-raise),0 8px 24px rgba(125,180,214,0.55),0 0 0 4px rgba(166,210,236,0.18)}}
  .ai-orb.hidden{opacity:0;pointer-events:none;transform:scale(0.5);}
  body.stage-on .ai-orb{opacity:0;pointer-events:none;transform:scale(0.5);} /* 成曲页不显示悬浮AI气泡 */

  /* ══ AI 面板:桌面浮窗 / 手机底部弹窗 ══ */
  .ai-scrim{position:fixed;inset:0;z-index:158;background:transparent;opacity:0;pointer-events:none;transition:opacity .25s;}
  .ai-scrim.show{opacity:1;pointer-events:auto;}
  .ai-panel{position:fixed;z-index:160;display:flex;flex-direction:column;font-family:var(--font);
    background:var(--surface);box-shadow:0 12px 40px rgba(120,150,190,0.28);
    opacity:0;pointer-events:none;transition:transform .28s cubic-bezier(.34,1.3,.64,1),opacity .22s;}
  .ai-panel.show{opacity:1;pointer-events:auto;}
  .aip-head{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:13px 16px 9px;}
  .aip-title{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:800;color:var(--fg);}
  .aip-title svg{color:var(--primary-deep);}
  .aip-close{border:none;background:var(--glass-2);color:var(--fg-dim);width:26px;height:26px;border-radius:8px;cursor:pointer;font-size:13px;}
  .aip-close:active{transform:scale(0.9);}
  .aip-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 16px;-webkit-overflow-scrolling:touch;}
  .aip-body::-webkit-scrollbar{width:5px;}.aip-body::-webkit-scrollbar-thumb{background:rgba(160,185,210,0.4);border-radius:3px;}
  /* 桌面:右下浮窗 */

  body.is-desktop .ai-panel.show{transform:none;}

  body.is-mobile .ai-panel.show{transform:none;}

  /* 面板内部控件 */
  .aip-lb{font-size:10.5px;font-weight:700;color:var(--fg-muted);letter-spacing:0.5px;margin:12px 2px 6px;}

    background:var(--glass-2);color:var(--fg);box-shadow:var(--soft-sh-sm);transition:all .13s;}
  .aip-seg button.on{background:linear-gradient(140deg,var(--primary),var(--primary-deep));color:#fff;}
  .aip-seg button:active{transform:scale(0.95);}
  .aip-selinfo{font-size:12px;color:var(--fg-dim);background:var(--glass-2);border-radius:10px;padding:8px 11px;margin-top:8px;line-height:1.4;}
  .aip-selinfo b{color:var(--primary-deep);}
  .aip-selinfo.empty{color:var(--fg-muted);}
  .aip-note{width:100%;box-sizing:border-box;margin-top:4px;padding:10px 12px;border-radius:12px;resize:none;font-family:var(--font);
    font-size:13px;line-height:1.5;color:var(--fg);background:var(--glass-2);border:1px solid var(--glass-brd-soft);outline:none;transition:box-shadow .18s;}
  .aip-note::placeholder{color:var(--fg-muted);font-size:12px;}
  .aip-note:focus{box-shadow:0 0 0 2px rgba(166,210,236,0.35);}
  .aip-go{width:100%;margin-top:12px;padding:12px;border-radius:13px;border:none;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;

  .aip-go:disabled{opacity:0.45;cursor:not-allowed;}
  .aip-go:active:not(:disabled){transform:scale(0.98);}
  .aip-key{margin-top:10px;display:flex;gap:7px;align-items:center;}
  .aip-key input{flex:1;min-width:0;box-sizing:border-box;padding:8px 10px;border-radius:10px;border:1px solid var(--glass-brd-soft);
    background:var(--glass-2);font-family:var(--font);font-size:12px;color:var(--fg);outline:none;}
  .aip-key small{font-size:9.5px;color:var(--fg-muted);}
  .aip-hint{font-size:10.5px;color:var(--fg-muted);margin-top:6px;line-height:1.5;}

  .aip-result{margin-top:14px;border-top:1px solid var(--glass-brd-soft);padding-top:12px;}
