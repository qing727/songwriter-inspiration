    h+='<div class="aip-lb">生成目标</div><div class="aip-seg">'
      +'<button class="'+(aiTarget==='melody'?'on':'')+'" data-t="melody">🎵 旋律</button>'
      +'<button class="'+(aiTarget==='chord'?'on':'')+'" data-t="chord">🎸 和弦</button></div>';
    // 选区信息
    if(aiSel){
      const span=((aiSel.b1-aiSel.b0)/measureLen()).toFixed(2).replace(/\.?0+$/,'');
      h+='<div class="aip-selinfo">已选 <b>'+(aiTarget==='melody'?'旋律':'和弦')+'</b> · <b>'+span+'</b> 小节。点相邻格可扩(最多 4 小节),点已选可取消。</div>';
    }else{
      h+='<div class="aip-selinfo empty">👆 在'+(aiTarget==='melody'?'上方旋律轨':'和弦轨')+'上<b>点选小节格</b>(1~4 小节)让 AI 来写</div>';
    }
    h+='<div class="aip-lb">想怎么写(可选)</div>';
    h+='<textarea class="aip-note" id="aipNote" rows="2" maxlength="120" placeholder="例:更抓耳、上行推向高点 / 换个忧伤的和声…"></textarea>';
    h+='<button class="aip-go" id="aipGo"'+((!aiSel||aiBusy)?' disabled':'')+'>'+(aiBusy?'生成中…':'✦ 让 AI 写这段')+'</button>';
    if(!hasKey){
      h+='<div class="aip-key"><input id="aipKey" type="password" placeholder="粘贴 DeepSeek API Key"><button class="aip-close" id="aipKeySave" style="width:auto;padding:0 10px">存</button></div>';
      h+='<div class="aip-hint">Key 仅保存在你本机浏览器,用于直接调用 DeepSeek。</div>';
    }else{
      h+='<div class="aip-hint">已配置 DeepSeek Key(存本机)。<a href="#" id="aipKeyClear" style="color:var(--primary-deep)">更换</a></div>';
    }
    if(aiBusy){h+='<div class="aip-loading">AI 正在谱写<span class="dot">…</span></div>';}
    if(aiResult){
      h+='<div class="aip-result">';
      if(aiResult.reason)h+='<div class="aip-reason">'+esc(aiResult.reason)+'</div>';
      h+='<div class="aip-preview">'+previewHTML(aiResult)+'</div>';
      h+='<div class="aip-acts"><button class="aip-try" id="aipTry">'+(playing?'⏹ 停止':'▶ 试听整段')+'</button><button class="aip-redo" id="aipRedo">再写一版</button></div>';
      h+='<div class="aip-acts"><button class="aip-fill" id="aipFill">✓ 填入这段</button></div>';
      h+='</div>';
    }
    aipBody.innerHTML=h;
    aipBody.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',()=>{setAiTarget(b.dataset.t);renderAIPanel();}));
    const go=$('aipGo');if(go)go.addEventListener('click',runAI);
    const ks=$('aipKeySave');if(ks)ks.addEventListener('click',()=>{const v=($('aipKey').value||'').trim();if(v){localStorage.setItem(DS_KEY_LS,v);flash('已保存 Key');renderAIPanel();}});
    const kc=$('aipKeyClear');if(kc)kc.addEventListener('click',e=>{e.preventDefault();localStorage.removeItem(DS_KEY_LS);renderAIPanel();});
    const fl=$('aipFill');if(fl)fl.addEventListener('click',applyAIResult);
    const rd=$('aipRedo');if(rd)rd.addEventListener('click',runAI);
    const tr=$('aipTry');if(tr)tr.addEventListener('click',()=>{previewPlayAI();renderAIPanel();});
  }
  async function runAI(){
    if(!aiSel){flash('先在轨道上拖选一段');return;}
    if(aiBusy)return;
    const userText=($('aipNote')&&$('aipNote').value||'').trim();
    aiBusy=true;aiResult=null;renderAIPanel();
    try{
      const ctx=aiContext();const {system,user}=buildAIPrompt(ctx,userText);
      const j=await callDeepSeek(system,user);
      aiResult=parseAIResult(j);
      if(!aiResult.items.length)flash('AI 没给出可用内容,换个说法再试');
    }catch(e){
      if(e.message==='NO_KEY')flash('请先填入 DeepSeek API Key');
      else flash('生成失败:'+e.message);
    }
    aiBusy=false;renderAIPanel();
  }

  // 轨道上绑定框选(捕获阶段,armed 时拦截,避免触发音符/和弦原有点击)
  // AI 小节点选:改为点小节格(renderMeasureCells 里绑 click),不再用轨道拖选

  function renderChordTrack(){
    if(!chordInner)return;
    sortChords();chordInner.innerHTML='';
    const segs=melodySegs();
    const span=totalSpan();
    let totalW=Math.max(melodyBox.scrollWidth||0, beatToX(span,segs));
    const mL=measureLen();
    // 小节竖线
    for(let m=1;m*mL<span+1e-6;m++){
      const ln=document.createElement('div');ln.className='cbar';ln.style.left=beatToX(m*mL,segs)+'px';chordInner.appendChild(ln);
    }
    // 位置光标:手动选中显示实线"在此放";否则显示下一个顺序插入位(淡)
    const caretAt=(selChordAt!=null)?selChordAt:chordCursor;
    if(caretAt!=null){
      const cx=beatToX(caretAt,segs);
      const car=document.createElement('div');car.className='chord-caret'+(selChordAt!=null?'':' ghost');car.style.left=(cx-1)+'px';
      if(selChordAt!=null)car.innerHTML='<span class="cc-tip">在此放和弦</span>';
      chordInner.appendChild(car);
    }
    // 和弦块:起点清晰,向右渐隐;渐隐范围 = min(到下一和弦, 一小节)
    chords.forEach((c,i)=>{
      const start=c.at;
      const fadeEnd=Math.min(chordEndBeat(i),start+mL); // 渐隐最长一小节
      const left=beatToX(start,segs),w=Math.max(34,beatToX(fadeEnd,segs)-left);
      const slot=document.createElement('div');slot.dataset.i=i;
      slot.className='chord-clip func-'+c.func+(c._ghost?' ai-ghost':'');
      slot.style.left=left+'px';slot.style.width=w+'px';
      // 左侧把手=拖动热区(触摸时才独占,不与音轨滑动打架);其余区域点=选中/试听
      slot.innerHTML='<span class="cc-start"></span><span class="cc-drag" title="拖动移位">⋮</span><span class="cname">'+chordName(c)+'</span>';
      clipInteract(slot,i,c);
      chordInner.appendChild(slot);
    });
    // 空态引导(精简 + 闪烁吸引点击);点一下=聚焦和弦区并高亮和弦盘
    if(!chords.length){
      const g=document.createElement('div');g.className='chord-guide pulse';
      g.innerHTML='🎸 点这里,先加个和弦';
      // 只框住可视轨宽(不随内容一长溜):宽度取轨可视宽 - 边距
      const vw=(chordTrack&&chordTrack.clientWidth)?chordTrack.clientWidth:0;
      if(vw)g.style.width=(vw-8)+'px';
      g.addEventListener('click',ev=>{ev.stopPropagation();setPanel('chord');
        if(chordPal){chordPal.classList.add('flash');setTimeout(()=>chordPal.classList.remove('flash'),1400);}
        flash('挑一个和弦放进来吧');});
      chordInner.appendChild(g);
    }
    chordInner.style.width=totalW+'px';
    // 点空白 = 把位置光标移到该拍
    chordInner.onclick=ev=>{
      if(ev.target!==chordInner&&ev.target.className!=='cbar')return;
      const rect=chordInner.getBoundingClientRect();
      selChordAt=snapBeat(xToBeat(ev.clientX-rect.left,segs));renderChordTrack();flash('已选位置 · 点下方和弦放入');
    };
    if(chordTrack)chordTrack.scrollLeft=melodyBox.scrollLeft;
    if(ctInfo)ctInfo.textContent=chords.length?(chords.length+'个和弦'):'';
  }

  // 和弦块交互:
  //  · 拖动只从左侧把手(.cc-drag)发起 → 不和音轨横向滑动打架
  //  · 块主体:轻点=选位/试听,长按=加花/删除
  function clipInteract(el,i,c){
    const grip=el.querySelector('.cc-drag');
    // 主体点击/长按(不含把手)
    let lp=null,fired=false,px=0,py=0;
    el.addEventListener('pointerdown',e=>{
      if(e.target===grip)return; // 把手交给拖动逻辑
      fired=false;px=e.clientX;py=e.clientY;
      lp=setTimeout(()=>{fired=true;if(navigator.vibrate)navigator.vibrate(14);openVariants(c,i);},420);
    });
    el.addEventListener('pointermove',e=>{if(lp&&Math.hypot(e.clientX-px,e.clientY-py)>10){clearTimeout(lp);lp=null;}});
    el.addEventListener('pointerup',e=>{
      if(e.target===grip)return;
      if(lp){clearTimeout(lp);lp=null;}if(fired)return;
      const segs=melodySegs();const rect=chordTrack.getBoundingClientRect();
      const at=snapBeat(xToBeat(e.clientX-rect.left+chordTrack.scrollLeft,segs));
      if(Math.abs(at-c.at)<0.25){playChord(c,600,true);selChordAt=null;}
      else{selChordAt=at;flash('在此处点和弦→上个和弦到此终止');}
      renderChordTrack();
    });
    el.addEventListener('pointercancel',()=>{if(lp){clearTimeout(lp);lp=null;}});
    // 把手拖动
    if(grip){
      let dragging=false,curAt=c.at,segsCache=null,pid=null;
      grip.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();
        dragging=true;curAt=c.at;pid=e.pointerId;segsCache=melodySegs();
        document.body.classList.add('resizing');try{grip.setPointerCapture(pid);}catch(_){}});
      grip.addEventListener('pointermove',e=>{if(!dragging)return;e.preventDefault();e.stopPropagation();
        const rect=chordTrack.getBoundingClientRect();const x=e.clientX-rect.left+chordTrack.scrollLeft;
        let at=snapBeat(xToBeat(x,segsCache));
        const prev=i>0?chords[i-1].at+0.5:0, next=i<chords.length-1?chords[i+1].at-0.5:1e9;
        at=Math.max(prev,Math.min(next,at));curAt=at;el.style.left=beatToX(at,segsCache)+'px';});
      const gend=e=>{if(!dragging)return;dragging=false;document.body.classList.remove('resizing');
        try{grip.releasePointerCapture(pid);}catch(_){}
        chords[i].at=curAt;sortChords();renderChordTrack();};
      grip.addEventListener('pointerup',gend);grip.addEventListener('pointercancel',gend);
    }
  }

  function renderChordPal(){
    if(!chordPal)return;
    chordPal.innerHTML='';
    diatonicChords(key).forEach(c=>{
      const b=document.createElement('button');b.className='chord-btn func-'+c.func;
      b.innerHTML='<span class="cn">'+chordName(c)+'</span><span class="rn">'+c.roman+'</span>';
      let lp=null,fired=false,px=0,py=0;
      b.addEventListener('pointerdown',e=>{fired=false;px=e.clientX;py=e.clientY;
        lp=setTimeout(()=>{fired=true;if(navigator.vibrate)navigator.vibrate(14);openVariants(c,-1);},460);});
      b.addEventListener('pointermove',e=>{if(lp&&Math.hypot(e.clientX-px,e.clientY-py)>10){clearTimeout(lp);lp=null;}});
      b.addEventListener('pointerup',()=>{if(lp){clearTimeout(lp);lp=null;}if(!fired){hit(b);
        if(tryMode){playChord(c,700,true);}else{fillChord(c);}}}); // 试音态:只发声不填入
      b.addEventListener('pointercancel',()=>{if(lp){clearTimeout(lp);lp=null;}});
      chordPal.appendChild(b);
    });
    // 自定义和弦按钮(点=填入,长按=删除)
    customPals.forEach((sp,ci)=>{
      const c={rootLetter:sp.rootLetter,rootPC:sp.rootPC,quality:'custom',spec:sp,func:specFunc(sp),section:section};
      const b=document.createElement('button');b.className='chord-btn func-'+c.func+' custom';
      b.innerHTML='<span class="cn">'+specName(sp)+'</span><span class="rn">自定义</span>';
      let lp=null,fired=false,px=0,py=0;
      b.addEventListener('pointerdown',e=>{fired=false;px=e.clientX;py=e.clientY;
        lp=setTimeout(()=>{fired=true;if(navigator.vibrate)navigator.vibrate(14);
          if(confirm('删除自定义和弦「'+specName(sp)+'」?')){customPals.splice(ci,1);renderChordPal();}},520);});
      b.addEventListener('pointermove',e=>{if(lp&&Math.hypot(e.clientX-px,e.clientY-py)>10){clearTimeout(lp);lp=null;}});
      b.addEventListener('pointerup',()=>{if(lp){clearTimeout(lp);lp=null;}if(!fired){hit(b);
        if(tryMode){playChord(c,700,true);}else{fillChord(c);}}});
      b.addEventListener('pointercancel',()=>{if(lp){clearTimeout(lp);lp=null;}});
      chordPal.appendChild(b);
    });
    // 末尾:虚线加号 → 打开构建面板
    const add=document.createElement('button');add.className='chord-btn cb-add-btn';
    add.innerHTML='<span class="cn">＋</span>';add.title='自定义和弦';
    add.addEventListener('click',()=>{hit(add);openChordBuilder();});
    chordPal.appendChild(add);
  }

  // 加花:target>=0 改已有和弦 i;target=-1 表示对和弦盘按钮长按(新建变体到选中位)
  function openVariants(baseC,target){
    const triadQual=(CURCHORDS[baseC.degree]||{}).quality||'maj';
    const vars=variantsFor(triadQual);
    const curQual=(target>=0&&chords[target])?chords[target].quality:baseC.quality;
    let html='<div class="var-pop"><div class="vp-head">为 <b>'+baseC.rootLetter+'</b>('+baseC.roman+')加花 · 选一种色彩</div><div class="var-grid">';
    vars.forEach(v=>{const nm=baseC.rootLetter+(QUAL_SUFFIX[v.q]||'');
      html+='<button class="var-item'+(v.q===curQual?' on':'')+'" data-q="'+v.q+'"><span>'+nm+'</span><span class="vdesc">'+v.desc+'</span></button>';});
    html+='</div>';
    if(target>=0)html+='<button class="ai-close var-clear" id="varClear">删除此和弦</button>';
    html+='<button class="ai-close" id="varClose">关闭</button></div>';
    varCard.innerHTML=html;varOverlay.classList.add('show');
    setTimeout(()=>{
      varCard.querySelectorAll('.var-item').forEach(vb=>vb.addEventListener('click',()=>{
        const q=vb.dataset.q;
        if(target>=0){const nc=Object.assign({},chords[target],baseC,{quality:q,at:chords[target].at});chords[target]=nc;playChord(nc,700,true);renderChordTrack();}
        else fillChord(baseC,q);
        varOverlay.classList.remove('show');
      }));
      const cl=$('varClear');if(cl)cl.addEventListener('click',()=>{const delAt=chords[target].at;chords.splice(target,1);selChordAt=null;chordCursor=delAt;renderChordTrack();varOverlay.classList.remove('show');flash('已删除,下一个填回这里');});
      const cc=$('varClose');if(cc)cc.addEventListener('click',()=>varOverlay.classList.remove('show'));
    },40);
  }

  function chordAtBeat(b){ // 当前拍属于哪个和弦(最后一个 at<=b)
    let idx=-1;for(let i=0;i<chords.length;i++){if(chords[i].at<=b+1e-6)idx=i;else break;}return idx;
  }
  function highlightChordClip(idx){if(!chordInner)return;chordInner.querySelectorAll('.chord-clip').forEach((s)=>s.classList.toggle('playing',parseInt(s.dataset.i)===idx));}

  // ═══ L2 经典进行套路(铺成一小节一个) ═══
  const progOverlay=$('progOverlay'),progCard=$('progCard');
  function openProgressions(){
    const minorK=(MODES[modeId].parent==='minor');
    let html='<h3>🎼 经典和弦进行</h3><div class="ai-desc">一键铺成每小节一个和弦,可再拖动/替换</div><div class="prog-list">';
    PROGRESSIONS.forEach((p,pi)=>{
      const dia=diatonicChords(key);const preview=p.degs.map(d=>chordName(dia[d])).join(' - ');
      html+='<div class="prog-item" data-pi="'+pi+'"><div class="pname">'+p.name+(p.key===(minorK?'minor':'major')?' <span class="pdeg">·契合当前调</span>':'')+'</div><div class="pdeg">'+preview+'</div><div class="pdesc">'+p.desc+'</div></div>';
    });
    html+='</div><button class="ai-close" id="progClose">关闭</button>';
    progCard.innerHTML=html;progOverlay.classList.add('show');
    setTimeout(()=>{
      progCard.querySelectorAll('.prog-item').forEach(it=>it.addEventListener('click',()=>{
        applyProgression(PROGRESSIONS[parseInt(it.dataset.pi)]);progOverlay.classList.remove('show');
      }));
      const cl=$('progClose');if(cl)cl.addEventListener('click',()=>progOverlay.classList.remove('show'));
    },40);
  }
  function applyProgression(p){
    const dia=diatonicChords(key),mL=measureLen();
    chords.length=0;p.degs.forEach((d,i)=>chords.push(Object.assign({},dia[d],{at:i*mL,section:section})));
    selChordAt=null;chordCursor=p.degs.length*mL;renderChordTrack();flash('已套用:'+p.name);
  }
  progOverlay.addEventListener('click',e=>{if(e.target===progOverlay)progOverlay.classList.remove('show');});

  // 只播和弦进行(无旋律时);按每个和弦的真实时长走,支持循环 + 停止
  function playChordProgression(){
    if(playing){stopPlayback();return;}
    if(!chords.length){flash('还没有和弦');return;}
    if(timer){clearTimeout(timer);timer=null;}
    const a=audio();if(a.state==='suspended'){a.resume();}
    playing=true;btnPlay.textContent='⏸';btnPlay.classList.add('playing');
    const bpm=parseInt(speedSlider.value),baseMs=(60/bpm)*1000;let j=0;
    function step(){
      if(!playing)return;
      if(j>=chords.length){if(loopCheck.checked){j=0;}else{stopPlayback();return;}}
      const c=chords[j],dur=chordEndBeat(j)-c.at;
      highlightChordClip(j);playChord(c,baseMs*dur*0.92,true);
      j++;timer=setTimeout(step,baseMs*dur);
    }
    step();
  }

  // 旋律轨 ⇆ 和弦轨 横向滚动同步(对齐)
  let syncing=false;
  if(chordTrack){
    melodyBox.addEventListener('scroll',()=>{if(syncing)return;syncing=true;chordTrack.scrollLeft=melodyBox.scrollLeft;syncing=false;});
    chordTrack.addEventListener('scroll',()=>{if(syncing)return;syncing=true;melodyBox.scrollLeft=chordTrack.scrollLeft;syncing=false;});
  }
  // 乐谱左右滚动:按住持续滚动,越按越快(松手停);轻点走一小步
  const _sl=$('scrollL'),_sr=$('scrollR');
  function holdScroll(btn,dir){
    if(!btn)return;let raf=null,vel=0,held=false,t0=0;
    function tick(){if(!held)return;vel=Math.min(26,vel+0.6);melodyBox.scrollLeft+=dir*vel;raf=requestAnimationFrame(tick);}
    function start(e){e.preventDefault();held=true;vel=6;btn.classList.add('holding');raf=requestAnimationFrame(tick);}
    function stop(){held=false;if(raf)cancelAnimationFrame(raf);btn.classList.remove('holding');}
    btn.addEventListener('pointerdown',start);
    btn.addEventListener('pointerup',stop);btn.addEventListener('pointerleave',stop);btn.addEventListener('pointercancel',stop);
  }
  holdScroll(_sl,-1);holdScroll(_sr,1);

  // 点轨聚焦:点旋律轨=旋律态,点和弦轨=和弦态(取代 tab)
  let panel='melody';
  function setPanel(p){
    panel=p;
    document.body.classList.toggle('focus-chord',p==='chord');
    document.body.classList.toggle('focus-melody',p==='melody');
    if(p==='chord'){renderChordPal();renderChordTrack();}
  }
  melodyBox.addEventListener('pointerdown',()=>{if(panel!=='melody')setPanel('melody');},true);
  if(chordTrack)chordTrack.addEventListener('pointerdown',()=>{if(panel!=='chord')setPanel('chord');},true);
  varOverlay.addEventListener('click',e=>{if(e.target===varOverlay)varOverlay.classList.remove('show');});

  // 段落
  document.querySelectorAll('#sectionRow button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#sectionRow button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');
    section=b.dataset.sec;flash('当前段落:'+b.textContent);
  }));

  // 和弦休止 / 套路 / 试听进行
  const btnChordClear=$('btnChordClear');if(btnChordClear)btnChordClear.addEventListener('click',()=>{if(!chords.length){flash('没有和弦');return;}chords.length=0;selChordAt=null;chordCursor=0;renderChordTrack();flash('已清空和弦');});
  const btnProg=$('btnProg');if(btnProg)btnProg.addEventListener('click',openProgressions);

  // ═══ 键盘快捷键 ═══
  document.addEventListener('keydown',e=>{
    if(isMobileMode)return;
    if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName))return;
    if(aiOverlay.classList.contains('show'))return;
    if(e.metaKey||e.ctrlKey||e.altKey)return;
    const k=e.key;
    if(!e.shiftKey&&k>='1'&&k<='7'){
      e.preventDefault();const idx=parseInt(k)-1;
      if(curIn[idx]){hit(inBtns[idx]);ripple(inBtns[idx]);add(curIn[idx][0],curIn[idx][1],true);}
      return;
    }
    if(e.shiftKey&&k>='1'&&k<='5'){
      e.preventDefault();const idx=parseInt(k)-1;
      if(curOut[idx]){hit(outBtns[idx]);ripple(outBtns[idx],'rgba(235,207,134,0.6)');addOut(curOut[idx][0],curOut[idx][1],curOut[idx][2]);}
      return;
    }
    if(k==='ArrowLeft'){e.preventDefault();if(octave>-1){octave--;renderNotes();flash(OCT_LABELS[octave]+'音区');}else{flash('已是最低音区');}return;}
    if(k==='ArrowRight'){e.preventDefault();if(octave<1){octave++;renderNotes();flash(OCT_LABELS[octave]+'音区');}else{flash('已是最高音区');}return;}
    if(k===' '){e.preventDefault();hit(tieBtn);addTie();return;}
    if(k==='0'){e.preventDefault();hit(restBtn);addRest();return;}
    if(k==='Enter'){e.preventDefault();playMelody();return;}
    if(k==='Backspace'||k==='Delete'){e.preventDefault();if(playing)return;if(melody.length){melody.pop();renderMelody();flash('已撤销');}return;}
  });

  // ═══ 切换调:保持简谱级数,整体移到新调 ═══
  const PC_NAME=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  function transposeNote(note,semis){
    const m=note&&note.match(/^([A-G][#b]?)(\d)$/);if(!m)return note;
    const abs=(parseInt(m[2])+1)*12+PC[m[1]]+semis;
    return PC_NAME[((abs%12)+12)%12]+(Math.floor(abs/12)-1);
  }
  function parseDeg(label){ // 从简谱标签解析级数与八度
    let oct=0;if(label.indexOf('̲')>=0)oct=-1;else if(label.indexOf('̄')>=0)oct=1;
    const base=label.replace(/[̲̄]/g,'');
    if(/^[1-7]$/.test(base))return{deg:parseInt(base)-1,oct:oct,inKey:true};
    return{inKey:false};
  }
  // 切换主音/调式/变调夹后:重建音阶,按简谱标签把旋律重映射到新调式,和弦按级数重映射
  function applyKey(nTonic,nMode,nCapo){
    commitPhrase(); // 先把当前缓冲写回,整首歌统一调性
    const oldQual=CURCHORDS.map(c=>c.quality); // 旧调式各级基本三和弦(用于识别未加花的和弦)
    const oldTonic=tonicPC; // 记录旧主音,自定义和弦按主音差整体移调
    tonicPC=((nTonic%12)+12)%12;modeId=nMode in MODES?nMode:'major';capo=nCapo|0;
    const tDelta=((tonicPC-oldTonic)%12+12)%12; // 主音升了几个半音
    rebuildKey();
    // 建 标签→音符 映射表(含高低音区 + 调外)
    const cur=SCALES[key],oc=OCT[key],labMap={};
    const put=arr=>arr.forEach(([n,l])=>{if(!(l in labMap))labMap[l]=n;});
    put(cur.inKey);put(oc.down);put(oc.up);
    // 调外音:升号/降号两种写法都登记(等音,指向同一音符)
    cur.outKey.forEach(([n,sh,fl])=>{if(!(sh in labMap))labMap[sh]=n;if(!(fl in labMap))labMap[fl]=n;});
    const remapMel=mel=>mel.map(n=>{
      if(n.rest||n.tie)return n;
      const nn=labMap[n.label];
      if(nn){const isIn=cur.inKey.concat(oc.down,oc.up).some(([,l])=>l===n.label);
        return Object.assign({},n,{note:nn,inKey:isIn,freq:soundFreq(nn)});}
      // 该标签在新调式中不存在(如切到五声后的 4/7):保留原音名,重算发声,标为调外
      return Object.assign({},n,{inKey:false,freq:soundFreq(n.note)});
    });
    // 和弦:级数不变,根音/性质换成新调式对应级数(加花变体保留)
    const remapCh=arr=>arr.map(c=>{
      // 自定义和弦是绝对和弦:按主音差整体移调(根音+斜杠低音),级数结构不变
      if(c.spec){
        const sp=Object.assign({},c.spec);sp.rootPC=(sp.rootPC+tDelta)%12;sp.rootLetter=NAMES[sp.rootPC];
        if(sp.bass&&sp.bass.mode==='slash'&&sp.bass.notePC!=null)sp.bass=Object.assign({},sp.bass,{notePC:(sp.bass.notePC+tDelta)%12});
        else sp.bass=Object.assign({},sp.bass);
        return Object.assign({},c,{spec:sp,rootPC:sp.rootPC,rootLetter:sp.rootLetter,func:specFunc(sp)});
      }
      const nd=CURCHORDS[c.degree]||CURCHORDS[0];if(!nd)return c;
      let q=c.quality;if(oldQual[c.degree]&&q===oldQual[c.degree])q=nd.quality;
      return Object.assign({},c,{rootLetter:nd.rootLetter,rootPC:nd.rootPC,func:nd.func,roman:nd.roman,quality:q});
    });
    // 整首歌每个乐句都重映射(调性是全曲统一的)
    song.forEach(p=>{p.melody=remapMel(p.melody);p.chords=remapCh(p.chords);});
    // 自定义和弦盘按钮:绝对和弦,随主音差整体移调
    customPals=customPals.map(sp=>{const ns=Object.assign({},sp);ns.rootPC=(sp.rootPC+tDelta)%12;ns.rootLetter=NAMES[ns.rootPC];
      if(sp.bass&&sp.bass.mode==='slash'&&sp.bass.notePC!=null)ns.bass=Object.assign({},sp.bass,{notePC:(sp.bass.notePC+tDelta)%12});else ns.bass=Object.assign({},sp.bass);
      return ns;});
    const p=song[curPhrase];melody=p.melody;chords=p.chords;
    octave=0;renderNotes();renderMelody();renderChordTrack();
    updateKeyBtn();
  }
  function updateKeyBtn(){const b=$('keyBtn');if(b)b.textContent=keyDisplay()+(capo>0?(' +'+capo):capo<0?(' '+capo):'');}

  // ═══ 调性弹窗:主音 + 调式 + 变调夹 + AI判调 ═══
  const keyOverlay=$('keyOverlay'),keyCard=$('keyCard');

    html+='<div class="kp-label">升降调(整体升高/降低,记谱与级数不变)</div><div class="kp-capo"><button class="kp-cbtn" id="capoDown">−</button><span id="capoVal">'+(capo>0?'+'+capo:capo)+' 半音</span><button class="kp-cbtn" id="capoUp">+</button></div>';
    html+='<button class="kp-ai'+(hasContent?'':' disabled')+'" id="kpAI"'+(hasContent?'':' disabled')+'>✨ AI 判调'+(hasContent?'':'(先录点音符或和弦)')+'</button>';

      if(cd)cd.addEventListener('click',()=>{if(capo>-12){applyKey(tonicPC,modeId,capo-1);$('capoVal').textContent=(capo>0?'+'+capo:capo)+' 半音';}});

  // ═══════════════════════════════════════════
  //  乐句系统:数据模型 + 胶囊条 + 切换/新建/删除/复制/段落
  // ═══════════════════════════════════════════
  const phraseBar=$('phraseBar'),phraseOverlay=$('phraseOverlay'),phraseCard=$('phraseCard');
  // 把当前编辑缓冲(melody/chords/section)写回当前乐句
  function commitPhrase(){const p=song[curPhrase];if(p){p.melody=melody;p.chords=chords;p.section=section;}}
  // 载入某乐句到编辑缓冲(不提交,调用方负责先 commit)
  function activatePhrase(i){
    curPhrase=Math.max(0,Math.min(i,song.length-1));
    const p=song[curPhrase];
    melody=p.melody;chords=p.chords;section=p.section||'verse';
    selChordAt=null;chordCursor=chords.length?(chords[chords.length-1].at+measureLen()):0;
    playStart=0;caret=melody.length;octave=0;
    renderNotes();renderMelody();renderChordTrack();
  }
  // 乐句标签:同段落多于一个时带序号(主歌1 / 主歌2 / 副歌…)
  function phraseLabel(i){
    const s=song[i].section,total=song.reduce((c,p)=>c+(p.section===s?1:0),0);
    if(total<=1)return SECTIONS[s]||'乐句';
    let n=0;for(let k=0;k<=i;k++)if(song[k].section===s)n++;
    return (SECTIONS[s]||'乐句')+n;
  }
  function renderPhraseBar(){
    if(!phraseBar)return;
    let h='<div class="ph-track">';
    song.forEach((p,i)=>{
      if(i>0)h+='<span class="ph-link"></span>';
      const cnt=(p.melody||[]).filter(n=>!n.rest&&!n.tie).length;
      h+='<button class="ph-cap sec-'+(p.section||'verse')+(i===curPhrase?' on':'')+'" data-i="'+i+'">'
        +'<span class="pc-name">'+phraseLabel(i)+'</span>'
        +'<span class="pc-meta">'+(cnt?cnt+'音':'空')+'</span></button>';
    });
    h+='</div>';
    h+='<button class="ph-add" id="phAdd" title="新建乐句">＋</button>';
    h+='<button class="ph-play'+(playing&&chainPlaying?' playing':'')+'" id="phPlay" title="整曲连播">▶全曲</button>';
    phraseBar.innerHTML=h;
    phraseBar.querySelectorAll('.ph-cap').forEach(b=>bindCapDrag(b,+b.dataset.i));
    const a=$('phAdd');if(a)a.addEventListener('click',newPhrase);
    const pp=$('phPlay');if(pp)pp.addEventListener('click',playSong);
    // 当前句滚动到可见
    const on=phraseBar.querySelector('.ph-cap.on');if(on)on.scrollIntoView({inline:'center',block:'nearest'});
  }
  function switchPhrase(i){
    if(i===curPhrase)return;if(playing)stopPlayback();
    commitPhrase();activatePhrase(i);renderPhraseBar();scrollToCaret();
  }
  // 拖动重排:按住胶囊横向拖 → 实时显示插入位;未超阈值则视为点击(切换/设置)
  function bindCapDrag(el,idx){
    el.addEventListener('pointerdown',e=>{
      if(e.button!=null&&e.button>0)return; // 忽略右键
      const startX=e.clientX,startY=e.clientY;
      let dragging=false,to=idx,line=null;
      const cleanup=()=>{
        document.removeEventListener('pointermove',onMove);
        document.removeEventListener('pointerup',onUp);
        document.removeEventListener('pointercancel',onCancel);
      };
      const onMove=ev=>{
        const dx=ev.clientX-startX,dy=ev.clientY-startY;
        if(!dragging){
          if(Math.abs(dx)<7||Math.abs(dx)<Math.abs(dy))return; // 需横向且超阈值,纵向留给页面滚动
          if(playing)stopPlayback();
          dragging=true;el.classList.add('dragging');document.body.classList.add('ph-dragging');
          try{el.setPointerCapture(ev.pointerId);}catch(_){}
          line=document.createElement('div');line.className='ph-drop-line';phraseBar.appendChild(line);
          if(navigator.vibrate)try{navigator.vibrate(15);}catch(_){}
        }
        ev.preventDefault();
        el.style.transform='translateX('+dx+'px) scale(1.09)';
        to=updateDrop(el,ev.clientX,line);
      };
      const onUp=()=>{
        cleanup();
        if(dragging){
          el.classList.remove('dragging');el.style.transform='';document.body.classList.remove('ph-dragging');
          if(line)line.remove();movePhrase(idx,to);
        }else{ // 点击
          if(idx===curPhrase)openPhrasePopup(idx);else switchPhrase(idx);
        }
      };
      const onCancel=()=>{
        cleanup();
        if(dragging){el.classList.remove('dragging');el.style.transform='';document.body.classList.remove('ph-dragging');if(line)line.remove();renderPhraseBar();}
      };
      document.addEventListener('pointermove',onMove,{passive:false});
      document.addEventListener('pointerup',onUp);
      document.addEventListener('pointercancel',onCancel);
    });
  }
  // 计算指针落点对应的插入序(在"移除被拖元素后"列表里的位置),并把指示线放到对应缝隙
  function updateDrop(el,px,line){
    const others=[...phraseBar.querySelectorAll('.ph-cap')].filter(c=>c!==el);
    let to=0;others.forEach(c=>{const r=c.getBoundingClientRect();if(r.left+r.width/2<px)to++;});
    if(line){
      const barR=phraseBar.getBoundingClientRect();let x;
      if(!others.length)x=barR.left+16;
      else if(to===0)x=others[0].getBoundingClientRect().left-5;
      else if(to>=others.length)x=others[others.length-1].getBoundingClientRect().right+5;
      else x=(others[to-1].getBoundingClientRect().right+others[to].getBoundingClientRect().left)/2;
      line.style.left=(x-barR.left+phraseBar.scrollLeft)+'px';
    }
    return to;
  }
  // to:在移除 from 之后的数组里的插入位置
  function movePhrase(from,to){
    if(from===to){renderPhraseBar();return;}
    commitPhrase();
    const cur=song[curPhrase];
    const p=song.splice(from,1)[0];
    song.splice(to,0,p);
    curPhrase=song.indexOf(cur); // 编辑缓冲仍指向同一乐句,仅修正其索引
    renderPhraseBar();flash('乐句已重排');
  }
  function newPhrase(){
    if(playing)stopPlayback();commitPhrase();
    song.push({name:'',section:song[curPhrase]?song[curPhrase].section:'verse',desc:'',melody:[],chords:[]});
    activatePhrase(song.length-1);renderPhraseBar();flash('已新建乐句');
  }
  function deletePhrase(i){
    if(song.length<=1){flash('至少保留一个乐句');return;}
    if(playing)stopPlayback();commitPhrase();
    song.splice(i,1);
    let ni=curPhrase;if(i<curPhrase)ni=curPhrase-1;else if(i===curPhrase)ni=Math.min(i,song.length-1);
    activatePhrase(ni);renderPhraseBar();phraseOverlay.classList.remove('show');flash('已删除乐句');
  }
  function copyPhrase(i){
    if(playing)stopPlayback();commitPhrase();
    const p=song[i],clone={name:p.name,section:p.section,desc:p.desc,
      melody:p.melody.map(n=>Object.assign({},n)),chords:p.chords.map(c=>Object.assign({},c))};
    song.splice(i+1,0,clone);activatePhrase(i+1);renderPhraseBar();phraseOverlay.classList.remove('show');flash('已复制乐句');
  }
  function setPhraseSection(sec){
    if(!SECTIONS[sec])return;song[curPhrase].section=sec;section=sec;
    renderPhraseBar();openPhrasePopup(curPhrase);
  }
  function openPhrasePopup(i){
    curPhrase=i;
    let h='<h3>乐句设置 · '+phraseLabel(i)+'</h3>';
    h+='<div class="ai-desc">选段落类型,同类会自动编号(主歌1、副歌…)。切歌不同段落用不同颜色区分。</div>';
    h+='<div class="kp-label">段落类型</div><div class="ph-secs">';
    Object.keys(SECTIONS).forEach(s=>{h+='<button class="kp-btn wide sec-chip sec-'+s+(song[i].section===s?' on':'')+'" data-sec="'+s+'">'+SECTIONS[s]+'</button>';});
    h+='</div>';
    h+='<div class="kp-label">这句想表达什么</div>';
    h+='<textarea class="php-note" id="phpNote" rows="2" maxlength="120" placeholder="用一两句话描述这句的情绪/走向,如「上行铺垫、越来越急」「情绪爆发的高点」——写清楚更有利于 AI 帮你续写、配和弦">'+esc(song[i].desc||'')+'</textarea>';
    h+='<div class="php-acts"><button class="php-act" id="phpCopy">⎘ 复制此句</button>'
      +'<button class="php-act danger" id="phpDel"'+(song.length<=1?' disabled':'')+'>🗑 删除此句</button></div>';
    h+='<button class="ai-close" id="phpClose">完成</button>';
    phraseCard.innerHTML=h;phraseOverlay.classList.add('show');
    setTimeout(()=>{
      phraseCard.querySelectorAll('[data-sec]').forEach(b=>b.addEventListener('click',()=>setPhraseSection(b.dataset.sec)));
      const nt=$('phpNote');if(nt)nt.addEventListener('input',()=>{song[i].desc=nt.value;});
      const cp=$('phpCopy');if(cp)cp.addEventListener('click',()=>copyPhrase(i));
      const dl=$('phpDel');if(dl&&song.length>1)dl.addEventListener('click',()=>deletePhrase(i));
      const cl=$('phpClose');if(cl)cl.addEventListener('click',()=>phraseOverlay.classList.remove('show'));
    },40);
  }
  phraseOverlay.addEventListener('click',e=>{if(e.target===phraseOverlay)phraseOverlay.classList.remove('show');});
  // 整曲连播:依次播放每个乐句(从头、不循环),播完自动切下一句
  let chainPlaying=false;
  function playSong(){
    if(playing){stopPlayback();return;}
    commitPhrase();
    if(song.length<=1){playMelody();return;}
    chainPlaying=true;
    const run=idx=>{
      if(!chainPlaying)return;
      activatePhrase(idx);renderPhraseBar();
      playMelody({fromStart:true,noLoop:true,chained:idx>0,onEnd:()=>{
        if(chainPlaying&&idx+1<song.length)run(idx+1);
        else{chainPlaying=false;stopPlayback();renderPhraseBar();}
      }});
    };
    run(0);
  }

  // ═══ 事件绑定 ═══
  btnPlay.addEventListener('click',()=>playMelody());
  btnStop.addEventListener('click',stopPlayback);
  // 速度:步进 ±10 + 可点击输入 + 桌面滑条(共用 speedSlider 值)
  const bpmValD=$('bpmValD');
  function syncBpm(v){bpmVal.value=v;if(bpmValD)bpmValD.textContent=v;}
  function setTempo(v){v=Math.max(60,Math.min(200,v||120));speedSlider.value=v;syncBpm(v);}

  // 试音开关(单一开关)
  function setTryMode(on){

  // ═══ 存储 · 旋律库(localStorage,无需后端) + 分享链接 ═══
  const LSK='songwriter_saves_v1';
  function loadSaves(){try{return JSON.parse(localStorage.getItem(LSK)||'[]');}catch(e){return[];}}
  function persistSaves(a){try{localStorage.setItem(LSK,JSON.stringify(a));}catch(e){flash('存储空间不足');}}
  function serCh(c){const o={a:c.at,r:c.rootLetter,q:c.quality,dg:c.degree,f:c.func,rm:c.roman,s:c.section||'verse'};if(c.spec)o.sp=c.spec;return o;}
  function deCh(c){const o={at:c.a||0,rootLetter:c.r,rootPC:(c.sp?c.sp.rootPC:PC[c.r]),quality:c.q,degree:c.dg,func:c.f,roman:c.rm,section:c.s};if(c.sp)o.spec=c.sp;return o;}
  function serNote(n){return {t:n.note,l:n.label,i:n.inKey?1:0,d:n.durMul,r:n.rest?1:0,y:n.tie?1:0};}
  function deNote(x){return {note:x.t||null,label:x.l,inKey:!!x.i,durMul:x.d||4,rest:!!x.r,tie:!!x.y,freq:x.t?soundFreq(x.t):0};}
  function serialize(){
    commitPhrase();
    return{tpc:tonicPC,mode:modeId,capo:capo,ts:timeSig,cur:curPhrase,cpals:customPals,
      phrases:song.map(p=>({nm:p.name||'',sec:p.section||'verse',ds:p.desc||'',
        notes:(p.melody||[]).map(serNote),chordlist:(p.chords||[]).map(serCh)}))};
  }
  function deserialize(o){
    if(!o||(!o.phrases&&!o.notes))return false;
    tonicPC=(o.tpc!=null)?o.tpc:(o.key==='G'?7:o.key==='D'?2:o.key==='F'?5:o.key==='Am'?9:o.key==='Em'?4:o.key==='Dm'?2:0);
    modeId=(o.mode&&MODES[o.mode])?o.mode:(/m$/.test(o.key||'')?'minor':'major');capo=o.capo|0;
    rebuildKey();octave=0;
    timeSig=o.ts&&TS_LEN[o.ts]?o.ts:'4/4';
    {const ts=$('tsSelect');if(ts)ts.value=timeSig;}
    customPals=Array.isArray(o.cpals)?o.cpals:[];
    if(Array.isArray(o.phrases)&&o.phrases.length){
      song=o.phrases.map(p=>({name:p.nm||'',section:(p.sec&&SECTIONS[p.sec])?p.sec:'verse',desc:p.ds||'',
        melody:(p.notes||[]).map(deNote),chords:(p.chordlist||[]).map(deCh)}));
      curPhrase=Math.max(0,Math.min(o.cur|0,song.length-1));
    }else{
      // 存量存档(单段)→ 自动包成一个乐句
      song=[{name:'',section:'verse',desc:'',
        melody:(o.notes||[]).map(deNote),chords:(Array.isArray(o.chordlist)?o.chordlist:[]).map(deCh)}];
      curPhrase=0;
    }
    activatePhrase(curPhrase);renderPhraseBar();updateKeyBtn();
    if(!playing)scrollToCaret();
    return true;
  }
  function dstr(){const d=new Date();const p=n=>(n<10?'0':'')+n;return (d.getMonth()+1)+'/'+d.getDate()+' '+p(d.getHours())+':'+p(d.getMinutes());}
  function encShare(){return btoa(unescape(encodeURIComponent(JSON.stringify(serialize()))));}
  function shareLink(){
    const url=location.origin+location.pathname+'#m='+encShare();
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>flash('分享链接已复制')).catch(()=>prompt('复制此链接分享:',url));}
    else prompt('复制此链接分享:',url);
  }
  function showStore(){
    const saves=loadSaves();
    let html='<h3>📚 旋律库</h3>';
    html+='<div class="store-save"><input id="saveName" type="text" maxlength="20" placeholder="给这段旋律起个名字…"><button id="doSave">保存当前</button></div>';
    html+='<div class="store-list">';
    if(!saves.length){html+='<div class="store-empty">还没有保存的旋律,先创作再保存吧</div>';}
    else{saves.forEach(s=>{
      let cnt=0,ph=0;
      if(Array.isArray(s.phrases)){ph=s.phrases.length;s.phrases.forEach(p=>{cnt+=(p.notes||[]).filter(n=>!n.r).length;});}
      else{cnt=(s.notes||[]).filter(n=>!n.r).length;ph=1;}
      const km=(s.tpc!=null)?(NAMES[s.tpc]+(MODES[s.mode]?MODES[s.mode].name:'')):(s.key||'');
      const meta=km+' · '+(ph>1?ph+'乐句 · ':'')+cnt+'音 · '+s.date;
      html+='<div class="store-item" data-id="'+s.id+'"><div class="si-main"><span class="si-name">'+esc(s.name)+'</span><span class="si-meta">'+meta+'</span></div><button class="si-load" data-id="'+s.id+'">载入</button><button class="si-del" data-id="'+s.id+'">删除</button></div>';});}
    html+='</div>';
    html+='<button class="store-share" id="doShare">🔗 生成分享链接(复制)</button>';
    html+='<button class="ai-close" id="storeClose">关闭</button>';
    storeCard.innerHTML=html;storeOverlay.classList.add('show');
    setTimeout(()=>{
      const c=$('storeClose');if(c)c.addEventListener('click',()=>storeOverlay.classList.remove('show'));
      const songEmpty=()=>{commitPhrase();return !song.some(p=>(p.melody&&p.melody.length)||(p.chords&&p.chords.length));};
      const sh=$('doShare');if(sh)sh.addEventListener('click',()=>{if(songEmpty()){flash('还没有内容');return;}shareLink();});
      const sv=$('doSave');if(sv)sv.addEventListener('click',()=>{
        if(songEmpty()){flash('还没有内容,无法保存');return;}
        const nm=($('saveName').value||'').trim();const a=loadSaves();
        a.unshift(Object.assign({id:String(Date.now()),name:nm||('旋律 '+(a.length+1)),date:dstr()},serialize()));
        persistSaves(a);flash('已保存');showStore();
      });
      storeCard.querySelectorAll('.si-load').forEach(b=>b.addEventListener('click',()=>{
        const s=loadSaves().find(x=>x.id===b.dataset.id);if(s&&deserialize(s)){storeOverlay.classList.remove('show');flash('已载入「'+s.name+'」');}

  // —— 自相关测频(单音哼唱)——
  function autoCorrelate(buf,sr){
    let SIZE=buf.length,rms=0;
    for(let i=0;i<SIZE;i++)rms+=buf[i]*buf[i];
    rms=Math.sqrt(rms/SIZE);
    if(rms<0.006)return -1; // 静音门(放低,避免把人声当静音)
    let r1=0,r2=SIZE-1,th=0.2;
    for(let i=0;i<SIZE/2;i++)if(Math.abs(buf[i])<th){r1=i;break;}
    for(let i=1;i<SIZE/2;i++)if(Math.abs(buf[SIZE-i])<th){r2=SIZE-i;break;}
    const b=buf.slice(r1,r2);const N=b.length;if(N<2)return -1;
    const c=new Array(N).fill(0);
    for(let i=0;i<N;i++)for(let j=0;j<N-i;j++)c[i]+=b[j]*b[j+i];
    let d=0;while(d<N-1&&c[d]>c[d+1])d++;
    let mx=-1,pos=-1;
    for(let i=d;i<N;i++)if(c[i]>mx){mx=c[i];pos=i;}
    if(pos<=0)return -1;
    let T0=pos;const x1=c[T0-1]||0,x2=c[T0],x3=c[T0+1]||0;
    const aa=(x1+x3-2*x2)/2,bb=(x3-x1)/2;if(aa)T0=T0-bb/(2*aa);
    const f=sr/T0;return (f>60&&f<1200)?f:-1;
  }

  // 切音符 + 量化 + 吸附
  function humTrackToNotes(track){
    if(!track.length)return [];
    // ① 中位数平滑:窗口只取 ±1 帧,压毛刺但不糊掉短音(窗口太大会吃掉快音符)
    const N=track.length,sm=new Array(N);
    for(let i=0;i<N;i++){
      const w=[];for(let j=Math.max(0,i-1);j<=Math.min(N-1,i+1);j++){if(track[j].midi!=null)w.push(track[j].midi);}
      sm[i]=w.length?w.sort((a,b)=>a-b)[w.length>>1]:null;
    }
    // ② 容差合并成段:相邻帧音高差 ≤1 半音视为同一个音(而非精确相等),避免被抖动切碎
    const segs=[];let cur=null;
    for(let i=0;i<N;i++){
      const m=sm[i],t=track[i].t;
      if(cur&&cur.midi!=null&&m!=null&&Math.abs(m-cur.midi)<=1){cur.t1=t;cur.sum+=m;cur.cnt++;}
      else if(cur&&cur.midi==null&&m==null){cur.t1=t;}
      else{if(cur)segs.push(cur);cur={midi:m,t0:t,t1:t,sum:(m==null?0:m),cnt:(m==null?0:1)};}
    }
    if(cur)segs.push(cur);
    // 用段内均值定音高(更稳)
    segs.forEach(s=>{if(s.cnt)s.midi=Math.round(s.sum/s.cnt);});
    // 最短音符门槛:随 BPM 动态 = 半个十六分音符时长,且不超过 55ms,让快音符也能保留
    const sixteenth=60/humBPM/4; // 一个十六分音符的秒数
    const MIN=Math.min(0.055,sixteenth*0.5);
    let clean=segs.filter(s=>(s.t1-s.t0)>=MIN);
    while(clean.length&&clean[0].midi==null)clean.shift();
    while(clean.length&&clean[clean.length-1].midi==null)clean.pop();
    if(!clean.some(s=>s.midi!=null))return [];
    const bpm=humBPM,items=[];
    let atBeat=melody.slice(0,caret).reduce((s,n)=>s+4/(n.durMul||4),0);
    clean.forEach(s=>{
      const durSec=s.t1-s.t0,beats=durSec*bpm/60,durMul=quantizeDur(beats),qb=4/durMul;
      if(s.midi==null){if(beats>=0.4){items.push({rest:true,label:'0',note:null,freq:0,durMul});atBeat+=qb;}return;}
      const snap=snapMidiToKey(s.midi,atBeat);
      items.push({note:snap.note,label:snap.label,freq:soundFreq(snap.note),inKey:true,durMul});
      atBeat+=qb;
    });
    return items;
  }
  function quantizeDur(beats){
    const opts=[['16',0.25],['8',0.5],['8.',0.75],['4',1],['4.',1.5]];
    let best='4',bd=99;opts.forEach(([k,b])=>{const d=Math.abs(b-beats);if(d<bd){bd=d;best=k;}});
    return 4/(DUR_BEATS[best]||1);
  }
  function snapMidiToKey(midi,atBeat){
    const iv=MODES[modeId].iv,lab=MODES[modeId].lab;
    const rel=((midi-(60+tonicPC))%12+12)%12;
    let pool=iv.map((s,i)=>({s,i}));
    const strong=Math.abs(atBeat-Math.round(atBeat))<0.12;
    const ci=(typeof chordAtBeat==='function')?chordAtBeat(atBeat):-1;
    if(strong&&ci>=0&&chords[ci]){
      const ch=chords[ci],cs=(QUAL_INT[ch.quality]||QUAL_INT.maj).map(x=>((ch.rootPC+x-tonicPC)%12+12)%12);
      const cp=pool.filter(p=>cs.includes(p.s));if(cp.length)pool=cp;
    }
    let best=pool[0],bd=99;
    pool.forEach(p=>{const dd=Math.min((p.s-rel+12)%12,(rel-p.s+12)%12);if(dd<bd){bd=dd;best=p;}});
    const label=lab[best.i],pc=(tonicPC+best.s)%12;
    let sm=midi-(((midi%12)-pc+12)%12);

  }

  function buildStageData(){
    commitPhrase();

    const items=[],chordEvents=[],secByMeasure={};
    let gb=0;

      const pStart=gb;
      (p.melody||[]).forEach(n=>{
        const beats=4/(n.durMul||4);
        if(n.tie){for(let i=items.length-1;i>=0;i--){if(items[i].pitched){items[i].beats+=beats;break;}}gb+=beats;return;}
        if(n.rest){items.push({rest:true,start:gb,beats});gb+=beats;return;}
        const midi=noteMidi(n.note);

        gb+=beats;

    const minV=vals.length?Math.min.apply(null,vals):60,maxV=vals.length?Math.max.apply(null,vals):72;
    return {items,chordSeq,secByMeasure,measures,mL,minV,maxV,span:Math.max(1,maxV-minV),totalBeats,pcount:pc};
  }

        const c=SD.chordSeq[it.measure],pcs=chordPCs(c),isTone=it.val!=null&&pcs.includes(((it.val%12)+12)%12),func=c?c.func:'T';
        const cy=yOf(it.val!=null?it.val:SD.minV);
        const pt=document.createElement('div');pt.className='dotpt '+(isTone?'tone':'pass');pt.dataset.pidx=it.pidx;pt.style.left=(cx-(isTone?4:2.5))+'px';pt.style.top=(cy-(isTone?4:2.5))+'px';if(isTone)pt.style.background='var(--primary)';
        if(isTone){pt.style.background=({T:'#5E97BC',SD:'#D98098',D:'#C79B3C'})[func]||'#5E97BC';}
        row.appendChild(pt);
        const jp=document.createElement('div');jp.className='jp '+(isTone?func:'pass');jp.style.left=cx+'px';jp.style.top=JP_Y+'px';
        const dec=jpDecor(it.beats);let inner='<span class="num">'+degCore(it.label)+(dec.dot?'<span class="dot-aug"></span>':'')+'</span>';
        if(dec.u){for(let k=0;k<dec.u;k++)inner+='<div class="ul'+(k>0?' ul2':'')+'"></div>';}
        let octHtml='';if(it.val>=72)octHtml='<span class="oct" style="top:-5px"></span>';else if(it.val<60)octHtml='<span class="oct" style="bottom:-6px"></span>';
        jp.innerHTML=inner+octHtml;row.appendChild(jp);
        if(dec.dash){for(let k=1;k<=dec.dash;k++){const d=document.createElement('div');d.className='jp '+(isTone?func:'pass');d.style.left=((it.start-rowStart+k+0.5)*beatPx)+'px';d.style.top=JP_Y+'px';d.innerHTML='<span class="num dash">—</span>';row.appendChild(d);}}
        const ly=stageLyrics[it.pidx];if(ly){const l=document.createElement('div');l.className='lyric';l.style.left=cx+'px';l.style.top=LY_Y+'px';l.textContent=ly;row.appendChild(l);}
        // 点击热区(编辑歌词/注释;非编辑态=试听)
        const hit=document.createElement('div');hit.className='hit';hit.style.left=(cx-beatPx/2)+'px';hit.style.top=CBAND_T+'px';hit.style.width=beatPx+'px';hit.style.height=(LY_Y-CBAND_T+18)+'px';
        hit.addEventListener('click',e=>{e.stopPropagation();onStageNote(it);});
        row.appendChild(hit);
        const a=stageAnno[it.pidx];
        if(a){const mk=document.createElement('div');mk.className='anno '+(a.type==='user'?'user':'ai');mk.style.left=cx+'px';mk.style.top=(cy-13)+'px';mk.textContent=a.type==='user'?'✎':'✦';
          mk.addEventListener('click',e=>{e.stopPropagation();showAnnoPop(mk,it,a);});row.appendChild(mk);}
      });
      (curCard||stageScore).appendChild(row);
    }
    if(lyricMode)placeLyInline(); // 歌词模式:重画后把就地输入框放回当前音
  }

  function onStageNote(it){
    if(lyricMode){ // 歌词输入中:点音符=把光标跳到这个音
      const list=pitchedList(),idx=list.findIndex(x=>x.pidx===it.pidx);
      if(idx>=0){lyCommitCurrent();lyCursor=idx;renderStage();placeLyInline();}
      return;
    }
    if(document.body.classList.contains('stg-note'))return openStageEdit(it,'note');
    if(it.note){const a=audio();if(a.state==='suspended')a.resume();playGuitar(soundFreq(it.note),320);}
  }
  function openStageEdit(it,kind){
    hideStagePop();
    const isLy=kind==='lyric',cur=isLy?(stageLyrics[it.pidx]||''):((stageAnno[it.pidx]&&stageAnno[it.pidx].type==='user')?stageAnno[it.pidx].text:'');
    stagePop.innerHTML='<div class="pt '+(isLy?'user':'user')+'">'+(isLy?'✎ 歌词(这个音唱的字)':'✎ 我的注释')+'</div>'
      +'<textarea id="stgEditT" rows="'+(isLy?1:3)+'" maxlength="'+(isLy?4:120)+'" placeholder="'+(isLy?'一个字/词':'写点什么…')+'">'+esc(cur)+'</textarea>'
      +'<div class="pp-row"><button id="stgEditDel">清除</button><button class="main" id="stgEditSave">保存</button></div>';
    placeStagePop(it);
    setTimeout(()=>{const t=$('stgEditT');if(t){t.focus();}
      $('stgEditSave').addEventListener('click',()=>{const v=(t.value||'').trim();
        if(isLy){if(v)stageLyrics[it.pidx]=v;else delete stageLyrics[it.pidx];}
        else{if(v)stageAnno[it.pidx]={type:'user',text:v};else if(stageAnno[it.pidx]&&stageAnno[it.pidx].type==='user')delete stageAnno[it.pidx];}
        hideStagePop();renderStage();});
      $('stgEditDel').addEventListener('click',()=>{if(isLy)delete stageLyrics[it.pidx];else if(stageAnno[it.pidx]&&stageAnno[it.pidx].type==='user')delete stageAnno[it.pidx];hideStagePop();renderStage();});
    },20);
  }
  function showAnnoPop(el,it,a){
    hideStagePop();
    if(a.type==='user'){openStageEdit(it,'note');return;}
    stagePop.innerHTML='<div class="pt ai">✦ AI 赏析</div><div><b>'+degCore(it.label)+'</b> · '+esc(a.text)+'</div>';
    placeStagePop(it,el);
  }
  function placeStagePop(it,el){
    const anchor=el||stageScore.querySelector('.dotpt[data-pidx="'+it.pidx+'"]');
    stagePop.style.display='block';
    const rc=anchor?anchor.getBoundingClientRect():{left:innerWidth/2,bottom:innerHeight/2,top:innerHeight/2,width:0};
    let left=rc.left+rc.width/2-130;left=Math.max(8,Math.min(left,innerWidth-268));
    stagePop.style.left=left+'px';let top=rc.bottom+8;stagePop.style.top=top+'px';
    if(top+stagePop.offsetHeight>innerHeight-8)stagePop.style.top=(rc.top-stagePop.offsetHeight-8)+'px';
  }
  function hideStagePop(){stagePop.style.display='none';}
  document.addEventListener('click',e=>{if(document.body.classList.contains('stage-on')&&!stagePop.contains(e.target)&&!(e.target.closest&&e.target.closest('.anno')))hideStagePop();});

  // 通览播放
  function stageStop(){stageTimers.forEach(clearTimeout);stageTimers=[];stageScore.querySelectorAll('.dotpt.play').forEach(e=>e.classList.remove('play'));const b=$('stgPlay');if(b){b.classList.remove('on');b.textContent='▶ 播放';}}
  function stagePlayToggle(){
    const b=$('stgPlay');
    if(stageTimers.length){stageStop();return;}
    const a=audio();if(a.state==='suspended')a.resume();
    const bpm=parseInt(speedSlider.value)||108,beat=60/bpm,t0=a.currentTime+0.08;
    if(b){b.classList.add('on');b.textContent='■ 停';}
    // 和弦垫音(每小节)
    SD.chordSeq.forEach((c,m)=>{if(c)setTimeout(()=>{if(stageTimers.length)playChord(c,SD.mL*beat*1000*0.9,true);},(m*SD.mL*beat)*1000+60);});
    SD.items.forEach(it=>{if(it.rest||it.val==null)return;const at=it.start*beat,d=it.beats*beat;
      const id=setTimeout(()=>{playGuitar(soundFreq(it.note),Math.min(d*1000*0.9,1600));
        const el=stageScore.querySelector('.dotpt[data-pidx="'+it.pidx+'"]');if(el){el.classList.add('play');setTimeout(()=>el.classList.remove('play'),d*1000*0.8);}},at*1000+80);
      stageTimers.push(id);});
    // 结束复位
    stageTimers.push(setTimeout(stageStop,SD.totalBeats*beat*1000+400));
  }

  // AI 赏析
  async function stageGenAI(){
    const btn=$('stgAI');if(btn.classList.contains('busy'))return;
    if(!(localStorage.getItem(DS_KEY_LS)||'').trim()){flash('先在 AI 帮写里填入 DeepSeek Key');return;}
    btn.classList.add('busy');btn.textContent='生成中…';
    try{
      const notes=SD.items.filter(x=>x.pitched).map(x=>({m:x.measure,deg:degCore(x.label),beats:x.beats}));
      const chords=SD.chordSeq.map((c,m)=>({m,name:c?chordName(c):'',func:c?c.func:''}));
      const sys='你是资深流行音乐赏析导师。下面是一首简谱作品(级数制,相对主音)。请挑出 3~5 个「最值得一说」的音/位置,用有温度的口语讲清「为什么这里写得好/妙在哪」(情绪、张力、记忆点、和声关系等),让初学者听懂。只输出 JSON:{"annos":[{"measure":小节号从0起,"deg":"该音简谱级数如1/3/#4","text":"一句话赏析"}]}。deg 要能在该小节找到对应音。';
      const user='【调性】'+keyDisplay()+' 拍号 '+timeSig+'\n【每小节和弦】'+JSON.stringify(chords)+'\n【音符序列(m=小节,deg=级数,beats=时值拍)】'+JSON.stringify(notes);
      const j=await callDeepSeek(sys,user);
      let n=0;
      (j.annos||[]).forEach(a=>{
        const it=SD.items.find(x=>x.pitched&&x.measure===(a.measure|0)&&degCore(x.label)===String(a.deg));
        if(it&&!(stageAnno[it.pidx]&&stageAnno[it.pidx].type==='user')){stageAnno[it.pidx]={type:'ai',text:a.text};n++;}
      });
      renderStage();flash(n?('已生成 '+n+' 条赏析 ✦'):'AI 没定位到具体音,可再试一次');
    }catch(e){flash('生成失败:'+e.message);}
    btn.classList.remove('busy');btn.textContent='✨ 生成AI赏析';
  }

  function openStage(){
    commitPhrase();
    const has=song.some(p=>(p.melody||[]).some(n=>!n.rest&&!n.tie));
    if(!has){flash('先写点旋律,再来成曲');return;}
    SD=buildStageData();
    $('stageName').textContent='我的作品';
    $('stageMeta').textContent=keyDisplay()+' · '+timeSig+' · '+SD.measures+' 小节';
    if(playing)stopPlayback();
    stageScore.innerHTML='';        // 先清掉上次残留
    document.body.classList.add('stage-on');stagePane.setAttribute('aria-hidden','false');
    renderStage();                  // 立即渲染(stage-pane 有布局宽度,不必等动画)
    setTimeout(renderStage,430);    // 动画结束后再校准一次宽度
  }
  // —— 歌词就地输入:在音符下方的歌词位直接打字。中文=一字一跳(靠输入法确认),英文=同音里连打、空格才跳 ——
  let lyricMode=false,lyCursor=0,lyComposing=false;
  const lyInline=(function(){const i=document.createElement('input');i.type='text';i.className='ly-inline';i.autocomplete='off';i.setAttribute('autocapitalize','off');return i;})();
  function pitchedList(){return SD?SD.items.filter(x=>x.pitched):[];}
  function startLyricInput(){
    if(!SD)return;lyricMode=true;document.body.classList.add('stg-lyric');
    setLyCursor(0);flash('直接打字:中文一字一跳,英文同一个音里连打、按空格跳下一个音');
  }
  function endLyricInput(){
    lyricMode=false;document.body.classList.remove('stg-lyric');
    if(lyInline.parentNode)lyInline.parentNode.removeChild(lyInline);
    stageScore.querySelectorAll('.dotpt.lycur').forEach(e=>e.classList.remove('lycur'));
    renderStage();
  }
  // 把 inline 输入框放到「当前光标音」的歌词位置
  function placeLyInline(){
    const list=pitchedList(),it=list[lyCursor];
    if(!it){if(lyInline.parentNode)lyInline.parentNode.removeChild(lyInline);return;}
    const pt=stageScore.querySelector('.dotpt[data-pidx="'+it.pidx+'"]');
    const row=pt&&pt.closest('.prow');if(!row){return;}
    if(lyInline.parentNode!==row)row.appendChild(lyInline);
    // 歌词行 y=104(LY_Y),x 对齐音符中心
    const left=parseFloat(pt.style.left)+((pt.classList.contains('tone'))?4:2.5);
    lyInline.style.left=left+'px';lyInline.style.top='100px';
    lyInline.value=stageLyrics[it.pidx]||'';
    row.querySelectorAll('.dotpt.lycur').forEach(e=>e.classList.remove('lycur'));pt.classList.add('lycur');
    pt.scrollIntoView({block:'nearest',behavior:'smooth'});
    setTimeout(()=>lyInline.focus(),0);
  }
  function setLyCursor(i){
    const list=pitchedList();lyCursor=Math.max(0,Math.min(i,list.length-1));
    stageScore.querySelectorAll('.dotpt.lycur').forEach(e=>e.classList.remove('lycur'));
    placeLyInline();
  }
  function lyCommitCurrent(){ // 把 inline 里的内容写回当前音
    const list=pitchedList(),it=list[lyCursor];if(!it)return;
    const v=(lyInline.value||'').trim();
    if(v)stageLyrics[it.pidx]=v;else delete stageLyrics[it.pidx];
  }
  function lyGo(delta){
    lyCommitCurrent();
    const list=pitchedList();let ni=lyCursor+delta;
    if(ni>=list.length){ // 到末尾:收尾
      renderStage();endLyricInput();$('stgLyric').classList.remove('on');flash('歌词填写完成');return;
    }
    ni=Math.max(0,ni);lyCursor=ni;renderStage();placeLyInline();
  }
  // inline 事件:中文靠 composition,英文靠空格分词
  lyInline.addEventListener('compositionstart',()=>{lyComposing=true;});
  lyInline.addEventListener('compositionend',()=>{lyComposing=false;
    // 中文输入法确认:通常是一个字/词 → 落到当前音,自动跳下一个
    const v=(lyInline.value||'').trim();
    if(v){const list=pitchedList(),it=list[lyCursor];if(it)stageLyrics[it.pidx]=v;lyGo(1);}
  });
  lyInline.addEventListener('keydown',e=>{
    if(lyComposing)return;
    if(e.key===' '||e.key==='Spacebar'){e.preventDefault();lyGo(1);} // 英文:空格=跳下一个音
    else if(e.key==='Enter'){e.preventDefault();lyGo(1);}
    else if(e.key==='Backspace'&&!lyInline.value){e.preventDefault();
      const list=pitchedList();if(lyCursor>0){const it=list[lyCursor-1];if(it)delete stageLyrics[it.pidx];lyCursor--;renderStage();placeLyInline();}}
    else if(e.key==='ArrowRight'){e.preventDefault();lyGo(1);}
    else if(e.key==='ArrowLeft'){e.preventDefault();lyGo(-1);}
  });

  function closeStage(){stageStop();hideStagePop();if(lyricMode)endLyricInput();document.body.classList.remove('stage-on');stagePane.setAttribute('aria-hidden','true');document.body.classList.remove('stg-lyric','stg-note');$('stgLyric').classList.remove('on');$('stgNote').classList.remove('on');}
  $('stageBack').addEventListener('click',closeStage);
  { const cta=$('stageCTA'); if(cta)cta.addEventListener('click',openStage); }
  $('stgPlay').addEventListener('click',stagePlayToggle);
  $('stgAI').addEventListener('click',stageGenAI);
  $('stageExport').addEventListener('click',()=>flash('导出功能待接入(MIDI / 长图 / 乐谱等,你定了我接)'));
  $('stgLyric').addEventListener('click',function(){
    if(lyricMode){endLyricInput();}else{document.body.classList.remove('stg-note');$('stgNote').classList.remove('on');startLyricInput();}
    this.classList.toggle('on',lyricMode);
  });
  $('stgNote').addEventListener('click',function(){if(lyricMode){endLyricInput();$('stgLyric').classList.remove('on');}document.body.classList.toggle('stg-note');this.classList.toggle('on',document.body.classList.contains('stg-note'));flash(document.body.classList.contains('stg-note')?'点音符 → 写你的注释':'');});
  { const ld=$('lyDone'); if(ld)ld.addEventListener('click',()=>{if(lyricMode){endLyricInput();$('stgLyric').classList.remove('on');}}); }
  let stageRt;window.addEventListener('resize',()=>{if(document.body.classList.contains('stage-on')){clearTimeout(stageRt);stageRt=setTimeout(renderStage,150);}});

  rebuildKey();updateKeyBtn(); // 初始化音乐引擎(默认 C 大调)
  activatePhrase(0); // 把编辑缓冲指向初始乐句
  // 分享链接进入:从 URL 还原旋律(deserialize 内部会按存档重建调性)
  let loadedFromLink=false;
  if(location.hash.indexOf('#m=')===0){
    try{const o=JSON.parse(decodeURIComponent(escape(atob(location.hash.slice(3)))));if(deserialize(o)){loadedFromLink=true;}}catch(e){}
    try{history.replaceState(null,'',location.pathname+location.search);}catch(e){}
  }

  setPanel('melody'); // 默认作曲面板(桌面端两面板同屏)
  renderPhraseBar();
  if(!loadedFromLink){renderNotes();renderMelody();}
  else{setTimeout(()=>{flash('已从分享链接载入旋律');},300);}
  // 重绘旋律线(字体加载/布局稳定后)
  window.addEventListener('load',()=>setTimeout(renderMelody,120));
})();
</script>
</body>
</html>
